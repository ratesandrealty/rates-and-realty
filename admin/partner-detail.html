<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <script src="/api/env.js?v=20260412b"></script>
  <title>Partner Detail | Rates &amp; Realty CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/admin/js/supabase-client.js?v=2026061501"></script>
  <script src="/admin/js/auth-guard.js?v=2026062401"></script>
  <script src="/admin/js/crm-comms.js?v=2026070101"></script>
  <style>
    :root{
      --bg:#050505; --surface:rgba(13,13,13,0.98); --surface2:rgba(20,20,20,0.98);
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.05);
      --text:#f6f1e8; --text2:#d4cbb8; --muted:#b6ab93;
      --gold:#C9A84C; --gold-dk:#9A7B2E; --gold-bg:rgba(201,168,76,0.08); --gold-bdr:rgba(201,168,76,0.25);
      --green:#3FB950; --red:#E5484D;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;}
    a{color:inherit;text-decoration:none;}
    .wrap{max-width:1600px;margin:0 auto;padding:22px 24px 60px;}
    .workspace{display:grid;grid-template-columns:minmax(0,1.6fr) minmax(330px,1fr);gap:16px;align-items:start;}
    .col-left{min-width:0;}
    .col-right{position:sticky;top:16px;align-self:start;max-height:calc(100vh - 32px);overflow-y:auto;}
    /* Call queue */
    .qcard{background:var(--surface2);border:1px solid var(--border);border-left:3px solid transparent;border-radius:10px;padding:11px 12px;margin-bottom:10px;transition:border-color .25s;}
    .qcard.q-done{border-left-color:var(--green);}
    .q-name{font-size:14px;font-weight:700;color:var(--text);}
    .q-phone{display:inline-block;font-size:16px;font-weight:700;color:var(--gold);}
    .q-copy{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:10px;cursor:pointer;padding:2px 7px;font-family:inherit;}
    .q-copy:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .q-actions{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px;align-items:center;}
    .q-dispo{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:14px;font-size:10px;font-weight:600;cursor:pointer;padding:3px 9px;font-family:inherit;}
    .q-dispo:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .q-note-text{font-size:11.5px;color:var(--text2);cursor:pointer;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
    .q-note-text.expanded{-webkit-line-clamp:unset;overflow:visible;}
    @media(max-width:1080px){
      .workspace{grid-template-columns:1fr;}
      .col-right{position:static;max-height:none;overflow:visible;}
    }
    .muted{color:var(--muted);}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px 18px;margin-bottom:16px;}
    .card-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
    .btn-gold{background:linear-gradient(135deg,#7A5020,#C9A84C);color:#1A0E00;border:none;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;padding:8px 16px;font-family:inherit;}
    .btn-ghost{background:transparent;border:1px solid var(--gold-bdr);color:var(--gold);border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;padding:7px 12px;font-family:inherit;}
    .chip{display:inline-block;font-size:10px;font-weight:700;border-radius:10px;padding:2px 9px;white-space:nowrap;}
    .chip-gold{color:var(--gold);border:1px solid var(--gold-bdr);background:var(--gold-bg);text-transform:uppercase;letter-spacing:.03em;}
    .chip-green{color:var(--green);border:1px solid rgba(63,185,80,.4);background:rgba(63,185,80,.08);}
    .chip-red{color:var(--red);border:1px solid rgba(229,72,77,.4);background:rgba(229,72,77,.08);}
    .chip-muted{color:var(--muted);border:1px solid var(--border);background:rgba(255,255,255,.03);}
    /* Header */
    .back{font-size:12px;color:var(--muted);display:inline-block;margin-bottom:14px;}
    .back:hover{color:var(--gold);}
    .hdr-main{display:flex;align-items:flex-start;gap:16px;}
    .avatar{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex-shrink:0;}
    .hdr-info{flex:1;min-width:0;}
    .hdr-name{font-size:20px;font-weight:800;line-height:1.2;}
    .hdr-sub{font-size:13px;color:var(--muted);margin-top:2px;}
    .hdr-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
    .hdr-contact{display:flex;flex-wrap:wrap;gap:14px;margin-top:10px;font-size:12px;}
    .hdr-contact a{color:var(--gold);}
    /* Stat tiles */
    .tiles{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;}
    .tile{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 12px;text-align:center;}
    .tile-num{font-size:18px;font-weight:800;line-height:1.1;}
    .tile-lbl{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin-top:4px;}
    /* Tabs */
    .tabs{display:flex;gap:4px;border-bottom:1px solid var(--border);margin-bottom:14px;}
    .tab{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:inherit;font-size:13px;font-weight:700;padding:9px 14px;cursor:pointer;}
    .tab.active{color:var(--text);border-bottom-color:var(--gold);}
    .tab-panel{display:none;}
    .tab-panel.active{display:block;}
    /* Activity log */
    .log-btns{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
    .log-form{background:var(--surface2);border:1px solid var(--gold-bdr);border-radius:10px;padding:12px;margin-bottom:14px;}
    .seg{display:inline-flex;border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:8px;}
    .seg button{background:transparent;border:none;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;padding:6px 14px;cursor:pointer;}
    .seg button.on{background:var(--gold-bg);color:var(--gold);}
    .fld{width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;padding:8px 10px;font-family:inherit;outline:none;box-sizing:border-box;}
    .fld:focus{border-color:var(--gold-bdr);}
    .act-row{display:flex;gap:11px;padding:11px 4px;border-bottom:1px solid var(--border2);}
    .act-ico{font-size:16px;flex-shrink:0;width:24px;text-align:center;}
    .act-body{flex:1;min-width:0;}
    .act-top{display:flex;justify-content:space-between;gap:10px;align-items:baseline;}
    .act-title{font-size:13px;font-weight:700;color:var(--text2);}
    .act-when{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;}
    .act-desc{font-size:12px;color:var(--muted);margin-top:3px;white-space:pre-wrap;word-break:break-word;}
    /* Lead rows */
    .lead-row{display:flex;align-items:center;gap:10px;padding:10px 6px;border-bottom:1px solid var(--border2);cursor:pointer;border-radius:6px;transition:background .12s;}
    .lead-row:hover{background:var(--gold-bg);}
    .lead-name{font-size:13px;font-weight:700;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .lead-sub{font-size:10px;color:var(--muted);}
    /* Spinner */
    .spin{width:18px;height:18px;border:2px solid rgba(201,168,76,.25);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg)}}
    .loading{color:var(--muted);font-size:12px;padding:14px 4px;display:flex;align-items:center;gap:10px;}
    .empty{color:var(--muted);font-size:12px;padding:14px 4px;}
    /* Toast */
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#161616;border:1px solid var(--gold-bdr);color:var(--text);font-size:13px;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.5);}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    /* Activity row hover actions */
    .act-row{position:relative;}
    .act-actions{position:absolute;top:6px;right:2px;display:none;gap:4px;background:var(--surface);padding:2px;border-radius:8px;}
    .act-row:hover .act-actions{display:flex;}
    .act-actions button{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);font-size:11px;cursor:pointer;padding:2px 6px;line-height:1.3;}
    .act-actions button:hover{border-color:var(--gold-bdr);color:var(--gold);}
    /* Rank pill */
    .rank-pill{display:inline-block;font-size:11px;font-weight:800;vertical-align:middle;margin-left:6px;padding:2px 10px;border-radius:11px;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-bdr);white-space:nowrap;}
    .rank-pill.top{color:#1A0E00;background:linear-gradient(135deg,#E6C66A,#C9A84C);border-color:transparent;box-shadow:0 0 0 1px rgba(201,168,76,.4);}
    /* Intelligence tiles */
    .tile-sub{font-size:9px;color:var(--muted);opacity:.85;margin-top:2px;}
    .tiles-5{grid-template-columns:repeat(5,1fr);}
    /* Follow-up nudge */
    .nudge{border-radius:10px;padding:11px 14px;font-size:13px;margin-bottom:16px;line-height:1.5;}
    .nudge-amber{background:rgba(229,152,77,0.10);border:1px solid rgba(229,152,77,0.35);color:#E7B380;}
    .nudge-green{background:rgba(63,185,80,0.08);border:1px solid rgba(63,185,80,0.30);color:#8FD79A;}
    /* Chart hover + animation */
    #chartTip{position:fixed;display:none;pointer-events:none;z-index:9998;background:#1c1c1c;border:1px solid var(--gold-bdr);color:var(--text);font-size:11px;padding:6px 9px;border-radius:7px;white-space:nowrap;box-shadow:0 8px 22px rgba(0,0,0,.55);}
    .bar-hit{cursor:pointer;}
    .bar-grow{transform-box:fill-box;transform-origin:center bottom;animation:barGrow .55s cubic-bezier(.2,.8,.2,1) both;}
    @keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
    @media(max-width:760px){
      .tiles{grid-template-columns:repeat(3,1fr);}
      .tiles-5{grid-template-columns:repeat(3,1fr);}
      .hdr-main{flex-wrap:wrap;}
    }
    @media(max-width:440px){ .tiles,.tiles-5{grid-template-columns:repeat(2,1fr);} }
  </style>
</head>
<body>
  <div class="wrap">
    <a class="back" href="referral-partners.html">← Back to Partners</a>

    <div class="workspace">
      <div class="col-left">
    <!-- Header -->
    <div class="card" id="hdrCard"><div class="loading"><span class="spin"></span> Loading partner…</div></div>

    <!-- Stat tiles -->
    <div class="card"><div class="card-h">Performance</div><div id="tilesBox"><div class="loading"><span class="spin"></span> Loading…</div></div></div>

    <!-- Goal ring -->
    <div class="card"><div class="card-h">Goal</div><div id="goalBox"><div class="loading"><span class="spin"></span> Loading…</div></div></div>

    <!-- Intelligence -->
    <div class="card"><div class="card-h">Pipeline &amp; Intelligence</div><div id="intelBox"><div class="loading"><span class="spin"></span> Loading…</div></div></div>

    <!-- Deals graph -->
    <div class="card"><div class="card-h">Deals over time</div><div id="chartControls"></div><div id="chartBox"><div class="loading"><span class="spin"></span> Loading…</div></div></div>

    <!-- Follow-up nudge -->
    <div id="nudgeBox"></div>

    <!-- Tabs -->
    <div class="card">
      <div class="tabs">
        <button class="tab active" data-tab="activity" onclick="switchTab('activity',this)">Activity</button>
        <button class="tab" data-tab="leads" onclick="switchTab('leads',this)">Shared Leads</button>
        <button class="tab" data-tab="marketing" onclick="switchTab('marketing',this)">Marketing</button>
      </div>

      <div class="tab-panel active" id="panel-activity">
        <div class="log-btns">
          <button class="btn-ghost" onclick="openLog('call')">📞 Call</button>
          <button class="btn-ghost" onclick="openLog('sms')">💬 SMS</button>
          <button class="btn-ghost" onclick="openLog('note')">📝 Note</button>
          <button class="btn-ghost" onclick="openLog('email')">✉️ Email</button>
        </div>
        <div id="logForm"></div>
        <div id="activityFeed"><div class="loading"><span class="spin"></span> Loading activity…</div></div>
      </div>

      <div class="tab-panel" id="panel-leads">
        <div id="leadsBox"><div class="loading"><span class="spin"></span> Loading leads…</div></div>
      </div>

      <div class="tab-panel" id="panel-marketing">
        <div id="marketingBox"><div class="loading"><span class="spin"></span> Loading…</div></div>
      </div>
    </div>
      </div><!-- /col-left -->

      <aside class="col-right">
        <div class="card"><div id="queuePanel"><div class="loading"><span class="spin"></span> Loading queue…</div></div></div>
      </aside>
    </div><!-- /workspace -->
  </div>

  <div id="toast"></div>
  <div id="chartTip"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  /* ── helpers ── */
  function _authClient(){ return window._supabaseClient; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(function(){ t.classList.remove('show'); },2500); }

  function money(n){ n=Number(n)||0; return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0}); }
  // Shared money formatter: <$1K plain (commas), >=1K as $X.XK, >=1M as $X.XM.
  function fmtMoney(n){
    n=Number(n)||0; var a=Math.abs(n);
    if(a>=1e6) return '$'+(n/1e6).toFixed(1).replace(/\.0$/,'')+'M';
    if(a>=1e3) return '$'+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K';
    return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0});
  }
  var moneyAbbr=fmtMoney; // back-compat alias
  function initials(f,l){ return ((String(f||'').trim()[0]||'')+(String(l||'').trim()[0]||'')).toUpperCase()||'?'; }
  function avatarTint(color){
    var c=color||'';
    if(/^#?[0-9a-fA-F]{6}$/.test(c)){ if(c[0]!=='#') c='#'+c; return {bg:c+'22',fg:c}; }
    return {bg:'rgba(201,168,76,0.15)',fg:'#C9A84C'};
  }
  function timeAgo(iso){
    if(!iso) return '';
    var d=new Date(iso), s=Math.floor((Date.now()-d.getTime())/1000);
    if(s<60) return 'just now';
    var m=Math.floor(s/60); if(m<60) return m+'m ago';
    var h=Math.floor(m/60); if(h<24) return h+'h ago';
    var dd=Math.floor(h/24); if(dd<30) return dd+'d ago';
    var mo=Math.floor(dd/30); if(mo<12) return mo+'mo ago';
    return Math.floor(mo/12)+'y ago';
  }
  function fmtDateTime(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
  function fmtDuration(sec){ sec=Number(sec)||0; if(!sec) return ''; var m=Math.floor(sec/60), s=sec%60; return (m?m+'m':'')+(s?(m?' ':'')+s+'s':'')||'0s'; }
  function titleCase(s){ return String(s||'').replace(/\b\w/g,function(c){return c.toUpperCase();}); }

  /* ── state ── */
  var partnerId = new URLSearchParams(location.search).get('partner_id');
  var _partner=null, _activity=[], _overview=null, _monthly=[];
  var _leads=[], _queueSort='stale', _loggedToday=0, _notesCache={};
  var _chartMetric='referrals', _chartWindow=12, _chartView='bars', _goal=null;
  var CHART_METRICS=[
    {key:'referrals', label:'Leads',     money:false},
    {key:'won',       label:'Closings',  money:false},
    {key:'volume',    label:'Volume',    money:true},
    {key:'potential', label:'Potential', money:true},
    {key:'earnings',  label:'Earnings',  money:true}
  ];
  var GOAL_METRICS=[
    {key:'volume',    label:'Volume',    money:true},
    {key:'earnings',  label:'Earnings',  money:true},
    {key:'referrals', label:'Referrals', money:false},
    {key:'closings',  label:'Closings',  money:false}
  ];

  async function waitClient(ms){ ms=ms||7000; var s=Date.now(); while(!window._supabaseClient && Date.now()-s<ms){ await new Promise(function(r){setTimeout(r,40);}); } return window._supabaseClient; }

  /* ── boot ── */
  (async function(){
    if(!partnerId){ document.getElementById('hdrCard').innerHTML='<div class="empty">No partner specified.</div>'; return; }
    await waitClient();
    if(!window._supabaseClient) return; // auth-guard will redirect to login
    loadPartner();
    loadOverview();
    loadGoal();
    loadLeads();
    loadActivity();
  })();

  /* ── partner header ── */
  async function loadPartner(){
    var box=document.getElementById('hdrCard');
    try{
      var r=await _authClient().from('referral_partners').select('*').eq('id',partnerId).single();
      if(r.error||!r.data){ box.innerHTML='<div class="empty">Could not load partner.</div>'; return; }
      _partner=r.data;
      renderHeader(r.data);
    }catch(e){ box.innerHTML='<div class="empty">Could not load partner.</div>'; }
  }
  function renderHeader(p){
    var name=((p.first_name||'')+' '+(p.last_name||'')).trim()||'Unnamed Partner';
    var av=avatarTint(p.avatar_color);
    var sub=[p.title,p.company].filter(Boolean).map(esc).join(' · ');
    var statusChip = p.status ? '<span class="chip '+(/(active|vip)/i.test(p.status)?'chip-green':'chip-muted')+'">'+esc(p.status)+'</span>' : '';
    var tags=[];
    if(Array.isArray(p.tags)) tags=p.tags;
    else if(typeof p.tags==='string' && p.tags.trim()){ try{ var j=JSON.parse(p.tags); tags=Array.isArray(j)?j:[p.tags]; }catch(e){ tags=p.tags.split(',').map(function(s){return s.trim();}).filter(Boolean); } }
    var tagChips=tags.map(function(t){ return '<span class="chip chip-gold">'+esc(t)+'</span>'; }).join('');
    var contact=[];
    if(p.email) contact.push('<a href="#" onclick="event.preventDefault();crmEmail({to_email:\''+esc(p.email)+'\'})" style="cursor:pointer;">✉️ '+esc(p.email)+'</a>');
    if(p.phone) contact.push('<a href="#" onclick="event.preventDefault();crmCall(null,\''+esc(p.phone)+'\',\'\',this)" style="cursor:pointer;">📞 '+esc(p.phone)+'</a>');
    document.getElementById('hdrCard').innerHTML =
      '<div class="hdr-main">'
        +'<div class="avatar" style="background:'+av.bg+';color:'+av.fg+';">'+esc(initials(p.first_name,p.last_name))+'</div>'
        +'<div class="hdr-info">'
          +'<div class="hdr-name">'+esc(name)+'<span id="rankBadge"></span></div>'
          +(sub?'<div class="hdr-sub">'+sub+'</div>':'')
          +'<div class="hdr-chips">'+statusChip+tagChips+'</div>'
          +(contact.length?'<div class="hdr-contact">'+contact.join('')+'</div>':'')
        +'</div>'
        +'<button class="btn-gold" onclick="editPartner()">Edit Partner</button>'
      +'</div>';
    // Overview may already be loaded (parallel fetch) — fill rank + nudge now that DOM exists.
    if(_overview){ renderRank(_overview); renderNudge(_overview); }
  }
  function editPartner(){
    // No reusable cross-page edit modal yet — the edit flow lives inside referral-partners.html.
    showToast('Partner editing — coming soon');
  }

  /* ── overview: tiles + chart ── */
  async function loadOverview(){
    var tiles=document.getElementById('tilesBox'), chart=document.getElementById('chartBox'), intel=document.getElementById('intelBox');
    try{
      var r=await _authClient().rpc('partner_overview',{p_partner_id:partnerId});
      if(r.error){ tiles.innerHTML='<div class="empty">Could not load stats.</div>'; chart.innerHTML='<div class="empty">No data.</div>'; if(intel) intel.innerHTML='<div class="empty">No data.</div>'; return; }
      var o=(Array.isArray(r.data)?r.data[0]:r.data)||{};
      _overview=o; _monthly=o.monthly||[];
      renderTiles(o);
      renderIntel(o);
      renderRank(o);
      renderNudge(o);
      renderChartUI();
      redrawChart();
    }catch(e){ tiles.innerHTML='<div class="empty">Could not load stats.</div>'; chart.innerHTML='<div class="empty">No data.</div>'; if(intel) intel.innerHTML='<div class="empty">No data.</div>'; }
  }
  function renderTiles(o){
    var t=[
      {n:Number(o.referrals)||0, l:'Referrals', c:'var(--gold)'},
      {n:Number(o.won)||0,       l:'Won',       c:'var(--green)'},
      {n:Number(o.lost)||0,      l:'Lost',      c:'var(--red)'},
      {n:Number(o.active)||0,    l:'Active',    c:'var(--text)'},
      {n:fmtMoney(o.volume),     l:'Volume',    c:'var(--text)'},
      {n:fmtMoney(o.earnings),   l:'Earnings',  c:'var(--gold)'}
    ];
    document.getElementById('tilesBox').innerHTML='<div class="tiles">'+t.map(function(x){
      return '<div class="tile"><div class="tile-num" style="color:'+x.c+'">'+esc(x.n)+'</div><div class="tile-lbl">'+x.l+'</div></div>';
    }).join('')+'</div>';
  }

  function renderChart(monthly){
    monthly=monthly||[];
    if(!monthly.length) return '<div class="empty">No deal history yet.</div>';
    var cfg=currentMetric(), key=cfg.key, money=cfg.money, isVol=(key==='volume');
    var unit=money?'$':'count';
    var caption='<div style="font-size:11px;color:var(--muted);margin-bottom:6px;">'+esc(cfg.label)+' per month — '+unit+'</div>';
    var vals=monthly.map(function(m){return Number(m[key])||0;});
    var ghost=isVol?monthly.map(function(m){return Number(m.potential)||0;}):null;
    var maxScale=Math.max.apply(null, vals.concat(isVol?ghost:[]).concat([0]));
    if(maxScale<=0) maxScale=1;
    var maxVal=Math.max.apply(null, vals.concat([0]));
    var tallest=-1, tallestV=-1;
    for(var ti=0;ti<vals.length;ti++){ if(vals[ti]>tallestV){ tallestV=vals[ti]; tallest=ti; } }
    var avg=vals.reduce(function(s,v){return s+v;},0)/(vals.length||1);
    var n=monthly.length, step=30, barW=16, padL=30, padR=12, topPad=18, barMaxH=84, labelH=16;
    var W=padL+padR+n*step, baseY=topPad+barMaxH, H=baseY+labelH, parts=[];
    parts.push('<defs><linearGradient id="barGrad" x1="0" y1="0" x2="0" y2="1">'
      +'<stop offset="0" stop-color="#E9CC74"/><stop offset="1" stop-color="#B5902F"/></linearGradient></defs>');
    // baseline
    parts.push('<line x1="'+padL+'" y1="'+baseY+'" x2="'+(W-padR)+'" y2="'+baseY+'" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>');
    // y-scale labels (max top-left, 0 baseline-left)
    parts.push('<text x="2" y="'+(topPad+2)+'" font-size="8" fill="#8a8170">'+esc(chartFmt(maxVal,money))+'</text>');
    parts.push('<text x="2" y="'+(baseY+2)+'" font-size="8" fill="#8a8170">0</text>');
    // average line + value
    if(avg>0){
      var avgY=baseY-(avg/maxScale)*barMaxH;
      parts.push('<line x1="'+padL+'" y1="'+avgY.toFixed(1)+'" x2="'+(W-padR)+'" y2="'+avgY.toFixed(1)+'" stroke="#C9A84C" stroke-width="1" stroke-dasharray="3 3" opacity="0.5"/>');
      parts.push('<text x="'+(W-padR)+'" y="'+(avgY-3).toFixed(1)+'" text-anchor="end" font-size="8" fill="#C9A84C" opacity="0.85">avg '+esc(chartFmt(avg,money))+'</text>');
    }
    var labelEvery=(n<=6)?1:2;
    var labelAll=(n<=8);
    for(var i=0;i<n;i++){
      var m=monthly[i], val=vals[i];
      var h=(val/maxScale)*barMaxH;
      var x=padL+i*step+(step-barW)/2, cx=x+barW/2;
      var grow='class="bar-grow" style="animation-delay:'+(i*0.035).toFixed(3)+'s;"';
      // ghost pipeline bar behind volume bars
      if(isVol){
        var gh=(ghost[i]/maxScale)*barMaxH;
        if(gh>0.6) parts.push('<path d="'+roundedTopRect(x, baseY-gh, barW, gh, 3)+'" fill="#C9A84C" opacity="0.16"/>');
      }
      if(h<0.6){
        // zero month — faint baseline tick, clearly "no activity"
        parts.push('<rect x="'+x+'" y="'+(baseY-1.5)+'" width="'+barW+'" height="1.5" rx="0.75" fill="rgba(255,255,255,0.12)"/>');
      } else {
        parts.push('<path '+grow+' d="'+roundedTopRect(x, baseY-h, barW, h, 3)+'" fill="url(#barGrad)"/>');
      }
      // per-bar value label (collision-aware): all if N<=8, else non-zero only; always the tallest, in gold
      var isTall=(i===tallest && val>0);
      if(isTall || labelAll || val>0){
        var ly=Math.max(topPad-3, baseY-h-3);
        var lcolor=isTall?'#C9A84C':'#b6ab93';
        var lweight=isTall?'700':'600';
        parts.push('<text x="'+cx+'" y="'+ly.toFixed(1)+'" text-anchor="middle" font-size="8" font-weight="'+lweight+'" fill="'+lcolor+'">'+esc(chartFmt(val,money))+'</text>');
      }
      // month label — every other (or every bar small N); zero months always labeled muted
      var isZero=(val===0);
      if(i%labelEvery===0 || isZero){
        parts.push('<text x="'+cx+'" y="'+(H-4)+'" text-anchor="middle" font-size="8" fill="'+(isZero?'#6b6557':'#8a8170')+'">'+monthLabel(m.ym)+'</text>');
      }
      parts.push('<rect class="bar-hit" data-i="'+i+'" x="'+(padL+i*step)+'" y="'+topPad+'" width="'+step+'" height="'+barMaxH+'" fill="transparent"/>');
    }
    var legend='<span><span style="color:#C9A84C;">▰</span> '+esc(cfg.label)+'</span>';
    if(isVol) legend+='<span><span style="color:#C9A84C;opacity:.45;">▰</span> Potential</span>';
    return caption
      +'<svg viewBox="0 0 '+W+' '+H+'" width="100%" height="128" preserveAspectRatio="xMidYMid meet" style="display:block;overflow:visible;">'+parts.join('')+'</svg>'
      +'<div style="display:flex;gap:14px;margin-top:8px;font-size:10px;color:var(--muted);">'+legend+'</div>';
  }

  function renderGoal(g){
    var box=document.getElementById('goalBox'); if(!box) return;
    if(!g || g.target==null){
      box.innerHTML='<div style="display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;">'

    var R=34, C=2*Math.PI*R, off=C*(1-Math.max(0,Math.min(1,frac)));

      +'<circle cx="45" cy="45" r="'+R+'" fill="none" stroke="'+ringColor+'" stroke-width="8" stroke-linecap="round" stroke-dasharray="'+C.toFixed(1)+'" stroke-dashoffset="'+off.toFixed(1)+'" transform="rotate(-90 45 45)" style="transition:stroke-dashoffset .6s ease;"/>'
      +'<text x="45" y="46" text-anchor="middle" dominant-baseline="middle" font-size="17" font-weight="800" fill="'+(done?'var(--green)':'var(--text)')+'">'+pct+'%</text>'
    +'</svg>';

      +ring
      +'<div style="flex:1;min-width:0;">'
        +'<div style="font-size:15px;font-weight:800;color:'+(done?'var(--green)':'var(--text)')+';">'+esc(goalFmt(metric,cur))+' <span style="color:var(--muted);font-weight:600;font-size:13px;">of '+esc(goalFmt(metric,target))+'</span></div>'
        +'<div class="muted" style="font-size:11px;margin-top:3px;">'+esc(cap)+'</div>'

  async function saveGoal(){
    var metric=(document.getElementById('goalMetric')||{}).value||'volume';
    var period=(document.getElementById('goalPeriod')||{}).value||'annual';

      var r=await _authClient().rpc('partner_goal_set',{p_partner_id:partnerId,p_metric:metric,p_period:period,p_target:Number(target)});
      if(r.error) throw new Error(r.error.message||'failed');
      await loadGoal();
      showToast('Goal saved');

  /* ── shared leads ── */
  async function loadLeads(){
    var box=document.getElementById('leadsBox'), qpanel=document.getElementById('queuePanel');
    try{
      var r=await _authClient().rpc('partner_leads',{p_partner_id:partnerId});
      if(r.error){ box.innerHTML='<div class="empty">Could not load leads.</div>'; if(qpanel) qpanel.innerHTML='<div class="empty">Could not load queue.</div>'; return; }
      // Store once; render both the Shared Leads tab and the Call Queue from it.
      _leads=(r.data||[]).map(function(l,i){ l._qid='q'+i; return l; });
      // Merge per-lead potential earnings. contacts.estimated_earnings is always 0 by design
      // (write-only inbox); the real value lives in contact_earnings, keyed by contact_id.
      try{
        var _eids=_leads.map(function(l){ return l.contact_id; }).filter(Boolean);
        if(_eids.length){
          var er=await _authClient().from('contact_earnings').select('contact_id,estimated_earnings').in('contact_id',_eids);
          if(!er.error && er.data){
            var emap={}; er.data.forEach(function(x){ emap[x.contact_id]=x.estimated_earnings; });
            _leads.forEach(function(l){ if(l.contact_id!=null && emap[l.contact_id]!=null) l.estimated_earnings=emap[l.contact_id]; });
          }
        }
      }catch(_e){ /* non-fatal — cards just omit Potential */ }
      renderLeads(_leads);
      renderQueue();
    }catch(e){ box.innerHTML='<div class="empty">Could not load leads.</div>'; if(qpanel) qpanel.innerHTML='<div class="empty">Could not load queue.</div>'; }
  }

  /* ── Call Queue (right panel) ── */
  function _qTms(iso){ var t=iso?new Date(iso).getTime():NaN; return isNaN(t)?0:t; }
  function findLead(qid){ for(var i=0;i<_leads.length;i++){ if(_leads[i]._qid===qid) return _leads[i]; } return null; }
  // Queue card Call / SMS → shared CRM comms (click-to-call / sms-service), keyed by the lead.
  function qCall(qid, btn){ var l=findLead(qid); if(!l) return; if(typeof crmCall==='function') crmCall(l.contact_id||null, l.phone||'', l.name||'', btn); }
  function qText(qid){ var l=findLead(qid); if(!l) return; if(typeof crmText==='function') crmText(l.contact_id||null, l.phone||'', l.name||''); }
  function qEmail(qid){ var l=findLead(qid); if(!l) return; if(typeof crmEmail==='function') crmEmail({ to_email:l.email||'', to_name:l.name||'', contact_id:l.contact_id||null }); }
  window.qCall=qCall; window.qText=qText; window.qEmail=qEmail;
  function setQueueSort(v){ _queueSort=v||'stale'; renderQueue(); }
  function sortedLeads(){
    var arr=_leads.slice();
    if(_queueSort==='newest'){
      arr.sort(function(a,b){ return _qTms(b.created_at)-_qTms(a.created_at); });
    } else if(_queueSort==='stage'){
      arr.sort(function(a,b){ return String(a.stage||'').localeCompare(String(b.stage||'')); });
    } else { // stalest first: last_activity_at ascending, never-contacted (null) on top
      arr.sort(function(a,b){
        var av=a.last_activity_at?_qTms(a.last_activity_at):-Infinity;
        var bv=b.last_activity_at?_qTms(b.last_activity_at):-Infinity;
        return av-bv;
      });
    }
    return arr;
  }
  function recencyInfo(iso){
    if(!iso) return { text:'Never contacted', amber:true };
    var days=Math.floor((Date.now()-new Date(iso).getTime())/86400000);
    return { text:'Last touch: '+timeAgo(iso), amber:days>14 };
  }
  function renderQueue(){
    var panel=document.getElementById('queuePanel'); if(!panel) return;
    var arr=sortedLeads();
    var header='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px;">'
      +'<div><div class="card-h" style="margin-bottom:2px;">📞 Call Queue</div>'
        +'<div class="muted" style="font-size:11px;"><span id="queueCount">'+arr.length+'</span> lead'+(arr.length===1?'':'s')+' · <span id="queueLogged">'+_loggedToday+'</span> logged today</div></div>'
      +'<select id="queueSort" onchange="setQueueSort(this.value)" class="fld" style="height:30px;width:auto;font-size:11px;padding:0 8px;">'
        +'<option value="stale"'+(_queueSort==='stale'?' selected':'')+'>Stalest first</option>'
        +'<option value="newest"'+(_queueSort==='newest'?' selected':'')+'>Newest</option>'
        +'<option value="stage"'+(_queueSort==='stage'?' selected':'')+'>By stage</option>'
      +'</select>'
    +'</div>';
    if(!arr.length){ panel.innerHTML=header+'<div class="empty">No referred leads yet.</div>'; return; }
    panel.innerHTML=header+'<div id="queueBody">'+arr.map(queueCardHTML).join('')+'</div>';
  }
  function queueCardHTML(l){
    var qid=l._qid;
    var name=esc(l.name||'Unknown');
    var stage=l.stage?'<span class="chip chip-muted">'+esc(l.stage)+'</span>':'';
    var amt=l.loan_amount?'<span style="font-size:12px;color:var(--text2);white-space:nowrap;flex-shrink:0;">'+esc(fmtMoney(l.loan_amount))+'</span>':'';
    var rec=recencyInfo(l.last_activity_at), recColor=rec.amber?'#E7B380':'#8FD79A';
    var pot=(l.estimated_earnings!=null && Number(l.estimated_earnings)>0)
      ? '<div style="font-size:11px;margin-top:3px;color:var(--gold);font-weight:700;">Potential: '+esc(fmtMoney(l.estimated_earnings))+'</div>'
      : '';
    var phone=l.phone
      ? '<a class="q-phone" href="tel:'+esc(l.phone)+'">📞 '+esc(l.phone)+'</a>'
        +' <button class="q-copy" data-phone="'+esc(l.phone)+'" onclick="copyText(this.getAttribute(\'data-phone\'))">Copy</button>'
      : '<span class="muted" style="font-size:12px;">No phone</span>';
    var email=l.email?'<div style="margin-top:4px;"><a href="#" onclick="event.preventDefault();qEmail(\''+qid+'\')" style="color:var(--gold);font-size:12px;cursor:pointer;">✉️ '+esc(l.email)+'</a></div>':'';
    return '<div class="qcard'+(l._done?' q-done':'')+'" id="qcard-'+qid+'" data-qid="'+qid+'">'
      +'<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">'
        +'<div style="min-width:0;flex:1;">'
          +'<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span class="q-name">'+name+'</span>'+stage+outcomeChip(l.deal_outcome)+'</div>'
          +'<div class="q-recency" style="font-size:11px;margin-top:4px;color:'+recColor+';">'+esc(rec.text)+'</div>'
          +pot
        +'</div>'+amt
      +'</div>'
      +'<div style="margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;">'+phone+'</div>'
      +email
      +'<div class="q-actions">'
        +'<button class="btn-ghost" style="padding:5px 10px;" onclick="qCall(\''+qid+'\',this)">📞 Call</button>'
        +'<button class="btn-ghost" style="padding:5px 10px;" onclick="qText(\''+qid+'\')">💬 SMS</button>'
        +'<button class="btn-ghost" style="padding:5px 10px;" onclick="queueOpenForm(\''+qid+'\',\'note\')">📝 Note</button>'
        +'<a class="btn-ghost" style="padding:5px 10px;margin-left:auto;" href="lead-detail.html?contact_id='+encodeURIComponent(l.contact_id||'')+'" target="_blank" rel="noopener">Open ↗</a>'
      +'</div>'
      +'<div class="q-form" id="qform-'+qid+'"></div>'
    +'</div>';
  }
  function queueOpenForm(qid, type){
    var box=document.getElementById('qform-'+qid); if(!box) return;
    if(box.getAttribute('data-open')===type){ box.innerHTML=''; box.removeAttribute('data-open'); return; } // toggle off
    var lead=findLead(qid);
    var needsDir=(type==='call'||type==='sms'), needsMins=(type==='call');
    var dispo=['No answer','Left VM','Connected','Not interested','Callback'];
    var html='<div class="q-formwrap" data-type="'+type+'" data-dir="outbound" style="margin-top:9px;padding-top:9px;border-top:1px solid var(--border);">';
    // Recent notes for context (lazily fetched + cached)
    html+='<div class="q-notes" id="qnotes-'+qid+'" style="margin-bottom:9px;"><div class="muted" style="font-size:10px;">Loading notes…</div></div>';
    if(needsDir){
      html+='<div class="seg" style="margin-bottom:8px;">'
        +'<button type="button" data-d="inbound" onclick="queueDir(this)">Inbound</button>'
        +'<button type="button" class="on" data-d="outbound" onclick="queueDir(this)">Outbound</button>'
      +'</div>';
    }
    if(needsMins){
      html+='<input class="fld q-mins" type="number" min="0" step="1" placeholder="Minutes (optional)" style="margin-bottom:8px;max-width:170px;">';
    }
    html+='<textarea class="fld q-note" rows="2" placeholder="Note…"></textarea>'
      +'<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;">'
        +dispo.map(function(d){ return '<button type="button" class="q-dispo" onclick="queueDispo(this,\''+d+'\')">'+esc(d)+'</button>'; }).join('')
      +'</div>'
      +'<div style="display:flex;gap:8px;margin-top:9px;">'
        +'<button class="btn-gold" onclick="queueSave(this,\''+qid+'\')">Save '+titleCase(type)+'</button>'
        +'<button class="btn-ghost" onclick="queueCloseForm(\''+qid+'\')">Cancel</button>'
      +'</div>'
    +'</div>';
    box.innerHTML=html;
    box.setAttribute('data-open', type);
    var ta=box.querySelector('.q-note'); if(ta) ta.focus();
    loadQueueNotes(qid, lead && lead.contact_id);
  }

  /* ── recent notes for a queue card ── */
  function prettySource(s){
    s=String(s||'').trim().replace(/^call_console:/,'');
    var low=s.toLowerCase();
    var special={ 'sms':'SMS', 'sms_ocr':'SMS OCR', 'call':'Call', 'note':'Note', 'email':'Email', 'manual':'Manual' };
    if(special[low]) return special[low];
    return s.replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim().replace(/\b\w/g,function(c){ return c.toUpperCase(); }) || '—';
  }
  function _currentAuthorName(){
    var u=window._adminUser||{};
    return (u.user_metadata && u.user_metadata.full_name) || u.email || 'You';
  }
  function renderNotesHTML(rows){
    rows=rows||[];
    var head='<div class="card-h" style="margin-bottom:6px;">Recent notes</div>';
    if(!rows.length) return head+'<div class="muted" style="font-size:11px;">No notes yet for this lead.</div>';
    var items=rows.map(function(nt){
      var meta=esc(prettySource(nt.source))+' · '+esc(nt.author_display||'—')+' · '+esc(timeAgo(nt.created_at));
      return '<div style="padding:5px 0;border-top:1px solid var(--border2);">'
        +'<div class="q-note-text" onclick="this.classList.toggle(\'expanded\')" title="Click to expand">'+esc(nt.note_text||'')+'</div>'
        +'<div class="muted" style="font-size:9.5px;margin-top:2px;">'+meta+'</div>'
      +'</div>';
    }).join('');
    return head+'<div style="max-height:140px;overflow-y:auto;">'+items+'</div>';
  }
  async function loadQueueNotes(qid, contactId){
    var box=document.getElementById('qnotes-'+qid); if(!box) return;
    if(!contactId){ box.innerHTML=renderNotesHTML([]); return; }
    if(_notesCache[contactId]){ box.innerHTML=renderNotesHTML(_notesCache[contactId]); return; } // instant on reopen
    try{
      var r=await _authClient().rpc('contact_recent_notes',{p_contact_id:contactId,p_limit:5});
      var rows=(r&&!r.error&&r.data)?r.data:[];
      if(!_notesCache[contactId]) _notesCache[contactId]=rows; // don't clobber a note saved while in flight
      var b2=document.getElementById('qnotes-'+qid); if(b2) b2.innerHTML=renderNotesHTML(_notesCache[contactId]);
    }catch(e){ var b3=document.getElementById('qnotes-'+qid); if(b3) b3.innerHTML=renderNotesHTML(_notesCache[contactId]||[]); }
  }
  function queueCloseForm(qid){ var box=document.getElementById('qform-'+qid); if(box){ box.innerHTML=''; box.removeAttribute('data-open'); } }
  function queueDir(btn){
    var seg=btn.closest('.seg'); if(seg) Array.prototype.forEach.call(seg.querySelectorAll('button'),function(b){ b.classList.toggle('on', b===btn); });
    var wrap=btn.closest('.q-formwrap'); if(wrap) wrap.setAttribute('data-dir', btn.getAttribute('data-d'));
  }
  function queueDispo(btn, text){
    var wrap=btn.closest('.q-formwrap'); if(!wrap) return;
    var ta=wrap.querySelector('.q-note'); if(!ta) return;
    var cur=ta.value.trim();
    ta.value = cur ? (cur+' · '+text) : text;
    ta.focus();
  }
  function markCardDone(qid){
    var card=document.getElementById('qcard-'+qid); if(!card) return;
    card.classList.add('q-done');
    var rec=card.querySelector('.q-recency');
    if(rec){ rec.textContent='Last touch: just now'; rec.style.color='#8FD79A'; }
  }
  function scrollToNextPending(qid){
    var card=document.getElementById('qcard-'+qid); if(!card) return;
    var cur=card.nextElementSibling;
    while(cur){
      if(cur.classList && cur.classList.contains('qcard') && !cur.classList.contains('q-done')){
        cur.scrollIntoView({behavior:'smooth', block:'nearest'}); return;
      }
      cur=cur.nextElementSibling;
    }
  }
  async function queueSave(btn, qid){
    var lead=findLead(qid); if(!lead) return;
    var wrap=btn.closest('.q-formwrap'); if(!wrap) return;
    var type=wrap.getAttribute('data-type');
    var note=((wrap.querySelector('.q-note')||{}).value||'').trim();
    var dir=(type==='call'||type==='sms')?(wrap.getAttribute('data-dir')||'outbound'):null;
    var dur=null;
    if(type==='call'){ var mins=parseFloat((wrap.querySelector('.q-mins')||{}).value); if(mins>0) dur=Math.round(mins*60); }
    btn.disabled=true; btn.textContent='Saving…';
    try{
      var r=await _authClient().rpc('contact_log_activity',{p_contact_id:lead.contact_id,p_type:type,p_direction:dir,p_note:note||null,p_duration:dur});
      if(r.error) throw new Error(r.error.message||'failed');
      lead.last_activity_at=new Date().toISOString();
      lead._done=true;
      _loggedToday++;
      var cnt=document.getElementById('queueLogged'); if(cnt) cnt.textContent=_loggedToday;
      // Reflect the just-logged note at the top of this lead's cached notes.
      if(note){
        if(!_notesCache[lead.contact_id]) _notesCache[lead.contact_id]=[];
        _notesCache[lead.contact_id].unshift({ id:'local-'+new Date().getTime(), note_text:note, author_display:_currentAuthorName(), source:type, created_at:new Date().toISOString() });
        var nb=document.getElementById('qnotes-'+qid); if(nb) nb.innerHTML=renderNotesHTML(_notesCache[lead.contact_id]);
      }
      queueCloseForm(qid);
      markCardDone(qid);
      showToast('Logged');
      scrollToNextPending(qid);
    }catch(e){ btn.disabled=false; btn.textContent='Save '+titleCase(type); showToast((e&&e.message)||'Could not log activity'); }
  }
  function copyText(t){
    t=String(t||'');
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(t).then(function(){ showToast('Copied'); }, function(){ showToast('Copy failed'); });
    } else {
      try{ var ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('Copied'); }
      catch(e){ showToast('Copy failed'); }
    }
  }
  function outcomeChip(o){
    var v=String(o||'').toLowerCase();
    if(v==='won') return '<span class="chip chip-green">Won</span>';
    if(v==='lost') return '<span class="chip chip-red">Lost</span>';
    return '<span class="chip chip-muted">'+(v?titleCase(v):'Active')+'</span>';
  }
  function renderLeads(rows){
    var box=document.getElementById('leadsBox');
    if(!rows.length){ box.innerHTML='<div class="empty">No shared leads yet.</div>'; return; }
    var vol=rows.reduce(function(s,r){ return s+(Number(r.loan_amount)||0); },0);
    var head='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;font-size:12px;">'
      +'<span class="muted">'+rows.length+' lead'+(rows.length===1?'':'s')+'</span>'
      +'<span class="muted">Total volume <strong style="color:var(--gold);">'+esc(money(vol))+'</strong></span></div>';
    box.innerHTML=head+rows.map(function(r){
      var name=esc(r.name||'Unknown');
      var stage=r.stage?'<span class="chip chip-muted">'+esc(r.stage)+'</span>':'';
      var amt=r.loan_amount?'<span style="font-size:12px;color:var(--text2);white-space:nowrap;">'+esc(money(r.loan_amount))+'</span>':'';
      var sub=[r.email,r.phone].filter(Boolean).map(esc).join(' · ');
      return '<a class="lead-row" href="lead-detail.html?contact_id='+encodeURIComponent(r.contact_id||'')+'">'
        +'<span style="flex:1;min-width:0;"><span class="lead-name">'+name+'</span>'
        +(sub?'<span class="lead-sub" style="display:block;">'+sub+'</span>':'')+'</span>'
        +'<span style="display:flex;align-items:center;gap:7px;flex-shrink:0;">'+stage+outcomeChip(r.deal_outcome)+amt+'</span>'
      +'</a>';
    }).join('');
  }

  /* ── activity ── */
  async function loadActivity(){
    var box=document.getElementById('activityFeed');
    try{
      var r=await _authClient().rpc('partner_activity',{p_partner_id:partnerId});
      if(r.error){ box.innerHTML='<div class="empty">Could not load activity.</div>'; document.getElementById('marketingBox').innerHTML='<div class="empty">Could not load.</div>'; return; }
      _activity=(r.data||[]).slice();
      renderActivity();
      renderMarketing();
    }catch(e){ box.innerHTML='<div class="empty">Could not load activity.</div>'; }
  }
  function actIcon(t){ return ({call:'📞',sms:'💬',email:'✉️',note:'📝'})[String(t||'').toLowerCase()]||'•'; }
  function activityItemHTML(a){
    var icon=actIcon(a.type);
    var dir=a.direction?titleCase(a.direction):'';
    var title=esc(a.title || (titleCase(a.type||'Activity')+(dir?(' · '+dir):'')));
    var dur=a.duration_seconds?(' · '+fmtDuration(a.duration_seconds)):'';
    var bodyText=a.description||a.email_subject||a.sms_body||'';
    var idAttr=esc(String(a.id==null?'':a.id));
    var actions = (a.editable===true) ?
      ('<span class="act-actions">'
        +'<button title="Edit" onclick="editActivity(\''+idAttr+'\',this)">✏️</button>'
        +'<button title="Delete" onclick="deleteActivity(\''+idAttr+'\',this)">🗑️</button>'
      +'</span>') : '';
    return '<div class="act-row" data-id="'+idAttr+'">'
      +'<div class="act-ico">'+icon+'</div>'
      +'<div class="act-body">'
        +'<div class="act-top"><span class="act-title">'+title+'</span>'
        +'<span class="act-when" title="'+esc(fmtDateTime(a.created_at))+'">'+esc(timeAgo(a.created_at))+esc(dur)+'</span></div>'
        +'<div class="act-when" style="margin-top:1px;">'+esc(fmtDateTime(a.created_at))+'</div>'
        +(bodyText?'<div class="act-desc">'+esc(bodyText)+'</div>':'')
      +'</div>'+actions+'</div>';
  }

  /* ── activity edit / delete (editable rows only) ── */
  function findAct(id){ for(var i=0;i<_activity.length;i++){ if(String(_activity[i].id)===String(id)) return _activity[i]; } return null; }

  function editActivity(id, btn){
    var a=findAct(id); if(!a) return;
    var row=btn.closest('.act-row'); if(!row) return;
    var type=String(a.type||'').toLowerCase();
    var desc=a.description||a.email_subject||a.sms_body||'';
    var dir=a.direction||'outbound';
    var mins=a.duration_seconds?Math.round(Number(a.duration_seconds)/60):'';
    var html='<div style="flex:1;min-width:0;">';
    if(type==='call'||type==='sms'){
      html+='<div class="seg" style="margin-bottom:8px;">'
        +'<button type="button" data-d="inbound" class="'+(dir==='inbound'?'on':'')+'" onclick="actEditDir(this)">Inbound</button>'
        +'<button type="button" data-d="outbound" class="'+(dir!=='inbound'?'on':'')+'" onclick="actEditDir(this)">Outbound</button>'
      +'</div>';
    }
    if(type==='call'){
      html+='<div style="margin-bottom:8px;"><input class="fld act-edit-mins" type="number" min="0" step="1" placeholder="Minutes" value="'+esc(mins)+'" style="max-width:160px;"></div>';
    }
    html+='<textarea class="fld act-edit-note" rows="3">'+esc(desc)+'</textarea>'
      +'<div style="display:flex;gap:8px;margin-top:8px;">'
        +'<button class="btn-gold" onclick="saveActivityEdit(this)">Save</button>'
        +'<button class="btn-ghost" onclick="cancelActivityEdit(this)">Cancel</button>'
      +'</div></div>';
    row.dataset.editId=String(id);
    row.dataset.editType=type;
    row.dataset.editDir=dir;
    row.innerHTML=html;
    var ta=row.querySelector('.act-edit-note'); if(ta) ta.focus();
  }
  function actEditDir(btn){
    var seg=btn.closest('.seg'); if(seg) Array.prototype.forEach.call(seg.querySelectorAll('button'),function(b){ b.classList.toggle('on', b===btn); });
    var row=btn.closest('.act-row'); if(row) row.dataset.editDir=btn.getAttribute('data-d');
  }
  function cancelActivityEdit(btn){
    var row=btn.closest('.act-row'); if(!row) return;
    var a=findAct(row.dataset.editId); if(a) row.outerHTML=activityItemHTML(a);
  }
  async function saveActivityEdit(btn){
    var row=btn.closest('.act-row'); if(!row) return;
    var id=row.dataset.editId, type=row.dataset.editType||'';
    var a=findAct(id); if(!a) return;
    var note=((row.querySelector('.act-edit-note')||{}).value||'').trim();
    var dir=(type==='call'||type==='sms')?(row.dataset.editDir||'outbound'):null;
    var dur=null;
    if(type==='call'){ var mins=parseFloat((row.querySelector('.act-edit-mins')||{}).value); if(mins>0) dur=Math.round(mins*60); }
    btn.disabled=true; btn.textContent='Saving…';
    try{
      var r=await _authClient().rpc('partner_activity_update',{p_id:a.id,p_note:note||null,p_direction:dir,p_duration:dur});
      if(r.error) throw new Error(r.error.message||'failed');
      a.description=note; a.direction=dir; a.duration_seconds=dur;
      a.email_subject=null; a.sms_body=null; // description is now the canonical body
      renderActivity(); renderMarketing();
      showToast('Updated');
    }catch(e){ btn.disabled=false; btn.textContent='Save'; showToast((e&&e.message)||'Could not update'); }
  }
  async function deleteActivity(id, btn){
    if(!confirm('Delete this entry?')) return;
    var a=findAct(id); if(!a) return;
    try{
      var r=await _authClient().rpc('partner_activity_delete',{p_id:a.id});
      if(r.error) throw new Error(r.error.message||'failed');
      _activity=_activity.filter(function(x){ return String(x.id)!==String(id); });
      renderActivity(); renderMarketing();
      showToast('Deleted');
    }catch(e){ showToast((e&&e.message)||'Could not delete'); }
  }
  function renderActivity(){
    var box=document.getElementById('activityFeed');
    if(!_activity.length){ box.innerHTML='<div class="empty">No activity logged yet.</div>'; return; }
    box.innerHTML=_activity.map(activityItemHTML).join('');
  }
  function renderMarketing(){
    var box=document.getElementById('marketingBox');
    var rows=_activity.filter(function(a){ var t=String(a.type||'').toLowerCase(); return t==='email'||t==='sms'; });
    if(!rows.length){ box.innerHTML='<div class="empty">No marketing activity logged yet.</div>'; return; }
    box.innerHTML='<div class="muted" style="font-size:11px;margin-bottom:8px;">Outbound marketing touches (email &amp; SMS)</div>'
      +rows.map(activityItemHTML).join('');
  }

  /* ── log form ── */
  var _logType=null, _logDir='outbound';
  function openLog(type){
    _logType=type; _logDir='outbound';
    var needsDir=(type==='call'||type==='sms');
    var needsMins=(type==='call');
    var html='<div class="log-form">';
    if(needsDir){
      html+='<div class="seg" id="logSeg">'
        +'<button type="button" class="" data-d="inbound" onclick="setLogDir(\'inbound\')">Inbound</button>'
        +'<button type="button" class="on" data-d="outbound" onclick="setLogDir(\'outbound\')">Outbound</button>'
      +'</div>';
    }
    if(needsMins){
      html+='<div style="margin-bottom:8px;"><input id="logMins" class="fld" type="number" min="0" step="1" placeholder="Minutes (optional)" style="max-width:200px;"></div>';
    }
    html+='<textarea id="logNote" class="fld" rows="3" placeholder="'+(type==='email'?'Email summary…':type==='note'?'Note…':'What happened?…')+'"></textarea>';
    html+='<div style="display:flex;gap:8px;margin-top:10px;">'
      +'<button class="btn-gold" onclick="saveLog()">Save</button>'
      +'<button class="btn-ghost" onclick="closeLog()">Cancel</button>'
    +'</div></div>';
    document.getElementById('logForm').innerHTML=html;
    var ta=document.getElementById('logNote'); if(ta) ta.focus();
  }
  function setLogDir(d){
    _logDir=d;
    var seg=document.getElementById('logSeg'); if(!seg) return;
    Array.prototype.forEach.call(seg.querySelectorAll('button'),function(b){ b.classList.toggle('on', b.getAttribute('data-d')===d); });
  }
  function closeLog(){ document.getElementById('logForm').innerHTML=''; _logType=null; }
  async function saveLog(){
    if(!_logType) return;
    var type=_logType;
    var note=(document.getElementById('logNote')||{}).value || '';
    note=note.trim();
    var dir=(type==='call'||type==='sms')?_logDir:null;
    var dur=null;
    if(type==='call'){ var mins=parseFloat((document.getElementById('logMins')||{}).value); if(mins>0) dur=Math.round(mins*60); }
    var btn=document.querySelector('#logForm .btn-gold'); if(btn){ btn.disabled=true; btn.textContent='Saving…'; }
    try{
      var r=await _authClient().rpc('partner_log_activity',{p_partner_id:partnerId,p_type:type,p_direction:dir,p_note:note||null,p_duration:dur});
      if(r.error) throw new Error(r.error.message||'failed');
      var newId=(r.data && (r.data.id||r.data))||null;
      _activity.unshift({ id:newId, type:type, direction:dir, title:null, description:note, email_subject:null, sms_body:null, duration_seconds:dur, created_at:new Date().toISOString(), editable:true });
      renderActivity(); renderMarketing();
      closeLog();
      showToast(titleCase(type)+' logged');
    }catch(e){
      if(btn){ btn.disabled=false; btn.textContent='Save'; }
      showToast((e&&e.message)||'Could not log activity');
    }
  }

  /* ── tabs ── */
  function switchTab(name, el){
    document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
    if(el) el.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(function(p){ p.classList.remove('active'); });
    var panel=document.getElementById('panel-'+name); if(panel) panel.classList.add('active');
  }
  </script>
</body>
</html>
