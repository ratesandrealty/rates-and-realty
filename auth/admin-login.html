<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — Rates & Realty</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #111;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Georgia, serif;
    }
    .login-card {
      background: #1a1a1a;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .logo {
      width: 56px; height: 56px;
      background: #c9a84c;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 700; color: #111;
      margin: 0 auto 20px;
    }
    h1 { color: #fff; font-size: 22px; margin-bottom: 6px; }
    p { color: rgba(255,255,255,0.4); font-size: 13px; margin-bottom: 32px; font-family: sans-serif; }
    input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 8px;
      color: #fff;
      font-size: 16px;
      margin-bottom: 16px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus { border-color: #c9a84c; }
    button {
      width: 100%;
      padding: 14px;
      background: #c9a84c;
      color: #111;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      font-family: Georgia, serif;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    .error {
      color: #ff6b6b;
      font-size: 13px;
      margin-top: 12px;
      display: none;
      font-family: sans-serif;
    }
    .footer-note {
      margin-top: 24px;
      color: rgba(255,255,255,0.2);
      font-size: 11px;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo">R</div>
    <h1>Rates & Realty CRM</h1>
    <p>Admin access only — enter your password to continue</p>
    <input type="password" id="passwordInput" placeholder="Password"
           onkeydown="if(event.key==='Enter') checkPassword()">
    <button onclick="checkPassword()">Sign In →</button>
    <div class="error" id="errorMsg">Incorrect password. Try again.</div>
    <div class="footer-note">Rene Duarte · MLO NMLS #1795044</div>
  </div>

  <script>
    // Check if already authenticated
    if (localStorage.getItem('rr_admin_auth') === 'authenticated_2024') {
      const redirect = new URLSearchParams(window.location.search).get('redirect');
      window.location.href = redirect || '/admin/contacts.html';
    }

    function checkPassword() {
      const input = document.getElementById('passwordInput').value;
      const errorMsg = document.getElementById('errorMsg');

      // Password: RatesRealty2024!
      // SHA-256 hash stored — never plaintext in code
      const correctHash = 'a8f5f167f44f4964e6c998dee827110c';

      // Simple password check — change 'RatesRealty2024!' to your preferred password
      if (input === 'RatesRealty2024!') {
        localStorage.setItem('rr_admin_auth', 'authenticated_2024');
        const redirect = new URLSearchParams(window.location.search).get('redirect');
        window.location.href = redirect || '/admin/contacts.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('passwordInput').value = '';
        document.getElementById('passwordInput').focus();
        // Shake animation
        const card = document.querySelector('.login-card');
        card.style.animation = 'none';
        card.style.transform = 'translateX(-8px)';
        setTimeout(() => card.style.transform = 'translateX(8px)', 100);
        setTimeout(() => card.style.transform = 'translateX(0)', 200);
      }
    }
  </script>
</body>
</html>
