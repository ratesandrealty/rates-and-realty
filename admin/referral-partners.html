<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Referral Partners — Rates & Realty CRM</title>
<script src="/api/env.js?v=2026033003"></script>
<style>
:root{--gold:#c9a84c;--gold2:#e4b84e;--bg:#0a0a0a;--surface:#111;--surface2:#181818;--surface3:#222;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#fff;--muted:rgba(255,255,255,0.38);--green:#50c878;--red:#f87171;--blue:#60a0ff;--orange:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

.topbar{display:flex;align-items:center;gap:10px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar h1{font-size:16px;font-weight:800;color:var(--gold)}
.topbar-right{margin-left:auto;display:flex;gap:8px}
.btn{padding:7px 16px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}
.btn-gold:hover{background:var(--gold2)}
.btn-ghost{background:rgba(255,255,255,0.06);color:#fff;border:1px solid var(--border2)}
.btn-ghost:hover{background:rgba(255,255,255,0.1)}
.btn-sm{padding:5px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px;font-weight:700}

.stats-bar{display:flex;gap:12px;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface)}
.stat-card{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;flex:1;text-align:center}
.stat-num{font-size:22px;font-weight:800;color:var(--gold)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:0.5px}

.filter-bar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid var(--border);flex-wrap:wrap}
.search-wrap{position:relative;flex:1;max-width:300px}
.search-wrap input{width:100%;padding:7px 12px 7px 30px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:13px;outline:none}
.search-wrap input:focus{border-color:rgba(201,168,76,0.4)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:12px;pointer-events:none}
.fchip{padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:20px;font-size:11px;color:var(--muted);cursor:pointer;transition:all .15s;white-space:nowrap}
.fchip:hover,.fchip.active{background:rgba(201,168,76,0.08);border-color:rgba(201,168,76,0.25);color:var(--gold)}

.partners-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;padding:20px}

.partner-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer}
.partner-card:hover{border-color:rgba(201,168,76,0.3);box-shadow:0 6px 24px rgba(0,0,0,0.4);transform:translateY(-2px)}
.pc-header{padding:16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border)}
.pc-av{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;flex-shrink:0}
.pc-name{font-size:14px;font-weight:700}
.pc-title{font-size:11px;color:var(--muted);margin-top:2px}
.pc-badge{margin-left:auto;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;flex-shrink:0}
.badge-active{background:rgba(80,200,120,0.12);color:var(--green)}
.badge-vip{background:rgba(201,168,76,0.15);color:var(--gold)}
.badge-inactive{background:rgba(255,255,255,0.06);color:var(--muted)}
.pc-body{padding:14px 16px}
.pc-info-row{display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.6);margin-bottom:6px}
.pc-info-row .icon{font-size:12px;color:var(--muted);width:16px;text-align:center}
.pc-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.pc-stat{text-align:center}
.pc-stat-num{font-size:15px;font-weight:700;color:var(--gold)}
.pc-stat-lbl{font-size:10px;color:var(--muted);margin-top:1px}
.pc-actions{display:flex;gap:6px;padding:10px 16px;border-top:1px solid var(--border)}

.type-pill{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.3px}
.type-realtor{background:rgba(96,160,255,0.12);color:#60a0ff}
.type-cpa{background:rgba(192,132,240,0.12);color:#c084f0}
.type-attorney{background:rgba(251,146,60,0.12);color:#fb923c}
.type-financial{background:rgba(80,200,120,0.12);color:#50c878}
.type-other{background:rgba(255,255,255,0.06);color:var(--muted)}

.empty{text-align:center;padding:60px;color:var(--muted)}
.empty .icon{font-size:48px;margin-bottom:12px}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface2);border-radius:16px;width:100%;max-width:540px;max-height:90vh;display:flex;flex-direction:column;border:1px solid var(--border2);overflow:hidden}
.modal-hdr{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-hdr h2{font-size:15px;font-weight:700}
.modal-body{flex:1;overflow-y:auto;padding:20px}
.modal-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}
.fld{margin-bottom:13px}
.fld label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;color:var(--muted);display:block;margin-bottom:5px}
.fld input,.fld select,.fld textarea{width:100%;padding:9px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);border-radius:8px;color:#fff;font-size:13px;outline:none;font-family:inherit;transition:border-color .15s}
.fld input:focus,.fld select:focus{border-color:rgba(201,168,76,0.35)}
.fld select option{background:#181818}
.fld textarea{min-height:70px;resize:vertical}
.fld-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.detail-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:100;align-items:center;justify-content:flex-end}
.detail-overlay.open{display:flex}
.detail-panel{width:420px;height:100%;background:var(--surface);border-left:1px solid var(--border2);display:flex;flex-direction:column;overflow:hidden}
.dp-header{padding:20px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:12px}
.dp-av{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;flex-shrink:0}
.dp-body{flex:1;overflow-y:auto;padding:20px}
.dp-section{margin-bottom:20px}
.dp-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:0.7px;color:var(--muted);margin-bottom:10px}
.dp-row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px}
.dp-row:last-child{border-bottom:none}
.dp-row-label{color:var(--muted);font-size:12px}
.referral-list-item{display:flex;align-items:center;gap:10px;padding:8px 10px;background:rgba(255,255,255,0.03);border-radius:8px;margin-bottom:6px;border:1px solid var(--border);cursor:pointer;transition:all .15s}
.referral-list-item:hover{border-color:rgba(201,168,76,0.2);background:rgba(201,168,76,0.04)}

#toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border2);border-radius:10px;padding:9px 18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999}
#toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <a href="people.html" style="color:var(--muted);text-decoration:none;font-size:12px;margin-right:4px;">← Back</a>
  <h1>🤝 Referral Partners</h1>
  <div class="topbar-right">
    <button class="btn btn-ghost btn-sm" onclick="exportCSV()">📥 Export</button>
    <button class="btn btn-gold" onclick="openAddModal()">+ Add Partner</button>
  </div>
</div>

<div class="stats-bar" id="statsBar">
  <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-lbl">Total Partners</div></div>
  <div class="stat-card"><div class="stat-num" id="statVIP">—</div><div class="stat-lbl">VIP Partners</div></div>
  <div class="stat-card"><div class="stat-num" id="statReferrals">—</div><div class="stat-lbl">Total Referrals</div></div>
  <div class="stat-card"><div class="stat-num" id="statClosed">—</div><div class="stat-lbl">Deals Closed</div></div>
  <div class="stat-card"><div class="stat-num" id="statVolume">—</div><div class="stat-lbl">Total Volume</div></div>
</div>

<div class="filter-bar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Search partners..." oninput="filterPartners()">
  </div>
  <div class="fchip active" id="ft-all" onclick="setTypeFilter('all',this)">All</div>
  <div class="fchip" id="ft-Realtor" onclick="setTypeFilter('Realtor',this)">🏠 Realtor</div>
  <div class="fchip" id="ft-Financial Advisor" onclick="setTypeFilter('Financial Advisor',this)">💼 Financial Advisor</div>
  <div class="fchip" id="ft-CPA" onclick="setTypeFilter('CPA',this)">📊 CPA</div>
  <div class="fchip" id="ft-Attorney" onclick="setTypeFilter('Attorney',this)">⚖️ Attorney</div>
  <div class="fchip" id="ft-Insurance Agent" onclick="setTypeFilter('Insurance Agent',this)">🛡 Insurance</div>
  <div style="margin-left:auto;display:flex;gap:6px;">
    <div class="fchip" id="fs-Active" onclick="setStatusFilter('Active',this)">Active</div>
    <div class="fchip" id="fs-VIP" onclick="setStatusFilter('VIP',this)">⭐ VIP</div>
  </div>
</div>

<div class="partners-grid" id="partnersGrid">
  <div class="empty"><div class="icon">🤝</div><div>Loading partners...</div></div>
</div>

<div class="modal-overlay" id="addModal">
  <div class="modal">
    <div class="modal-hdr">
      <h2 id="modalTitle">🤝 Add Referral Partner</h2>
      <button class="btn btn-ghost btn-sm" onclick="closeAddModal()">✕</button>
    </div>
    <div class="modal-body">
      <div class="fld-row">
        <div class="fld"><label>First Name *</label><input type="text" id="pf_first" placeholder="First name"></div>
        <div class="fld"><label>Last Name</label><input type="text" id="pf_last" placeholder="Last name"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Company / Brokerage</label><input type="text" id="pf_company" placeholder="e.g. Compass Real Estate"></div>
        <div class="fld"><label>Title</label><input type="text" id="pf_title" placeholder="e.g. Senior Realtor"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Email</label><input type="email" id="pf_email" placeholder="partner@example.com"></div>
        <div class="fld"><label>Phone</label><input type="tel" id="pf_phone" placeholder="(714) 555-1234"></div>
      </div>
      <div class="fld-row">
        <div class="fld"><label>Partner Type</label>
          <select id="pf_type">
            <option value="Realtor">🏠 Realtor</option>
            <option value="Financial Advisor">💼 Financial Advisor</option>
            <option value="CPA">📊 CPA</option>
            <option value="Attorney">⚖️ Attorney</option>
            <option value="Insurance Agent">🛡 Insurance Agent</option>
            <option value="Builder">🏗 Builder</option>
            <option value="Other">Other</option>
          </select>
        </div>
        <div class="fld"><label>Status</label>
          <select id="pf_status">
            <option value="Active">Active</option>
            <option value="VIP">⭐ VIP</option>
            <option value="Inactive">Inactive</option>
          </select>
        </div>
      </div>
      <div class="fld"><label>Notes</label><textarea id="pf_notes" placeholder="Any notes about this partner..."></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeAddModal()">Cancel</button>
      <button class="btn btn-gold" id="savePartnerBtn" onclick="savePartner()">Add Partner</button>
    </div>
  </div>
</div>

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel" id="detailPanel"></div>
</div>

<div id="toast"></div>

<script>
const SB = window.APP_CONFIG?.SUPABASE_URL || 'https://ljywhvbmsibwnssxpesh.supabase.co';
const KEY = window.APP_CONFIG?.SUPABASE_ANON_KEY;
const H = () => ({ apikey: KEY, Authorization: `Bearer ${KEY}`, 'Content-Type': 'application/json', Prefer: 'return=representation' });

let _partners = [], _filtered = [], _editId = null;
let _typeFilter = 'all', _statusFilter = 'all';

const AV_BG = ['#c9a84c25','#50c87825','#60a0ff25','#c084f025','#fb923c25','#f8717125'];
const AV_FG = ['#c9a84c','#50c878','#60a0ff','#c084f0','#fb923c','#f87171'];
function avStyle(name) { const i = (name||'?').charCodeAt(0) % 6; return { bg: AV_BG[i], fg: AV_FG[i] }; }
function initials(f, l) { return `${(f||'?')[0]}${(l||'')[0]||''}`.toUpperCase(); }
function typeClass(t) { const m = { 'Realtor':'realtor','CPA':'cpa','Attorney':'attorney','Financial Advisor':'financial','Insurance Agent':'financial','Builder':'other','Other':'other' }; return m[t] || 'other'; }
function fmt$(n) { if(!n) return '$0'; if(n >= 1000000) return '$'+(n/1000000).toFixed(1)+'M'; if(n >= 1000) return '$'+(n/1000).toFixed(0)+'K'; return '$'+n; }
function getTimeAgo(d) { const diff = Math.floor((Date.now()-new Date(d))/86400000); return diff===0?'Today':diff===1?'Yesterday':diff<7?diff+'d ago':Math.floor(diff/7)+'w ago'; }

async function loadPartners() {
  const [pRes, rRes] = await Promise.all([
    fetch(`${SB}/rest/v1/referral_partners?order=created_at.desc`, { headers: H() }),
    fetch(`${SB}/rest/v1/contacts?select=id,first_name,last_name,referral_partner_id&not.referral_partner_id.is.null`, { headers: H() })
  ]);
  _partners = await pRes.json();
  const referrals = await rRes.json();
  const refCount = {};
  referrals.forEach(r => { refCount[r.referral_partner_id] = (refCount[r.referral_partner_id] || 0) + 1; });
  _partners.forEach(p => { p._referral_count = refCount[p.id] || p.total_referrals || 0; });
  updateStats();
  filterPartners();
}

function updateStats() {
  document.getElementById('statTotal').textContent = _partners.length;
  document.getElementById('statVIP').textContent = _partners.filter(p => p.status === 'VIP').length;
  document.getElementById('statReferrals').textContent = _partners.reduce((s,p) => s + (p._referral_count||0), 0);
  document.getElementById('statClosed').textContent = _partners.reduce((s,p) => s + (p.total_closed||0), 0);
  document.getElementById('statVolume').textContent = fmt$(_partners.reduce((s,p) => s + (p.total_volume||0), 0));
}

function setTypeFilter(type, el) { _typeFilter = type; document.querySelectorAll('[id^="ft-"]').forEach(e => e.classList.remove('active')); el.classList.add('active'); filterPartners(); }
function setStatusFilter(status, el) { _statusFilter = _statusFilter === status ? 'all' : status; document.querySelectorAll('[id^="fs-"]').forEach(e => e.classList.remove('active')); if (_statusFilter !== 'all') el.classList.add('active'); filterPartners(); }

function filterPartners() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  _filtered = _partners.filter(p => {
    if (_typeFilter !== 'all' && p.source_type !== _typeFilter) return false;
    if (_statusFilter !== 'all' && p.status !== _statusFilter) return false;
    if (q) { const hay = `${p.first_name} ${p.last_name} ${p.company} ${p.email} ${p.phone}`.toLowerCase(); if (!hay.includes(q)) return false; }
    return true;
  });
  renderGrid();
}

function renderGrid() {
  const grid = document.getElementById('partnersGrid');
  if (!_filtered.length) { grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="icon">🤝</div><div style="font-size:15px;font-weight:700;margin-bottom:6px">No referral partners yet</div><div style="font-size:13px;margin-bottom:16px">Add your first referral partner to start tracking</div><button class="btn btn-gold" onclick="openAddModal()">+ Add Partner</button></div>`; return; }
  grid.innerHTML = _filtered.map(p => {
    const av = avStyle(p.first_name); const init = initials(p.first_name, p.last_name);
    const name = `${p.first_name||''} ${p.last_name||''}`.trim();
    const badgeClass = p.status === 'VIP' ? 'badge-vip' : p.status === 'Inactive' ? 'badge-inactive' : 'badge-active';
    return `<div class="partner-card" onclick="openDetail('${p.id}')">
      <div class="pc-header">
        <div class="pc-av" style="background:${av.bg};color:${av.fg}">${init}</div>
        <div style="flex:1;min-width:0"><div class="pc-name">${name}</div><div class="pc-title">${p.title||p.source_type||''} ${p.company ? '· '+p.company : ''}</div></div>
        <span class="pc-badge ${badgeClass}">${p.status === 'VIP' ? '⭐ VIP' : p.status}</span>
      </div>
      <div class="pc-body">
        <span class="type-pill type-${typeClass(p.source_type||'Other')}">${p.source_type||'Other'}</span>
        ${p.email ? `<div class="pc-info-row" style="margin-top:10px"><span class="icon">✉️</span>${p.email}</div>` : ''}
        ${p.phone ? `<div class="pc-info-row"><span class="icon">📞</span>${p.phone}</div>` : ''}
        ${p.notes ? `<div style="font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4">${p.notes.substring(0,80)}${p.notes.length>80?'…':''}</div>` : ''}
        <div class="pc-stats">
          <div class="pc-stat"><div class="pc-stat-num">${p._referral_count||0}</div><div class="pc-stat-lbl">Referrals</div></div>
          <div class="pc-stat"><div class="pc-stat-num">${p.total_closed||0}</div><div class="pc-stat-lbl">Closed</div></div>
          <div class="pc-stat"><div class="pc-stat-num">${fmt$(p.total_volume||0)}</div><div class="pc-stat-lbl">Volume</div></div>
        </div>
      </div>
      <div class="pc-actions">
        ${p.phone ? `<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();window.location.href='tel:${p.phone}'">📞 Call</button>` : ''}
        ${p.email ? `<button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();window.location.href='mailto:${p.email}'">✉️ Email</button>` : ''}
        <button class="btn btn-ghost btn-xs" onclick="event.stopPropagation();editPartner('${p.id}')">✏️ Edit</button>
      </div>
    </div>`;
  }).join('');
}

async function openDetail(id) {
  const p = _partners.find(x => x.id === id); if (!p) return;
  const av = avStyle(p.first_name); const init = initials(p.first_name, p.last_name);
  const name = `${p.first_name||''} ${p.last_name||''}`.trim();
  const rRes = await fetch(`${SB}/rest/v1/contacts?select=id,first_name,last_name,email,pipeline_status,created_at&referral_partner_id=eq.${id}&order=created_at.desc`, { headers: H() });
  const refs = await rRes.json();
  document.getElementById('detailPanel').innerHTML = `
    <div class="dp-header">
      <div class="dp-av" style="background:${av.bg};color:${av.fg}">${init}</div>
      <div style="flex:1"><div style="font-size:16px;font-weight:800">${name}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">${p.title||''} ${p.company?'· '+p.company:''}</div>
        <div style="margin-top:6px;display:flex;gap:6px"><span class="type-pill type-${typeClass(p.source_type||'')}">${p.source_type||'Other'}</span><span class="pc-badge ${p.status==='VIP'?'badge-vip':p.status==='Inactive'?'badge-inactive':'badge-active'}">${p.status}</span></div>
      </div>
      <button onclick="closeDetail()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;padding:4px">✕</button>
    </div>
    <div class="dp-body">
      <div class="dp-section"><div class="dp-section-title">📊 Performance</div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px">
          <div class="stat-card"><div class="stat-num">${p._referral_count||0}</div><div class="stat-lbl">Referrals</div></div>
          <div class="stat-card"><div class="stat-num">${p.total_closed||0}</div><div class="stat-lbl">Closed</div></div>
          <div class="stat-card"><div class="stat-num">${fmt$(p.total_volume||0)}</div><div class="stat-lbl">Volume</div></div>
        </div>
      </div>
      <div class="dp-section"><div class="dp-section-title">📋 Contact Info</div>
        ${p.email ? `<div class="dp-row"><span class="dp-row-label">Email</span><a href="mailto:${p.email}" style="color:var(--gold);font-size:12px">${p.email}</a></div>` : ''}
        ${p.phone ? `<div class="dp-row"><span class="dp-row-label">Phone</span><a href="tel:${p.phone}" style="color:var(--gold);font-size:12px">${p.phone}</a></div>` : ''}
        ${p.company ? `<div class="dp-row"><span class="dp-row-label">Company</span><span style="font-size:12px">${p.company}</span></div>` : ''}
      </div>
      ${p.notes ? `<div class="dp-section"><div class="dp-section-title">📝 Notes</div><div style="font-size:13px;color:rgba(255,255,255,0.6);line-height:1.6">${p.notes}</div></div>` : ''}
      <div class="dp-section">
        <div class="dp-section-title" style="display:flex;align-items:center;justify-content:space-between">Referred Borrowers (${refs.length})<button class="btn btn-ghost btn-xs" onclick="window.location.href='people.html'">View All →</button></div>
        ${refs.length ? refs.map(r => `<div class="referral-list-item" onclick="window.location.href='lead-detail.html?contact_id=${r.id}'">
          <div style="width:28px;height:28px;border-radius:50%;background:rgba(201,168,76,0.15);color:var(--gold);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center">${(r.first_name||'?')[0]}${(r.last_name||'')[0]||''}</div>
          <div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600">${r.first_name||''} ${r.last_name||''}</div><div style="font-size:10px;color:var(--muted)">${r.pipeline_status||'New Lead'}</div></div>
          <span style="font-size:10px;color:var(--muted)">${getTimeAgo(r.created_at)}</span>
        </div>`).join('') : '<div style="font-size:12px;color:var(--muted);padding:8px 0">No referrals yet</div>'}
      </div>
      <div style="display:flex;gap:8px;margin-top:12px">
        <button class="btn btn-gold btn-sm" style="flex:1" onclick="editPartner('${p.id}');closeDetail()">✏️ Edit Partner</button>
        <button class="btn btn-ghost btn-sm" onclick="if(confirm('Delete this partner?'))deletePartner('${p.id}')">🗑</button>
      </div>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail() { document.getElementById('detailOverlay').classList.remove('open'); }

function openAddModal() { _editId = null; document.getElementById('modalTitle').textContent = '🤝 Add Referral Partner'; document.getElementById('savePartnerBtn').textContent = 'Add Partner'; ['pf_first','pf_last','pf_company','pf_title','pf_email','pf_phone','pf_notes'].forEach(id => document.getElementById(id).value = ''); document.getElementById('pf_type').value = 'Realtor'; document.getElementById('pf_status').value = 'Active'; document.getElementById('addModal').classList.add('open'); setTimeout(() => document.getElementById('pf_first').focus(), 50); }
function closeAddModal() { document.getElementById('addModal').classList.remove('open'); }

function editPartner(id) { const p = _partners.find(x => x.id === id); if (!p) return; _editId = id; document.getElementById('modalTitle').textContent = '✏️ Edit Partner'; document.getElementById('savePartnerBtn').textContent = 'Save Changes'; document.getElementById('pf_first').value = p.first_name || ''; document.getElementById('pf_last').value = p.last_name || ''; document.getElementById('pf_company').value = p.company || ''; document.getElementById('pf_title').value = p.title || ''; document.getElementById('pf_email').value = p.email || ''; document.getElementById('pf_phone').value = p.phone || ''; document.getElementById('pf_type').value = p.source_type || 'Realtor'; document.getElementById('pf_status').value = p.status || 'Active'; document.getElementById('pf_notes').value = p.notes || ''; document.getElementById('addModal').classList.add('open'); }

async function savePartner() {
  const first = document.getElementById('pf_first').value.trim(); if (!first) { showToast('First name required'); return; }
  const payload = { first_name: first, last_name: document.getElementById('pf_last').value.trim() || null, company: document.getElementById('pf_company').value.trim() || null, title: document.getElementById('pf_title').value.trim() || null, email: document.getElementById('pf_email').value.trim() || null, phone: document.getElementById('pf_phone').value.trim() || null, source_type: document.getElementById('pf_type').value, status: document.getElementById('pf_status').value, notes: document.getElementById('pf_notes').value.trim() || null, updated_at: new Date().toISOString() };
  const url = _editId ? `${SB}/rest/v1/referral_partners?id=eq.${_editId}` : `${SB}/rest/v1/referral_partners`;
  const r = await fetch(url, { method: _editId ? 'PATCH' : 'POST', headers: H(), body: JSON.stringify(payload) });
  if (r.ok) { closeAddModal(); await loadPartners(); showToast(_editId ? '✓ Partner updated!' : '✓ Partner added!'); } else showToast('⚠️ Save failed');
}

async function deletePartner(id) { await fetch(`${SB}/rest/v1/referral_partners?id=eq.${id}`, { method: 'DELETE', headers: H() }); closeDetail(); await loadPartners(); showToast('Partner deleted'); }

function exportCSV() {
  const rows = [['Name','Company','Title','Type','Email','Phone','Status','Referrals','Closed','Volume']];
  _partners.forEach(p => rows.push([`${p.first_name||''} ${p.last_name||''}`.trim(), p.company||'', p.title||'', p.source_type||'', p.email||'', p.phone||'', p.status||'', p._referral_count||0, p.total_closed||0, p.total_volume||0]));
  const csv = rows.map(r => r.map(c => `"${c}"`).join(',')).join('\n');
  const a = document.createElement('a'); a.href = URL.createObjectURL(new Blob([csv],{type:'text/csv'})); a.download = 'referral-partners.csv'; a.click();
}

function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

loadPartners();
</script>
</body>
</html>
