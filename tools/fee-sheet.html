<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Sheet Generator | Rates &amp; Realty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --gold: #C9A84C;
            --gold-light: rgba(201,168,76,0.08);
            --gold-border: rgba(201,168,76,0.25);
            --sidebar-bg: #0A0A0A;
            --sidebar-w: 340px;
            --credit-green: #2ecc71;
            --sheet-max: 1060px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: var(--sidebar-w);
            min-width: var(--sidebar-w);
            background: var(--sidebar-bg);
            border-right: 1px solid #222;
            padding: 20px 18px 30px;
            overflow-y: auto;
            height: 100vh;
            position: sticky;
            top: 0;
        }

        .sidebar a.back-link {
            color: var(--gold);
            text-decoration: none;
            font-size: 13px;
            display: inline-block;
            margin-bottom: 14px;
        }
        .sidebar a.back-link:hover { text-decoration: underline; }

        .sidebar h2 {
            font-family: 'Playfair Display', serif;
            color: #fff;
            font-size: 20px;
            margin-bottom: 18px;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
        }

        .sidebar h3 {
            color: var(--gold);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            margin: 18px 0 8px;
        }

        .field { margin-bottom: 10px; }
        .field label {
            display: block;
            font-size: 11px;
            color: #999;
            margin-bottom: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .field input, .field select {
            width: 100%;
            padding: 8px 10px;
            background: #151515;
            border: 1px solid #333;
            border-radius: 6px;
            color: #e0e0e0;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            outline: none;
            transition: border-color .2s;
        }
        .field input:focus, .field select:focus {
            border-color: var(--gold);
        }
        .field input[type="number"] {
            font-family: 'DM Mono', monospace;
        }

        .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

        /* scenario card */
        .scenario-card {
            background: #111;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
        }
        .scenario-card.recommended { border-color: var(--gold); }
        .scenario-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .scenario-header span {
            font-weight: 600;
            color: #fff;
            font-size: 14px;
        }
        .btn-recommend {
            padding: 4px 10px;
            font-size: 11px;
            border-radius: 4px;
            border: 1px solid #555;
            background: transparent;
            color: #888;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-recommend.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            font-weight: 600;
        }

        .sidebar-actions {
            margin-top: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .btn-gold {
            padding: 12px;
            background: var(--gold);
            color: #000;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: filter .2s;
        }
        .btn-gold:hover { filter: brightness(1.1); }
        .btn-outline {
            padding: 10px;
            background: transparent;
            color: #ccc;
            border: 1px solid #444;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-weight: 600;
            font-size: 13px;
            cursor: pointer;
            transition: all .2s;
        }
        .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #222;
            color: var(--gold);
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 13px;
            border: 1px solid var(--gold);
            opacity: 0;
            transition: all .3s;
            z-index: 999;
        }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

        /* ── MAIN / SHEET ── */
        .main {
            flex: 1;
            padding: 40px;
            display: flex;
            justify-content: center;
            overflow-y: auto;
        }

        .sheet {
            background: #fff;
            color: #1a1a1a;
            width: 100%;
            max-width: var(--sheet-max);
            padding: 50px 52px;
            border-radius: 4px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            font-size: 13px;
            line-height: 1.5;
            align-self: flex-start;
        }

        .sheet .mono {
            font-family: 'DM Mono', monospace;
            font-size: 12.5px;
        }

        /* header */
        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 24px;
            border-bottom: 2px solid var(--gold);
            padding-bottom: 18px;
        }
        .sheet-header-left { display: flex; align-items: center; gap: 14px; }
        .sheet-logo { height: 52px; }
        .sheet-logo-text {
            font-family: 'Playfair Display', serif;
            font-size: 22px;
            font-weight: 700;
            color: #111;
        }
        .sheet-logo-tag { font-size: 11px; color: #888; letter-spacing: 0.5px; }
        .sheet-header-right { text-align: right; font-size: 12px; color: #555; }
        .sheet-header-right strong { color: #111; }

        .quote-bar {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #555;
            margin-bottom: 6px;
        }
        .borrower-bar {
            margin-bottom: 20px;
            font-size: 13px;
        }
        .borrower-bar strong { color: #111; }

        /* summary strip */
        .summary-strip {
            display: flex;
            background: var(--gold-light);
            border: 1px solid var(--gold-border);
            border-radius: 6px;
            padding: 12px 0;
            margin-bottom: 24px;
        }
        .summary-strip .item {
            flex: 1;
            text-align: center;
            border-right: 1px solid var(--gold-border);
            padding: 0 10px;
        }
        .summary-strip .item:last-child { border-right: none; }
        .summary-strip .item .lbl { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 0.6px; }
        .summary-strip .item .val { font-family: 'DM Mono', monospace; font-weight: 600; font-size: 14px; color: #111; margin-top: 2px; }

        /* fee table */
        .fee-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        .fee-table th, .fee-table td {
            padding: 6px 10px;
            font-size: 12px;
            vertical-align: top;
        }
        /* Rate cards */
        .rate-cards { display: flex; gap: 0; margin-bottom: 0; }
        .rate-card {
            flex: 1;
            text-align: center;
            padding: 18px 10px 14px;
            background: #fafafa;
            border: 1px solid #e8e8e8;
            border-bottom: none;
            position: relative;
        }
        .rate-card:first-child { border-left: 1px solid #e8e8e8; }
        .rate-card.rec {
            background: #FFFDF5;
            border-top: 3px solid var(--gold);
            border-left-color: rgba(201,168,76,0.3);
            border-right-color: rgba(201,168,76,0.3);
        }
        .rate-card + .rate-card { border-left: none; }
        .rate-card-label {
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 10px;
            color: #8A8478;
            font-weight: 600;
            margin-bottom: 4px;
        }
        .rate-card-rate {
            font-family: 'Playfair Display', serif;
            font-size: 42px;
            font-weight: 700;
            color: #1A1A1A;
            line-height: 1.1;
        }
        .rate-card.rec .rate-card-rate { color: var(--gold); }
        .rate-card-apr {
            font-size: 12px;
            color: #8A8478;
            margin-top: 2px;
        }
        .rate-card-pill {
            display: inline-block;
            border-radius: 20px;
            padding: 3px 12px;
            font-size: 11px;
            font-weight: 700;
            margin-top: 6px;
        }
        .pill-none { background: #f0f0f0; color: #888; }
        .pill-cost { background: rgba(231,76,60,0.1); color: #c0392b; }
        .pill-credit { background: rgba(46,204,113,0.1); color: #27ae60; }
        .rate-cards-spacer { width: 0; flex: 0 0 0; } /* placeholder for Fee Description col alignment */

        .fee-table thead th {
            background: #111;
            color: #fff;
            font-weight: 600;
            text-align: center;
            font-size: 11px;
            padding: 6px 10px;
        }
        .fee-table thead th:first-child {
            text-align: left;
            width: 40%;
        }
        .fee-table thead th.rec-col {
            background: #2a2208;
            color: var(--gold);
        }
        .fee-table .cat-header td {
            background: #f5f5f5;
            font-weight: 700;
            font-size: 11.5px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #333;
            padding-top: 10px;
            padding-bottom: 6px;
            border-bottom: 1px solid #ddd;
        }
        .fee-table .row-item td {
            border-bottom: 1px solid #eee;
        }
        .fee-table .row-item td:first-child {
            color: #1A1A1A;
        }
        .fee-table .row-item td:not(:first-child) {
            text-align: right;
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            color: #1A1A1A;
        }
        .fee-table .subtotal td {
            border-top: 1.5px solid #ccc;
            border-bottom: 2px solid #ccc;
            font-weight: 700;
            font-size: 12px;
        }
        .fee-table .subtotal td:not(:first-child) {
            text-align: right;
            font-family: 'DM Mono', monospace;
            color: #1A1A1A;
        }
        .fee-table .grand-total td {
            background: #111;
            color: #fff;
            font-weight: 700;
            font-size: 13px;
        }
        .fee-table .grand-total td:not(:first-child) {
            text-align: right;
            font-family: 'DM Mono', monospace;
        }
        .fee-table .grand-total td.rec-col-cell { background: #2a2208; color: var(--gold); }

        .credit { color: var(--credit-green) !important; }

        .rec-col-cell {
            background: rgba(201,168,76,0.06) !important;
            border-left: 2px solid rgba(201,168,76,0.3) !important;
            border-right: 2px solid rgba(201,168,76,0.3) !important;
        }

        /* cash to close */
        .ctc-section {
            margin-bottom: 24px;
        }
        .ctc-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            margin-bottom: 8px;
            color: #111;
        }

        /* monthly payment */
        .monthly-section { margin-bottom: 20px; }
        .monthly-section h4 {
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            margin-bottom: 8px;
            color: #111;
        }
        .monthly-table {
            width: 100%;
            border-collapse: collapse;
        }
        .monthly-table th, .monthly-table td {
            padding: 6px 10px;
            font-size: 12px;
        }
        .monthly-table thead th {
            background: #111;
            color: #fff;
            font-weight: 600;
            text-align: center;
        }
        .monthly-table thead th:first-child { text-align: left; width: 40%; }
        .monthly-table thead th.rec-col { background: #2a2208; color: var(--gold); }
        .monthly-table td { border-bottom: 1px solid #eee; }
        .monthly-table td:not(:first-child) { text-align: right; font-family: 'DM Mono', monospace; font-size: 12px; color: #1A1A1A; }
        .monthly-table .total-row td { background: #f5f5f5; font-weight: 700; border-top: 2px solid #ccc; }
        .monthly-table .total-row td.rec-col-cell { background: rgba(201,168,76,0.12); }

        /* footer */
        .sheet-footer {
            border-top: 1px solid #ddd;
            padding-top: 14px;
            margin-top: 20px;
            font-size: 10px;
            color: #999;
            line-height: 1.6;
        }

        /* PRINT */
        @media print {
            body { background: #fff; }
            .sidebar, .toast { display: none !important; }
            .main { padding: 0; }
            .sheet {
                box-shadow: none;
                border-radius: 0;
                max-width: 100%;
                padding: 30px 40px;
            }
            .rate-card { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .rate-card.rec { background: #FFFDF5 !important; border-top-color: #C9A84C !important; }
            .rate-card-pill { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
            .rec-col-cell {
                background: #fdf8e8 !important;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
            .fee-table thead th, .monthly-table thead th, .fee-table .grand-total td {
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
            }
        }

        @media (max-width: 1100px) {
            .sidebar { width: 300px; min-width: 300px; }
        }
    </style>
</head>
<body>

<script>
// ── Helpers ──
const $ = id => document.getElementById(id);
const fmt = (n, decimals=2) => {
    if (n == null || isNaN(n)) return '$0.00';
    const abs = Math.abs(n);
    const str = abs.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
    return n < 0 ? `<span class="credit">($${str})</span>` : `$${str}`;
};
const fmtPlain = (n, decimals=2) => {
    if (n == null || isNaN(n)) return '$0.00';
    const abs = Math.abs(n);
    const str = abs.toLocaleString('en-US', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
    return n < 0 ? `($${str})` : `$${str}`;
};
const parseCurrency = s => {
    if (!s) return 0;
    return parseFloat(String(s).replace(/[^0-9.\-]/g, '')) || 0;
};

function formatCurrencyInput(el) {
    el.addEventListener('blur', () => {
        const v = parseCurrency(el.value);
        if (v) el.value = '$' + v.toLocaleString('en-US', {minimumFractionDigits: 0, maximumFractionDigits: 0});
    });
}

function showToast(msg) {
    const t = $('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Scenarios ──
// County loan limits (2026 California)
const LOAN_LIMITS = {
  'Los Angeles':{conforming:1149825},'Orange':{conforming:1149825},'San Diego':{conforming:1006250},
  'San Francisco':{conforming:1149825},'Santa Clara':{conforming:1149825},'Alameda':{conforming:1149825},
  'Contra Costa':{conforming:1149825},'San Mateo':{conforming:1149825},'Marin':{conforming:1149825},
  'Ventura':{conforming:805000},'Riverside':{conforming:726200},'San Bernardino':{conforming:726200},
  'Sacramento':{conforming:763600},'Fresno':{conforming:726200},'Kern':{conforming:726200},
  'Sonoma':{conforming:877450},'Santa Barbara':{conforming:805000},'Monterey':{conforming:920200},
  'Santa Cruz':{conforming:1149825},'Napa':{conforming:1017750},'Solano':{conforming:726200},
  'Stanislaus':{conforming:726200},'San Joaquin':{conforming:726200},'Madera':{conforming:726200},
  'San Luis Obispo':{conforming:911950},'Lake':{conforming:726200},'Mendocino':{conforming:726200},
};
const ZIP_TO_COUNTY = {
  '926':'Orange','927':'Orange','928':'Orange',
  '900':'Los Angeles','901':'Los Angeles','902':'Los Angeles','903':'Los Angeles','904':'Los Angeles','905':'Los Angeles','906':'Los Angeles','907':'Los Angeles','908':'Los Angeles','910':'Los Angeles','911':'Los Angeles','912':'Los Angeles','913':'Los Angeles','914':'Los Angeles','915':'Los Angeles','916':'Los Angeles',
  '919':'San Diego','920':'San Diego','921':'San Diego','922':'San Diego',
  '941':'San Francisco','940':'San Mateo',
  '950':'Santa Clara','951':'Santa Clara',
  '925':'Contra Costa','945':'Alameda','946':'Alameda',
  '923':'Riverside','924':'Riverside',
  '917':'San Bernardino','918':'San Bernardino',
  '930':'Ventura','931':'Ventura',
  '958':'Sacramento','957':'Sacramento','956':'Sacramento',
  '937':'Fresno','936':'Fresno',
  '933':'Kern','932':'Kern',
  '949':'Sonoma','954':'Santa Cruz','939':'Monterey',
  '947':'Marin','934':'Santa Barbara','943':'Napa','944':'Solano',
  '953':'San Luis Obispo','952':'Stanislaus','942':'San Joaquin',
};

function autoFillCountyFromAddress() {
    var addr = $('propertyAddress').value;
    var zipMatch = addr.match(/\b(\d{5})\b/);
    if (zipMatch) {
        var prefix = zipMatch[1].substring(0, 3);
        var county = ZIP_TO_COUNTY[prefix];
        if (county && !$('county').value) {
            $('county').value = county;
        }
    }
}

function getLoanLimitInfo(county, loanAmount) {
    var limit = LOAN_LIMITS[county];
    if (!limit) return null;
    var conf = limit.conforming;
    var type, color;
    if (loanAmount <= conf) { type = 'CONFORMING'; color = '#27ae60'; }
    else if (loanAmount <= conf * 1.5) { type = 'HIGH BALANCE'; color = '#f39c12'; }
    else { type = 'JUMBO'; color = '#e74c3c'; }
    return { limit: conf, type: type, color: color };
}

// ── Calculation Engine ──
function getInputs() {
    const purchasePrice = parseCurrency($('purchasePrice').value);
    const downPct = parseFloat($('downPct').value) || 0;
    const downPayment = purchasePrice * downPct / 100;
    $('downDollar').value = downPayment ? '$' + downPayment.toLocaleString('en-US', {minimumFractionDigits: 0}) : '';

    let loanAmount;
    const loanInput = parseCurrency($('loanAmount').value);
    if (loanInput > 0 && Math.abs(loanInput - (purchasePrice - downPayment)) > 1) {
        loanAmount = loanInput;
    } else {
        loanAmount = purchasePrice - downPayment;
        if (loanAmount > 0) $('loanAmount').value = '$' + loanAmount.toLocaleString('en-US', {minimumFractionDigits: 0});
    }

    const ltv = purchasePrice > 0 ? (loanAmount / purchasePrice * 100) : 0;
    // Auto-fill county from address ZIP
    autoFillCountyFromAddress();
    const annualTaxInput = parseCurrency($('annualTax').value);
    const autoTax = purchasePrice * 0.0125;
    const annualTax = annualTaxInput > 0 ? annualTaxInput : autoTax;
    var taxLabel = document.getElementById('taxEstLabel');
    if (annualTaxInput > 0 && Math.abs(annualTaxInput - autoTax) > 1) {
        if (taxLabel) taxLabel.textContent = '(manual)';
    } else {
        if (taxLabel) taxLabel.textContent = '(1.25% est.)';
        if (purchasePrice > 0) $('annualTax').value = '$' + annualTax.toLocaleString('en-US', {minimumFractionDigits: 0});
    }

    const annualInsInput = parseCurrency($('annualInsurance').value);
    const annualInsurance = annualInsInput > 0 ? annualInsInput : 1800;
    if (annualInsInput <= 0) $('annualInsurance').value = '$1,800';

    return {
        borrowerName: $('borrowerName').value || 'TBD',
        propertyAddress: $('propertyAddress').value || 'TBD',
        purchasePrice,
        downPct,
        downPayment,
        loanAmount,
        ltv,
        loanProduct: $('loanProduct').value,
        lockPeriod: $('lockPeriod').value,
        propertyType: $('propertyType').value,
        creditScore: $('creditScore').value,
        state: $('state').value,
        county: $('county').value || '',
        annualTax,
        annualInsurance
    };
}

function calcAppraisal(propertyType) {
    if (propertyType === 'Condo') return 695;
    if (propertyType === '2-4 Unit') return 895;
    return 595;
}

function calcRecordingFee(state) {
    const map = { CA: 125, TX: 100, FL: 150, NY: 250 };
    return map[state] || 125;
}

function calcTitleLender(purchasePrice) {
    // CLTA/ALTA schedule for California
    if (purchasePrice <= 500000) return 450;
    if (purchasePrice <= 1000000) return Math.round(450 + (purchasePrice - 500000) / 1000 * 1.75);
    return Math.round(1325 + (purchasePrice - 1000000) / 1000 * 1.50);
}
function calcEscrow(purchasePrice) {
    return Math.max(purchasePrice / 1000 * 2, 500);
}

function calcPI(loanAmount, annualRate, termYears) {
    if (loanAmount <= 0 || annualRate <= 0) return 0;
    const r = annualRate / 100 / 12;
    const n = termYears * 12;
    return loanAmount * (r * Math.pow(1 + r, n)) / (Math.pow(1 + r, n) - 1);
}

function getLoanTermYears(product) {
    if (product.includes('15yr')) return 15;
    return 30;
}

function calcMI(inp, rate) {
    const product = inp.loanProduct;
    const ltv = inp.ltv;
    const loanAmount = inp.loanAmount;
    if (product.startsWith('FHA')) {
        return loanAmount * 0.0055 / 12;
    }
    if (product.startsWith('VA')) return 0;
    // Conventional PMI
    if (ltv <= 80) return 0;
    // rough PMI based on LTV and credit
    let pmiRate = 0.005; // 0.5% baseline
    const cs = inp.creditScore;
    if (cs === '780+' || cs === '760-779') pmiRate = 0.003;
    else if (cs === '740-759' || cs === '720-739') pmiRate = 0.004;
    else if (cs === '700-719' || cs === '680-699') pmiRate = 0.006;
    else pmiRate = 0.008;
    if (ltv > 95) pmiRate += 0.002;
    else if (ltv > 90) pmiRate += 0.001;
    return loanAmount * pmiRate / 12;
}

function calcScenario(inp, sc) {
    const la = inp.loanAmount;
    const pp = inp.purchasePrice;

    const origFee = la * sc.origComp / 100;
    const discountPoints = la * sc.points / 100;
    const uwFee = 1350;
    const subtotalA = origFee + discountPoints + uwFee;

    const appraisal = calcAppraisal(inp.propertyType);
    const creditReport = 65;
    const floodCert = 12;
    const taxService = 85;
    const mersReg = 24.95;
    const processingFee = 995;
    const subtotalB = appraisal + creditReport + floodCert + taxService + mersReg + processingFee;

    const titleLender = calcTitleLender(pp);
    const escrow = calcEscrow(pp);
    const recording = calcRecordingFee(inp.state);
    const notary = 175;
    const loanTieIn = 150;
    const messengerFee = 125;
    const subEscrowFee = 50;
    const subtotalC = titleLender + escrow + recording + notary + loanTieIn + messengerFee + subEscrowFee;

    const totalLoanCosts = subtotalA + subtotalB + subtotalC;

    const dailyInterest = la * (sc.rate / 100) / 365;
    const prepaidInterest = dailyInterest * 3;
    const prepaidInsurance = inp.annualInsurance;
    const subtotalE = prepaidInterest + prepaidInsurance;

    const taxReserve = inp.annualTax / 12 * 3;
    const insReserve = inp.annualInsurance / 12 * 2;
    const subtotalF = taxReserve + insReserve;

    const totalOther = subtotalE + subtotalF;
    const totalClosing = totalLoanCosts + totalOther;

    const lenderCreditsTotal = (sc.points < 0 ? 0 : 0) + sc.lenderCredits;
    // discount points negative means lender credit already accounted in subtotalA
    const lenderCreditLine = sc.lenderCredits;

    const cashToClose = inp.downPayment + totalClosing - lenderCreditLine;

    const termYears = getLoanTermYears(inp.loanProduct);
    const pi = calcPI(la, sc.rate, termYears);
    const monthlyTax = inp.annualTax / 12;
    const monthlyIns = inp.annualInsurance / 12;
    const mi = calcMI(inp, sc.rate);
    const totalMonthly = pi + monthlyTax + monthlyIns + mi;

    return {
        origFee, discountPoints, uwFee, subtotalA,
        appraisal, creditReport, floodCert, taxService, mersReg, processingFee, subtotalB,
        titleLender, escrow, recording, notary, loanTieIn, messengerFee, subEscrowFee, subtotalC,
        totalLoanCosts,
        prepaidInterest, prepaidInsurance, subtotalE,
        taxReserve, insReserve, subtotalF,
        totalOther, totalClosing,
        lenderCreditLine, cashToClose,
        pi, monthlyTax, monthlyIns, mi, totalMonthly
    };
}

    addRow('  Insurance Reserve (2mo)', r => r.insReserve);

    txt += '\n' + pad('H. TOTAL CLOSING COSTS', w1) + results.map(r => rpad(fmtPlain(r.totalClosing), w2)).join('') + '\n';

    txt += '\n' + '='.repeat(w1 + w2 * 3) + '\n';
    txt += 'MONTHLY PAYMENT\n';
    addRow('  P&I', r => r.pi);
    addRow('  Tax', r => r.monthlyTax);
    addRow('  Insurance', r => r.monthlyIns);
    addRow('  MI', r => r.mi);
    addRow('  TOTAL', r => r.totalMonthly);

    txt += '\n---\nThis is an estimate only. Not a commitment to lend.\n';
    txt += 'Rene Duarte | NMLS #1795044 | Rates & Realty\n';

    navigator.clipboard.writeText(txt).then(() => showToast('Copied to clipboard!')).catch(() => showToast('Copy failed'));
}

// ── Init ──
['purchasePrice', 'loanAmount', 'annualTax', 'annualInsurance'].forEach(id => formatCurrencyInput($(id)));

// ── Auto-save: collect all data and post to parent ──
let _saveTimer = null;
function notifyParentOfChange() {
    clearTimeout(_saveTimer);
    _saveTimer = setTimeout(function() {
        if (window.parent === window) return; // not in iframe
        var featured = scenarios.findIndex(s => s.recommended);
        var data = {
            type: 'feeSheetAutoSave',
            scenarioA: { rate: scenarios[0].rate, points: scenarios[0].points, origComp: scenarios[0].origComp, credits: scenarios[0].lenderCredits, label: scenarios[0].label },
            scenarioB: { rate: scenarios[1].rate, points: scenarios[1].points, origComp: scenarios[1].origComp, credits: scenarios[1].lenderCredits, label: scenarios[1].label },
            scenarioC: { rate: scenarios[2].rate, points: scenarios[2].points, origComp: scenarios[2].origComp, credits: scenarios[2].lenderCredits, label: scenarios[2].label },
            featuredScenario: ['a','b','c'][featured >= 0 ? featured : 0],
            purchasePrice: parseCurrency($('purchasePrice').value),
            downPct: parseFloat($('downPct').value) || 0,
            loanAmount: parseCurrency($('loanAmount').value),
            loanProduct: $('loanProduct').value,
            lockPeriod: $('lockPeriod').value,
            propertyType: $('propertyType').value,
            creditScore: $('creditScore').value,
            state: $('state').value,
            county: $('county').value,
            annualTax: parseCurrency($('annualTax').value),
            annualInsurance: parseCurrency($('annualInsurance').value),
            borrowerName: $('borrowerName').value,
            propertyAddress: $('propertyAddress').value,
            lastUpdated: new Date().toISOString()
        };
        window.parent.postMessage(data, '*');
    }, 1000);
}

// Wrap recalc to also trigger auto-save
const _origRecalc = recalc;
recalc = function() { _origRecalc(); notifyParentOfChange(); };

// Live recalc on any input change
document.querySelectorAll('.sidebar input, .sidebar select').forEach(el => {
    el.addEventListener('input', recalc);
    el.addEventListener('change', recalc);
});

// Observe scenario cards for new inputs
const observer = new MutationObserver(() => {
    document.querySelectorAll('#scenarioCards input, #scenarioCards select').forEach(el => {
        if (!el._bound) {
            el._bound = true;
            el.addEventListener('input', recalc);
            el.addEventListener('change', recalc);
        }
    });
});
observer.observe($('scenarioCards'), { childList: true, subtree: true });

buildScenarioCards();
recalc();

// URL param prefill for iframe / fullscreen mode
(function() {
    const p = new URLSearchParams(window.location.search);
    // Support both short and long param names
    const bn = p.get('borrower_name') || p.get('borrower') || '';
    const pp = p.get('purchase_price') || p.get('pp') || '';
    const la = p.get('loan_amount') || p.get('la') || '';
    const addr = p.get('property_address') || p.get('addr') || '';
    const lt = p.get('loan_type') || '';
    const term = p.get('term') || '';

    if (bn) $('borrowerName').value = decodeURIComponent(bn);
    if (pp) $('purchasePrice').value = '$' + Number(pp).toLocaleString('en-US');
    if (la) $('loanAmount').value = '$' + Number(la).toLocaleString('en-US');
    if (addr) $('propertyAddress').value = decodeURIComponent(addr);
    if (lt) {
        const sel = $('loanProduct');
        for (let i = 0; i < sel.options.length; i++) {
            if (sel.options[i].value.toLowerCase().includes(lt.toLowerCase()) ||
                sel.options[i].text.toLowerCase().includes(lt.toLowerCase())) {
                sel.selectedIndex = i; break;
            }
        }
    }
    if (term) {
        const sel = $('loanProduct');
        // Try matching term in product name (e.g. "15" matches "Conv 15yr Fixed")
        if (term === '15' || term === '20') {
            for (let i = 0; i < sel.options.length; i++) {
                if (sel.options[i].text.includes(term + 'yr')) { sel.selectedIndex = i; break; }
            }
        }
    }
    recalc();

    // Listen for postMessage from parent (lead-detail iframe sync)
    window.addEventListener('message', function(e) {
        if (!e.data || !e.data.type) return;
        if (e.data.type === 'feeSheetSync') {
            const d = e.data;
            if (d.borrower_name) $('borrowerName').value = d.borrower_name;
            if (d.property_address) $('propertyAddress').value = d.property_address;
            if (d.purchase_price) $('purchasePrice').value = '$' + Number(d.purchase_price).toLocaleString('en-US');
            if (d.loan_amount) $('loanAmount').value = '$' + Number(d.loan_amount).toLocaleString('en-US');
            _origRecalc(); // don't trigger auto-save back
        }
        if (e.data.type === 'feeSheetRestore') {
            const d = e.data;
            if (d.borrowerName) $('borrowerName').value = d.borrowerName;
            if (d.propertyAddress) $('propertyAddress').value = d.propertyAddress;
            if (d.purchasePrice) $('purchasePrice').value = '$' + Number(d.purchasePrice).toLocaleString('en-US');
            if (d.loanAmount) $('loanAmount').value = '$' + Number(d.loanAmount).toLocaleString('en-US');
            if (d.downPct != null) $('downPct').value = d.downPct;
            if (d.loanProduct) $('loanProduct').value = d.loanProduct;
            if (d.lockPeriod) $('lockPeriod').value = d.lockPeriod;
            if (d.propertyType) $('propertyType').value = d.propertyType;
            if (d.creditScore) $('creditScore').value = d.creditScore;
            if (d.state) $('state').value = d.state;
            if (d.county) $('county').value = d.county;
            if (d.annualTax) $('annualTax').value = '$' + Number(d.annualTax).toLocaleString('en-US');
            if (d.annualInsurance) $('annualInsurance').value = '$' + Number(d.annualInsurance).toLocaleString('en-US');
            // Restore scenarios
            if (d.scenarioA) { Object.assign(scenarios[0], { rate: d.scenarioA.rate||0, points: d.scenarioA.points||0, origComp: d.scenarioA.origComp||1.5, lenderCredits: d.scenarioA.credits||0, label: d.scenarioA.label||'Par Rate' }); }
            if (d.scenarioB) { Object.assign(scenarios[1], { rate: d.scenarioB.rate||0, points: d.scenarioB.points||0, origComp: d.scenarioB.origComp||1.5, lenderCredits: d.scenarioB.credits||0, label: d.scenarioB.label||'Buy Down' }); }
            if (d.scenarioC) { Object.assign(scenarios[2], { rate: d.scenarioC.rate||0, points: d.scenarioC.points||0, origComp: d.scenarioC.origComp||1.5, lenderCredits: d.scenarioC.credits||0, label: d.scenarioC.label||'Lender Credit' }); }
            if (d.featuredScenario) {
                var fi = { a:0, b:1, c:2 }[d.featuredScenario] || 0;
                scenarios.forEach(function(s,i) { s.recommended = (i === fi); });
            }
            buildScenarioCards();
            _origRecalc(); // don't trigger auto-save back
        }
    });
})();
</script>

</html>
