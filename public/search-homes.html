<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Search Homes | Rates & Realty</title>
<link rel="icon" href="/assets/images/favicon.png"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#e8c96d;--dark:#0a0a0a;--card-bg:#111;--border:#222;
  --text:#eee;--muted:#888;--radius:12px;--sidebar:340px;
}
body{background:var(--dark);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
.top-nav{display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:60px;background:#0d0d0d;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:200}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.nav-logo img{height:36px}
.nav-logo span{font-size:1.1rem;font-weight:700;color:var(--gold)}
.nav-links{display:flex;gap:20px;align-items:center}
.nav-links a{color:var(--muted);text-decoration:none;font-size:.9rem;transition:color .2s}
.nav-links a:hover{color:var(--gold)}
.nav-cta{background:var(--gold);color:#000;padding:8px 18px;border-radius:20px;font-weight:700;font-size:.85rem;text-decoration:none}
.search-hero{background:linear-gradient(135deg,#0d0d0d 0%,#1a1200 100%);padding:28px 24px 0;border-bottom:1px solid var(--border)}
.search-hero h1{font-size:1.5rem;font-weight:700;color:var(--text);margin-bottom:4px}
.search-hero p{color:var(--muted);font-size:.9rem;margin-bottom:16px}
.search-bar-row{display:flex;gap:10px;max-width:720px}
.search-bar-row input{flex:1;background:#1a1a1a;border:1px solid var(--border);border-radius:24px;padding:11px 20px;color:var(--text);font-size:.95rem;outline:none}
.search-bar-row input:focus{border-color:var(--gold)}
.search-bar-row button{background:var(--gold);color:#000;border:none;border-radius:24px;padding:11px 24px;font-weight:700;cursor:pointer;white-space:nowrap}
.status-tabs{display:flex;gap:6px;margin-top:16px}
.status-tab{padding:9px 20px;border-radius:20px 20px 0 0;font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid transparent;border-bottom:none;color:var(--muted);background:transparent;transition:all .2s}
.status-tab.active{background:#1a1a1a;color:var(--gold);border-color:var(--border)}
.status-tab:hover:not(.active){color:var(--text)}
.location-nav{background:#111;border-bottom:1px solid var(--border);padding:12px 24px}
.county-tabs{display:flex;gap:24px;margin-bottom:10px}
.county-tab{color:var(--muted);font-size:.9rem;font-weight:600;cursor:pointer;padding-bottom:4px;border-bottom:2px solid transparent;transition:all .2s;background:none;border-top:none;border-left:none;border-right:none;display:flex;align-items:center;gap:6px}
.county-tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.city-pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.city-pills::-webkit-scrollbar{display:none}
.city-pill{padding:7px 16px;border-radius:20px;font-size:.82rem;font-weight:600;cursor:pointer;white-space:nowrap;border:1px solid var(--border);background:transparent;color:var(--muted);transition:all .2s}
.city-pill.active{background:var(--gold);color:#000;border-color:var(--gold)}
.city-pill:hover:not(.active){border-color:var(--gold);color:var(--text)}
.filter-bar{background:#111;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.filter-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text);font-size:.83rem;cursor:pointer;transition:all .2s;white-space:nowrap}
.filter-btn:hover,.filter-btn.active-filter{border-color:var(--gold);color:var(--gold)}
.filter-divider{width:1px;height:24px;background:var(--border)}
.sort-select{background:#1a1a1a;border:1px solid var(--border);color:var(--text);border-radius:20px;padding:8px 16px;font-size:.83rem;cursor:pointer;outline:none}
.sort-select:focus{border-color:var(--gold)}
.listing-count{margin-left:auto;color:var(--muted);font-size:.83rem;font-weight:600}
.clear-btn{color:var(--muted);font-size:.82rem;cursor:pointer;text-decoration:underline;background:none;border:none}
.clear-btn:hover{color:var(--text)}
.main-layout{display:flex;height:calc(100vh - 220px);min-height:500px}
.listings-panel{flex:1;overflow-y:auto;padding:16px 24px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
.map-panel{width:var(--sidebar);flex-shrink:0;position:sticky;top:0;height:calc(100vh - 220px)}
#map{width:100%;height:100%}
.listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.listing-card{background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform .2s,border-color .2s;position:relative}
.listing-card:hover{transform:translateY(-2px);border-color:var(--gold)}
.card-img-wrap{position:relative;height:190px;overflow:hidden;background:#1a1a1a}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.listing-card:hover .card-img-wrap img{transform:scale(1.04)}
.card-badge{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.75);color:#fff;font-size:.7rem;padding:3px 8px;border-radius:10px;backdrop-filter:blur(4px)}
.card-badge.status-active{background:rgba(0,160,80,.85)}
.card-badge.status-coming{background:rgba(201,168,76,.85);color:#000}
.card-badge.status-closed{background:rgba(120,120,120,.8)}
.card-fav{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.6);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;font-size:.9rem;transition:all .2s;backdrop-filter:blur(4px)}
.card-fav:hover,.card-fav.active{color:#e25555}
.days-badge{position:absolute;bottom:8px;right:8px;background:rgba(0,0,0,.65);color:var(--muted);font-size:.68rem;padding:3px 7px;border-radius:8px;backdrop-filter:blur(4px)}
.card-body{padding:14px}
.card-price{font-size:1.2rem;font-weight:700;color:#fff;margin-bottom:4px}
.card-addr{font-size:.82rem;color:var(--text);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-city{font-size:.78rem;color:var(--muted);margin-bottom:8px}
.card-stats{display:flex;gap:12px;margin-bottom:12px}
.card-stat{font-size:.78rem;color:var(--muted)}
.card-stat strong{color:var(--text);font-weight:600}
.card-type{display:inline-block;font-size:.7rem;padding:2px 8px;border:1px solid var(--border);border-radius:8px;color:var(--muted);margin-bottom:10px}
.card-actions{display:flex;gap:8px}
.btn-schedule{flex:1;background:var(--gold);color:#000;border:none;border-radius:8px;padding:9px;font-weight:700;font-size:.8rem;cursor:pointer;transition:background .2s}
.btn-schedule:hover{background:var(--gold-light)}
.btn-map{padding:9px 14px;background:transparent;border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:.8rem;cursor:pointer;transition:all .2s}
.btn-map:hover{border-color:var(--gold);color:var(--gold)}
.loading-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px;color:var(--muted);gap:16px}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty-state{text-align:center;padding:60px;color:var(--muted)}
.empty-state i{font-size:3rem;margin-bottom:12px;color:var(--border)}
.filter-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;display:none;align-items:flex-start;justify-content:center;padding-top:80px}
.filter-overlay.open{display:flex}
.filter-modal{background:#151515;border:1px solid var(--border);border-radius:16px;width:100%;max-width:700px;max-height:80vh;overflow-y:auto;padding:28px;position:relative;scrollbar-width:thin}
.filter-modal h2{font-size:1.1rem;font-weight:700;margin-bottom:20px;color:var(--text)}
.filter-close{position:absolute;top:16px;right:16px;background:none;border:none;color:var(--muted);font-size:1.2rem;cursor:pointer}
.filter-close:hover{color:var(--text)}
.filter-section{margin-bottom:24px}
.filter-section label{display:block;font-size:.82rem;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
.price-range-inputs{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.price-input-wrap{position:relative}
.price-input-wrap span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.9rem}
.price-input-wrap input{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:10px;padding:10px 12px 10px 24px;color:var(--text);font-size:.9rem;outline:none}
.price-input-wrap input:focus{border-color:var(--gold)}
.btn-group{display:flex;flex-wrap:wrap;gap:8px}
.btn-toggle{padding:9px 18px;border:1px solid var(--border);border-radius:20px;background:transparent;color:var(--text);font-size:.83rem;cursor:pointer;transition:all .2s}
.btn-toggle.selected{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700}
.btn-toggle:hover:not(.selected){border-color:var(--gold);color:var(--gold)}
.home-type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.home-type-btn{padding:12px;border:1px solid var(--border);border-radius:10px;background:transparent;color:var(--text);font-size:.82rem;cursor:pointer;text-align:center;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.home-type-btn i{font-size:1.2rem;color:var(--muted)}
.home-type-btn.selected{border-color:var(--gold);background:rgba(201,168,76,.1);color:var(--gold)}
.home-type-btn.selected i{color:var(--gold)}
.filter-row-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.filter-actions{display:flex;justify-content:space-between;align-items:center;margin-top:24px;padding-top:20px;border-top:1px solid var(--border)}
.btn-clear-all{background:none;border:none;color:var(--muted);font-size:.9rem;cursor:pointer;text-decoration:underline}
.btn-apply-filters{background:var(--gold);color:#000;border:none;border-radius:10px;padding:12px 28px;font-weight:700;font-size:.9rem;cursor:pointer}
.btn-apply-filters:hover{background:var(--gold-light)}
.cart-fab{position:fixed;bottom:24px;right:24px;background:var(--gold);color:#000;border:none;border-radius:50px;padding:14px 22px;font-weight:700;font-size:.9rem;cursor:pointer;box-shadow:0 4px 20px rgba(201,168,76,.4);z-index:300;display:flex;align-items:center;gap:8px;transition:transform .2s}
.cart-fab:hover{transform:scale(1.05)}
.cart-count{background:#000;color:var(--gold);border-radius:50%;width:22px;height:22px;font-size:.78rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.cart-drawer{position:fixed;right:-440px;top:0;width:420px;height:100vh;background:#111;border-left:1px solid var(--border);z-index:400;transition:right .3s ease;display:flex;flex-direction:column}
.cart-drawer.open{right:0}
.cart-header{padding:20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.cart-header h3{font-size:1rem;font-weight:700}
.cart-close{background:none;border:none;color:var(--muted);font-size:1.1rem;cursor:pointer}
.cart-items{flex:1;overflow-y:auto;padding:12px;scrollbar-width:thin}
.cart-item{background:#1a1a1a;border-radius:10px;padding:12px;margin-bottom:8px;display:flex;gap:10px;align-items:flex-start}
.cart-item img{width:60px;height:50px;object-fit:cover;border-radius:6px;flex-shrink:0}
.cart-item-info{flex:1}
.cart-item-price{font-weight:700;font-size:.9rem;color:var(--gold)}
.cart-item-addr{font-size:.78rem;color:var(--muted);line-height:1.3}
.cart-remove{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.85rem;flex-shrink:0}
.cart-form{padding:16px;border-top:1px solid var(--border)}
.cart-form label{font-size:.78rem;color:var(--muted);margin-bottom:4px;display:block}
.cart-form input,.cart-form textarea,.cart-form select{width:100%;background:#1a1a1a;border:1px solid var(--border);border-radius:8px;padding:9px 12px;color:var(--text);font-size:.85rem;outline:none;margin-bottom:10px}
.cart-form input:focus,.cart-form textarea:focus{border-color:var(--gold)}
.cart-submit{width:100%;background:var(--gold);color:#000;border:none;border-radius:10px;padding:13px;font-weight:700;font-size:.9rem;cursor:pointer}
.cart-submit:hover{background:var(--gold-light)}
.cart-empty{text-align:center;padding:40px;color:var(--muted)}
.cart-empty i{font-size:2rem;margin-bottom:10px}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--gold);color:var(--text);padding:12px 24px;border-radius:30px;font-size:.88rem;z-index:600;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
@media(max-width:900px){.main-layout{flex-direction:column;height:auto}.map-panel{width:100%;height:280px;position:relative}.listings-grid{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.listings-grid{grid-template-columns:1fr}.filter-row-2{grid-template-columns:1fr}.home-type-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<nav class="top-nav">
  <a href="/" class="nav-logo">
    <img src="/assets/images/logo.png" alt="Rates & Realty" onerror="this.style.display='none'">
    <span>Rates & Realty</span>
  </a>
  <div class="nav-links">
    <a href="/public/search-homes.html">Search Homes</a>
    <a href="/public/apply.html">Apply Now</a>
    <a href="/#calculator">Calculator</a>
    <a href="https://rene-duarte-rates-realty.cal.com/30min" target="_blank" class="nav-cta">Schedule a Call</a>
  </div>
</nav>
<div class="search-hero">
  <h1>Search MLS Listings</h1>
  <p>Browse active MLS listings across Southern California</p>
  <div class="search-bar-row">
    <input type="text" id="searchInput" placeholder="Search by address, city, or zip code...">
    <button onclick="applyFiltersAndSearch()"><i class="fas fa-search"></i> Search</button>
  </div>
  <div class="status-tabs">
    <button class="status-tab active" data-status="Active" onclick="setStatus(this,'Active')">For Sale</button>
    <button class="status-tab" data-status="Coming Soon" onclick="setStatus(this,'Coming Soon')">Coming Soon</button>
    <button class="status-tab" data-status="Closed" onclick="setStatus(this,'Closed')">Recently Sold</button>
    <button class="status-tab" data-status="" onclick="setStatus(this,'')">All Properties</button>
  </div>
</div>
<div class="location-nav">
  <div class="county-tabs">
    <button class="county-tab active" onclick="setCounty(this,'Orange County')">🍊 Orange</button>
    <button class="county-tab" onclick="setCounty(this,'Los Angeles County')">🌆 Los Angeles</button>
    <button class="county-tab" onclick="setCounty(this,'Riverside County')">🏔 Riverside</button>
    <button class="county-tab" onclick="setCounty(this,'San Bernardino County')">🏙 San Bernardino</button>
  </div>
  <div class="city-pills" id="cityPills"></div>
</div>
<div class="filter-bar">
  <button class="filter-btn" onclick="openFilters()"><i class="fas fa-sliders-h"></i> Filters</button>
  <div class="filter-divider"></div>
  <select class="sort-select" id="sortSelect" onchange="loadListings()">
    <option value="ListPrice asc">Price: Low to High</option>
    <option value="ListPrice desc">Price: High to Low</option>
    <option value="ListingContractDate desc">Newest</option>
    <option value="BedroomsTotal desc">Most Beds</option>
    <option value="LivingArea desc">Largest</option>
  </select>
  <span class="listing-count" id="listingCount"></span>
  <button class="clear-btn" onclick="clearAllFilters()">Clear All</button>
</div>
<div class="main-layout">
  <div class="listings-panel">
    <div class="listings-grid" id="listingsGrid">
      <div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><p>Loading MLS listings...</p></div>
    </div>
  </div>
  <div class="map-panel"><div id="map"></div></div>
</div>
<div class="filter-overlay" id="filterOverlay" onclick="closeFiltersOnBg(event)">
  <div class="filter-modal">
    <h2><i class="fas fa-sliders-h"></i> Filter Homes</h2>
    <button class="filter-close" onclick="closeFilters()"><i class="fas fa-times"></i></button>
    <div class="filter-section">
      <label>Price Range</label>
      <div class="price-range-inputs">
        <div class="price-input-wrap"><span>$</span><input type="number" id="fMinPrice" placeholder="No Min" step="50000"></div>
        <div class="price-input-wrap"><span>$</span><input type="number" id="fMaxPrice" placeholder="No Max" step="50000"></div>
      </div>
    </div>
    <div class="filter-section">
      <label>Home Type</label>
      <div class="home-type-grid">
        <button class="home-type-btn selected" data-type="Residential" onclick="toggleType(this)"><i class="fas fa-home"></i>House</button>
        <button class="home-type-btn selected" data-type="Condominium" onclick="toggleType(this)"><i class="fas fa-building"></i>Condo</button>
        <button class="home-type-btn selected" data-type="Townhouse" onclick="toggleType(this)"><i class="fas fa-city"></i>Townhome</button>
        <button class="home-type-btn" data-type="Residential Income" onclick="toggleType(this)"><i class="fas fa-users"></i>Multi-Family</button>
        <button class="home-type-btn" data-type="Land" onclick="toggleType(this)"><i class="fas fa-tree"></i>Land / Lot</button>
        <button class="home-type-btn" data-type="Mobile Home" onclick="toggleType(this)"><i class="fas fa-caravan"></i>Mobile Home</button>
      </div>
    </div>
    <div class="filter-row-2">
      <div class="filter-section">
        <label>Bedrooms</label>
        <div class="btn-group">
          <button class="btn-toggle selected" data-beds="" onclick="selectBed(this)">Any</button>
          <button class="btn-toggle" data-beds="1" onclick="selectBed(this)">1+</button>
          <button class="btn-toggle" data-beds="2" onclick="selectBed(this)">2+</button>
          <button class="btn-toggle" data-beds="3" onclick="selectBed(this)">3+</button>
          <button class="btn-toggle" data-beds="4" onclick="selectBed(this)">4+</button>
          <button class="btn-toggle" data-beds="5" onclick="selectBed(this)">5+</button>
        </div>
      </div>
      <div class="filter-section">
        <label>Bathrooms</label>
        <div class="btn-group">
          <button class="btn-toggle selected" data-baths="" onclick="selectBath(this)">Any</button>
          <button class="btn-toggle" data-baths="1" onclick="selectBath(this)">1+</button>
          <button class="btn-toggle" data-baths="2" onclick="selectBath(this)">2+</button>
          <button class="btn-toggle" data-baths="3" onclick="selectBath(this)">3+</button>
          <button class="btn-toggle" data-baths="4" onclick="selectBath(this)">4+</button>
        </div>
      </div>
    </div>
    <div class="filter-row-2">
      <div class="filter-section">
        <label>Min Square Feet</label>
        <div class="btn-group">
          <button class="btn-toggle selected" data-sqft="" onclick="selectSqft(this)">Any</button>
          <button class="btn-toggle" data-sqft="500" onclick="selectSqft(this)">500+</button>
          <button class="btn-toggle" data-sqft="1000" onclick="selectSqft(this)">1,000+</button>
          <button class="btn-toggle" data-sqft="1500" onclick="selectSqft(this)">1,500+</button>
          <button class="btn-toggle" data-sqft="2000" onclick="selectSqft(this)">2,000+</button>
          <button class="btn-toggle" data-sqft="3000" onclick="selectSqft(this)">3,000+</button>
        </div>
      </div>
      <div class="filter-section">
        <label>Year Built (Min)</label>
        <div class="btn-group">
          <button class="btn-toggle selected" data-year="" onclick="selectYear(this)">Any</button>
          <button class="btn-toggle" data-year="1980" onclick="selectYear(this)">1980+</button>
          <button class="btn-toggle" data-year="2000" onclick="selectYear(this)">2000+</button>
          <button class="btn-toggle" data-year="2010" onclick="selectYear(this)">2010+</button>
          <button class="btn-toggle" data-year="2020" onclick="selectYear(this)">2020+</button>
        </div>
      </div>
    </div>
    <div class="filter-actions">
      <button class="btn-clear-all" onclick="clearAllFilters()">Clear All Filters</button>
      <button class="btn-apply-filters" onclick="applyFiltersAndSearch()">See Results</button>
    </div>
  </div>
</div>
<button class="cart-fab" onclick="toggleCart()" id="cartFab" style="display:none">
  <i class="fas fa-calendar-check"></i> Showing Cart
  <div class="cart-count" id="cartCount">0</div>
</button>
<div class="cart-drawer" id="cartDrawer">
  <div class="cart-header">
    <h3><i class="fas fa-calendar-check"></i> Schedule Showings</h3>
    <button class="cart-close" onclick="toggleCart()"><i class="fas fa-times"></i></button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-form">
    <label>Preferred Date</label>
    <input type="date" id="cartDate" min="">
    <label>Preferred Time</label>
    <select id="cartTime">
      <option value="Morning (9am-12pm)">Morning (9am-12pm)</option>
      <option value="Afternoon (12pm-4pm)">Afternoon (12pm-4pm)</option>
      <option value="Evening (4pm-7pm)">Evening (4pm-7pm)</option>
    </select>
    <label>Notes (optional)</label>
    <textarea id="cartNotes" rows="2" placeholder="Questions or special requests..."></textarea>
    <button class="cart-submit" onclick="submitCart()">Request Showings</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
const SUPABASE_URL='https://ljywhvbmsibwnssxpesh.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeXdodmJtc2lid25zc3hwZXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NTUsImV4cCI6MjA4OTYzNzY1NX0.QaewUhTWdATj35VewvmfQcHB_b3I9FhhwXSRuqNBKvw';
const COUNTIES={'Orange County':['Westminster','Garden Grove','Huntington Beach','Anaheim','Santa Ana','Irvine','Fountain Valley','Costa Mesa','Fullerton','Buena Park','Cypress','La Habra','Placentia','Brea','Yorba Linda','Orange','Tustin','Lake Forest','Mission Viejo','Laguna Niguel'],'Los Angeles County':['Long Beach','Los Angeles','Torrance','Compton','Inglewood','Hawthorne','Carson','El Monte','West Covina','Pomona','Norwalk','Burbank','Pasadena','Whittier','Downey'],'Riverside County':['Riverside','Moreno Valley','Corona','Temecula','Murrieta','Hemet','Perris','Indio','Palm Springs','Menifee'],'San Bernardino County':['San Bernardino','Fontana','Rancho Cucamonga','Ontario','Victorville','Rialto','Colton','Chino','Redlands','Highland']};
let currentCounty='Orange County',currentCity='Westminster',currentStatus='Active';
let filterState={minPrice:null,maxPrice:null,beds:null,baths:null,types:['Residential','Condominium','Townhouse'],sqft:null,year:null};
let allListings=[],cart=JSON.parse(localStorage.getItem('showingCart')||'[]'),map,markers=[];
function initMap(){map=new google.maps.Map(document.getElementById('map'),{center:{lat:33.7545,lng:-118.0},zoom:11,styles:[{elementType:'geometry',stylers:[{color:'#1a1a1a'}]},{elementType:'labels.text.fill',stylers:[{color:'#888'}]},{featureType:'road',elementType:'geometry',stylers:[{color:'#2a2a2a'}]},{featureType:'water',elementType:'geometry',stylers:[{color:'#0d1b2a'}]},{featureType:'poi',stylers:[{visibility:'off'}]}]});loadListings();}
function setCounty(el,county){currentCounty=county;document.querySelectorAll('.county-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');const cities=COUNTIES[county]||[];currentCity=cities[0]||'';renderCityPills(cities);loadListings();}
function renderCityPills(cities){const container=document.getElementById('cityPills');container.innerHTML=cities.map((c,i)=>`<button class="city-pill${i===0?' active':''}" onclick="setCity(this,'${c}')">${c}</button>`).join('');}
function setCity(el,city){currentCity=city;document.querySelectorAll('.city-pill').forEach(p=>p.classList.remove('active'));el.classList.add('active');loadListings();}
function setStatus(el,status){currentStatus=status;document.querySelectorAll('.status-tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');loadListings();}
function buildODataFilter(){const parts=[];if(currentCity)parts.push(`City eq '${currentCity}'`);if(currentStatus)parts.push(`StandardStatus eq '${currentStatus}'`);else parts.push(`(StandardStatus eq 'Active' or StandardStatus eq 'Coming Soon' or StandardStatus eq 'Closed' or StandardStatus eq 'Pending')`);if(filterState.types.length>0&&filterState.types.length<6){const tf=filterState.types.map(t=>`PropertyType eq '${t}'`).join(' or ');parts.push(`(${tf})`);}if(filterState.minPrice)parts.push(`ListPrice ge ${filterState.minPrice}`);if(filterState.maxPrice)parts.push(`ListPrice le ${filterState.maxPrice}`);if(filterState.beds)parts.push(`BedroomsTotal ge ${filterState.beds}`);if(filterState.baths)parts.push(`BathroomsTotalInteger ge ${filterState.baths}`);if(filterState.sqft)parts.push(`LivingArea ge ${filterState.sqft}`);if(filterState.year)parts.push(`YearBuilt ge ${filterState.year}`);return parts.join(' and ');}
async function loadListings(){const grid=document.getElementById('listingsGrid');grid.innerHTML='<div class="loading-state" style="grid-column:1/-1"><div class="spinner"></div><p>Loading listings...</p></div>';const sort=document.getElementById('sortSelect').value;const filterStr=buildODataFilter();const rawFilter=`$filter=${encodeURIComponent(filterStr)}&$orderby=${encodeURIComponent(sort)}&$top=50&$expand=Media($top=1;$select=MediaURL,Order)&$select=ListingKey,ListPrice,UnparsedAddress,City,StateOrProvince,PostalCode,BedroomsTotal,BathroomsTotalInteger,LivingArea,PropertyType,PropertySubType,StandardStatus,ListingContractDate,DaysOnMarket,Latitude,Longitude,PublicRemarks,YearBuilt,LotSizeAcres`;try{const res=await fetch(`${SUPABASE_URL}/functions/v1/trestle-proxy`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY},body:JSON.stringify({endpoint:'Property',rawFilter})});const data=await res.json();const listings=data.value||[];allListings=listings;renderListings(listings);updateMapMarkers(listings);document.getElementById('listingCount').textContent=`${listings.length} listing${listings.length!==1?'s':''}`;}catch(e){grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-exclamation-triangle"></i><p>Error: ${e.message}</p></div>`;}}
function renderListings(listings){const grid=document.getElementById('listingsGrid');if(!listings.length){grid.innerHTML='<div class="empty-state" style="grid-column:1/-1"><i class="fas fa-home"></i><p>No listings found. Try adjusting your filters.</p></div>';return;}grid.innerHTML=listings.map(l=>{const photo=l.Media?.[0]?.MediaURL||'';const price=l.ListPrice?'$'+l.ListPrice.toLocaleString():'Price N/A';const addr=l.UnparsedAddress||'';const city=[l.City,l.StateOrProvince,l.PostalCode].filter(Boolean).join(', ');const beds=l.BedroomsTotal;const baths=l.BathroomsTotalInteger;const sqft=l.LivingArea;const dom=l.DaysOnMarket;const type=l.PropertySubType||l.PropertyType||'';const status=l.StandardStatus||'Active';const isLand=type.toLowerCase().includes('land')||l.PropertyType==='Land';const inCart=cart.some(c=>c.listingKey===l.ListingKey);const statusClass=status==='Active'?'status-active':status==='Coming Soon'?'status-coming':'status-closed';return`<div class="listing-card" onclick="viewDetail('${l.ListingKey}')"><div class="card-img-wrap">${photo?`<img src="${photo}" alt="${addr}" loading="lazy" onerror="this.src='https://placehold.co/400x220/111/444?text=No+Photo'">`:`<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--muted)"><i class="fas fa-home" style="font-size:2rem"></i></div>`}<span class="card-badge ${statusClass}">${status==='Active'?'For Sale':status==='Closed'?'Sold':status}</span><button class="card-fav ${inCart?'active':''}" onclick="event.stopPropagation();addToCart('${l.ListingKey}')" title="Add to showing cart"><i class="fas fa-heart"></i></button>${dom!=null?`<span class="days-badge">${dom}d on market</span>`:''}</div><div class="card-body"><div class="card-price">${price}</div><div class="card-addr">${addr}</div><div class="card-city">${city}</div><div class="card-stats">${!isLand&&beds!=null?`<span class="card-stat"><strong>${beds}</strong> bd</span>`:''} ${!isLand&&baths!=null?`<span class="card-stat"><strong>${baths}</strong> ba</span>`:''} ${sqft?`<span class="card-stat"><strong>${sqft.toLocaleString()}</strong> sqft</span>`:''} ${l.YearBuilt?`<span class="card-stat">Built <strong>${l.YearBuilt}</strong></span>`:''}</div><div class="card-type">${type}</div><div class="card-actions"><button class="btn-schedule" onclick="event.stopPropagation();addToCart('${l.ListingKey}')">${inCart?'✓ In Cart':'Schedule Showing'}</button><button class="btn-map" onclick="event.stopPropagation();flyToListing(${l.Latitude},${l.Longitude})"><i class="fas fa-map-marker-alt"></i></button></div></div></div>`;}).join('');}
function viewDetail(listingKey){const listing=allListings.find(l=>l.ListingKey===listingKey);if(listing){sessionStorage.setItem('selected_listing',JSON.stringify(listing));window.location.href='/public/property-detail.html';}}
function updateMapMarkers(listings){if(!map)return;markers.forEach(m=>m.setMap(null));markers=[];const bounds=new google.maps.LatLngBounds();listings.forEach(l=>{if(!l.Latitude||!l.Longitude)return;const pos={lat:l.Latitude,lng:l.Longitude};const marker=new google.maps.Marker({position:pos,map,icon:{path:google.maps.SymbolPath.CIRCLE,scale:7,fillColor:'#C9A84C',fillOpacity:1,strokeColor:'#000',strokeWeight:1},title:`$${(l.ListPrice||0).toLocaleString()}`});marker.addListener('click',()=>viewDetail(l.ListingKey));markers.push(marker);bounds.extend(pos);});if(markers.length)map.fitBounds(bounds);}
function flyToListing(lat,lng){if(!map||!lat||!lng)return;map.panTo({lat,lng});map.setZoom(15);}
function openFilters(){document.getElementById('filterOverlay').classList.add('open');document.body.style.overflow='hidden';}
function closeFilters(){document.getElementById('filterOverlay').classList.remove('open');document.body.style.overflow='';}
function closeFiltersOnBg(e){if(e.target===document.getElementById('filterOverlay'))closeFilters();}
function toggleType(btn){btn.classList.toggle('selected');const type=btn.dataset.type;if(btn.classList.contains('selected')){if(!filterState.types.includes(type))filterState.types.push(type);}else{filterState.types=filterState.types.filter(t=>t!==type);}}
function selectBed(btn){document.querySelectorAll('[data-beds]').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');filterState.beds=btn.dataset.beds||null;}
function selectBath(btn){document.querySelectorAll('[data-baths]').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');filterState.baths=btn.dataset.baths||null;}
function selectSqft(btn){document.querySelectorAll('[data-sqft]').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');filterState.sqft=btn.dataset.sqft||null;}
function selectYear(btn){document.querySelectorAll('[data-year]').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');filterState.year=btn.dataset.year||null;}
function applyFiltersAndSearch(){filterState.minPrice=document.getElementById('fMinPrice').value||null;filterState.maxPrice=document.getElementById('fMaxPrice').value||null;closeFilters();loadListings();}
function clearAllFilters(){filterState={minPrice:null,maxPrice:null,beds:null,baths:null,types:['Residential','Condominium','Townhouse'],sqft:null,year:null};document.getElementById('fMinPrice').value='';document.getElementById('fMaxPrice').value='';document.querySelectorAll('[data-beds=""]').forEach(b=>b.classList.add('selected'));document.querySelectorAll('[data-beds]:not([data-beds=""])').forEach(b=>b.classList.remove('selected'));document.querySelectorAll('[data-baths=""]').forEach(b=>b.classList.add('selected'));document.querySelectorAll('[data-baths]:not([data-baths=""])').forEach(b=>b.classList.remove('selected'));document.querySelectorAll('[data-sqft=""]').forEach(b=>b.classList.add('selected'));document.querySelectorAll('[data-sqft]:not([data-sqft=""])').forEach(b=>b.classList.remove('selected'));document.querySelectorAll('[data-year=""]').forEach(b=>b.classList.add('selected'));document.querySelectorAll('[data-year]:not([data-year=""])').forEach(b=>b.classList.remove('selected'));document.querySelectorAll('.home-type-btn').forEach(b=>{const def=['Residential','Condominium','Townhouse'].includes(b.dataset.type);b.classList.toggle('selected',def);});closeFilters();loadListings();}
function addToCart(listingKey){const listing=allListings.find(l=>l.ListingKey===listingKey);if(!listing)return;if(cart.some(c=>c.listingKey===listingKey)){cart=cart.filter(c=>c.listingKey!==listingKey);saveCart();renderListings(allListings);return;}cart.push({listingKey,price:listing.ListPrice,address:listing.UnparsedAddress,city:listing.City,photo:listing.Media?.[0]?.MediaURL||'',beds:listing.BedroomsTotal,baths:listing.BathroomsTotalInteger});saveCart();renderCart();showToast('Added to showing cart!');renderListings(allListings);}
function saveCart(){localStorage.setItem('showingCart',JSON.stringify(cart));const fab=document.getElementById('cartFab');document.getElementById('cartCount').textContent=cart.length;fab.style.display=cart.length?'flex':'none';}
function renderCart(){const container=document.getElementById('cartItems');if(!cart.length){container.innerHTML='<div class="cart-empty"><i class="fas fa-calendar"></i><p>No homes added yet</p></div>';return;}container.innerHTML=cart.map(item=>`<div class="cart-item">${item.photo?`<img src="${item.photo}" alt="${item.address}">`:''}<div class="cart-item-info"><div class="cart-item-price">$${(item.price||0).toLocaleString()}</div><div class="cart-item-addr">${item.address}<br>${item.city}</div></div><button class="cart-remove" onclick="removeFromCart('${item.listingKey}')"><i class="fas fa-times"></i></button></div>`).join('');}
function removeFromCart(listingKey){cart=cart.filter(c=>c.listingKey!==listingKey);saveCart();renderCart();renderListings(allListings);}
function toggleCart(){document.getElementById('cartDrawer').classList.toggle('open');renderCart();}
async function submitCart(){if(!cart.length){showToast('Add homes to your cart first');return;}const date=document.getElementById('cartDate').value;const time=document.getElementById('cartTime').value;const notes=document.getElementById('cartNotes').value;const batchId='batch_'+Date.now();const inserts=cart.map(item=>({listing_key:item.listingKey,property_price:item.price,property_address:item.address,property_city:item.city,property_photo:item.photo,property_beds:item.beds,property_baths:item.baths,preferred_date:date||null,preferred_time:time,notes,batch_id:batchId,status:'pending'}));try{const res=await fetch(`${SUPABASE_URL}/rest/v1/showings`,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`},body:JSON.stringify(inserts)});if(res.ok){showToast("Showing requests submitted! We'll confirm shortly.");cart=[];saveCart();renderCart();toggleCart();}else{showToast('Error submitting. Please call us at 714-472-8508');}}catch(e){showToast('Error: '+e.message);}}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),3000);}
document.addEventListener('DOMContentLoaded',()=>{renderCityPills(COUNTIES['Orange County']);saveCart();renderCart();document.getElementById('cartDate').min=new Date().toISOString().split('T')[0];});
</script>
<script async defer src="https://maps.googleapis.com/maps/api/js?key=AIzaSyACmn2j8wwVNO53MLWGPFFsImjEUxe4D50&libraries=places&callback=initMap&loading=async"></script>
</body>
</html>
