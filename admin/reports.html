<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports | Rates &amp; Realty CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/responsive.css">
  <script src="/admin/js/auth-guard.js"></script>
  <script>if(localStorage.getItem('rr-theme')==='light')document.documentElement.classList.add('light-preload');</script>
  <style>
    html.light-preload body, html.light-preload { background: #f5f5f5 !important; }
  </style>
  <style>
    :root {
      --bg:       #050505;
      --surface:  rgba(13,13,13,0.98);
      --surface2: rgba(18,18,18,0.98);
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.05);
      --text:     #f6f1e8;
      --text2:    #d4cbb8;
      --muted:    #b6ab93;
      --gold:     #C9A84C;
      --gold-bg:  rgba(201,168,76,0.08);
      --gold-bdr: rgba(201,168,76,0.25);
      --input-bg: rgba(20,20,20,0.98);
      --sidebar-w: 220px;
      --topbar-h:  60px;
    }
    body.light {
      --bg:       #f4f2ee;
      --surface:  #ffffff;
      --surface2: #f8f6f2;
      --border:   rgba(0,0,0,0.09);
      --border2:  rgba(0,0,0,0.05);
      --text:     #1a1410;
      --text2:    #3d3427;
      --muted:    #7a6f5c;
      --input-bg: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      transition: background 0.3s ease, color 0.3s ease;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font-family: 'Manrope', sans-serif; font-size: 0.85rem; }

    /* ── SIDEBAR ── */
    .rp-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: rgba(8,8,8,0.99);
      border-right: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: background .3s ease, border-color .3s ease;
    }
    body.light .rp-sidebar { background: #ffffff; border-right-color: #e0e0e0; }
    .rp-sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    body.light .rp-sidebar-brand { border-bottom-color: #e0e0e0; }
    .rp-sidebar-mark {
      width: 28px; height: 28px; border-radius: 8px;
      background: linear-gradient(135deg, #C9A84C 0%, #f2cf85 100%);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 13px; color: #111;
    }
    .rp-sidebar-title { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 700; color: var(--text); }
    .rp-sidebar-sub   { font-size: 0.65rem; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-top: -2px; }
    .rp-sidebar-label { font-size: 0.65rem; font-weight: 700; color: var(--muted); letter-spacing: .1em; text-transform: uppercase; padding: 20px 20px 8px; }
    body.light .rp-sidebar-label { color: #888; }
    .rp-nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; color: var(--text2);
      font-size: 0.85rem; font-weight: 600;
      transition: all .15s; border-left: 3px solid transparent;
      cursor: pointer;
    }
    body.light .rp-nav-link { color: #555; }
    body.light .rp-nav-link:hover { color: #1a1a1a; background: rgba(0,0,0,0.05); }
    .rp-nav-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }
    .rp-nav-link.active { color: var(--gold); background: var(--gold-bg); border-left-color: var(--gold); }
    body.light .rp-nav-link.active { color: #a07828; background: rgba(192,152,60,0.1); border-left-color: #a07828; }
    .rp-sidebar-spacer { flex: 1; }
    .rp-sidebar-footer { padding: 12px 0; border-top: 1px solid var(--border); }
    body.light .rp-sidebar-footer { border-top-color: #e0e0e0; }

    /* ── MAIN ── */
    .rp-main { flex: 1; min-width: 0; display: flex; flex-direction: column; }
    .rp-topbar {
      height: var(--topbar-h);
      display: flex; align-items: center; gap: 16px;
      padding: 0 24px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    .rp-topbar-title { font-family: 'Cormorant Garamond', serif; font-size: 1.5rem; font-weight: 700; }
    .rp-topbar-sep { flex: 1; }
    .rp-theme-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .rp-theme-btn:hover { color: var(--gold); border-color: var(--gold-bdr); }

    /* ── STAT BOXES ── */
    .rp-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; padding: 24px; }
    .rp-stat-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }
    .rp-stat-label {
      font-size: 0.72rem; text-transform: uppercase; letter-spacing: .08em;
      color: var(--muted); font-weight: 600;
    }
    .rp-stat-num {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem; font-weight: 700;
      color: var(--text); margin-top: 4px;
    }

    /* ── CHARTS GRID ── */
    .rp-charts { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; padding: 0 24px 24px; }
    .rp-chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
    }
    .rp-chart-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem; font-weight: 700;
      color: var(--text); margin-bottom: 16px;
    }
    .rp-chart-wrap { position: relative; width: 100%; max-height: 280px; }

    @media (max-width: 1024px) {
      .rp-sidebar { display: none; }
      .rp-stats { grid-template-columns: repeat(2, 1fr); }
      .rp-charts { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      .rp-stats { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body class="admin-page">

<!-- ── MAIN ── -->
<div class="rp-main">
  <header class="rp-topbar">
    <div class="rp-topbar-title">Reports</div>
    <div class="rp-topbar-sep"></div>
    <button class="rp-theme-btn" id="theme-btn" onclick="toggleTheme()" title="Toggle theme">🌙</button>
    <button onclick="adminLogout()" style="padding:7px 14px;background:rgba(248,113,113,0.1);border:1px solid rgba(248,113,113,0.25);border-radius:8px;color:#f87171;font-size:0.8rem;font-weight:700;cursor:pointer;">Logout</button>
  </header>

  <!-- STAT BOXES -->
  <div class="rp-stats">
    <div class="rp-stat-box">
      <div class="rp-stat-label">Total Leads</div>
      <div class="rp-stat-num" id="stat-total">—</div>
    </div>
    <div class="rp-stat-box">
      <div class="rp-stat-label">Hot Leads</div>
      <div class="rp-stat-num" id="stat-hot" style="color:#f87171;">—</div>
    </div>
    <div class="rp-stat-box">
      <div class="rp-stat-label">Appts Set</div>
      <div class="rp-stat-num" id="stat-appts" style="color:#fbbf24;">—</div>
    </div>
    <div class="rp-stat-box">
      <div class="rp-stat-label">Closed</div>
      <div class="rp-stat-num" id="stat-closed" style="color:#4ade80;">—</div>
    </div>
  </div>

  <!-- CHARTS -->
  <div class="rp-charts">
    <div class="rp-chart-card">
      <div class="rp-chart-title">Leads by Source</div>
      <div class="rp-chart-wrap"><canvas id="chart-source"></canvas></div>
    </div>
    <div class="rp-chart-card">
      <div class="rp-chart-title">Leads by Status</div>
      <div class="rp-chart-wrap"><canvas id="chart-status"></canvas></div>
    </div>
    <div class="rp-chart-card">
      <div class="rp-chart-title">Lead Temperature</div>
      <div class="rp-chart-wrap"><canvas id="chart-temp"></canvas></div>
    </div>
    <div class="rp-chart-card">
      <div class="rp-chart-title">Leads Over Time (30 Days)</div>
      <div class="rp-chart-wrap"><canvas id="chart-timeline"></canvas></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/api/env.js"></script>
<script>
const { createClient } = window.supabase;
const sb = createClient(window.APP_CONFIG.SUPABASE_URL, window.APP_CONFIG.SUPABASE_ANON_KEY);

const goldPalette = [
  '#C9A84C','#f2cf85','#a07828','#e8c36a','#8b6914',
  '#60a5fa','#f87171','#4ade80','#a78bfa','#fbbf24',
  '#fb923c','#e879f9','#34d399'
];

async function loadReports() {
  try {
    // Fetch contacts with their leads
    const { data: contacts, error } = await sb
      .from('contacts')
      .select('id, first_name, last_name, lead_score, score_tier, created_at, leads(id, status, source, created_at)');
    if (error) throw error;

    const all = (contacts || []).map(c => {
      const leads = Array.isArray(c.leads) ? c.leads : (c.leads ? [c.leads] : []);
      const latest = leads.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0] || {};
      return { ...c, status: latest.status || null, source: latest.source || null, lead_created: latest.created_at || c.created_at };
    });

    // Stats
    document.getElementById('stat-total').textContent = all.length;
    document.getElementById('stat-hot').textContent = all.filter(c => c.score_tier === 'hot').length;
    document.getElementById('stat-appts').textContent = all.filter(c => ['preapproved','in_process'].includes(c.status)).length;
    document.getElementById('stat-closed').textContent = all.filter(c => c.status === 'closed').length;

    const isDark = !document.body.classList.contains('light');
    const gridColor = isDark ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.08)';
    const textColor = isDark ? '#b6ab93' : '#7a6f5c';
    Chart.defaults.color = textColor;

    // ── Leads by Source (Doughnut) ──
    const srcCounts = {};
    all.forEach(c => { const s = c.source || 'unknown'; srcCounts[s] = (srcCounts[s] || 0) + 1; });
    new Chart(document.getElementById('chart-source'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(srcCounts).map(s => s.charAt(0).toUpperCase() + s.slice(1).replace(/_/g,' ')),
        datasets: [{ data: Object.values(srcCounts), backgroundColor: goldPalette.slice(0, Object.keys(srcCounts).length), borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 10 } } } }
    });

    // ── Leads by Status (Bar) ──
    const statusLabels = { new:'New', contacted:'Contacted', prequalified:'Pre-Qual', preapproved:'Pre-Approved', in_process:'In Process', in_escrow:'In Escrow', closed:'Closed', lost:'Lost' };
    const stsCounts = {};
    all.forEach(c => { const s = c.status || 'new'; stsCounts[s] = (stsCounts[s] || 0) + 1; });
    const stsColors = { new:'#60a5fa', contacted:'#fbbf24', prequalified:'#fb923c', preapproved:'#34d399', in_process:'#a78bfa', in_escrow:'#e879f9', closed:'#4ade80', lost:'#f87171' };
    new Chart(document.getElementById('chart-status'), {
      type: 'bar',
      data: {
        labels: Object.keys(stsCounts).map(k => statusLabels[k] || k),
        datasets: [{
          data: Object.values(stsCounts),
          backgroundColor: Object.keys(stsCounts).map(k => stsColors[k] || '#C9A84C'),
          borderRadius: 6,
          barThickness: 28
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: gridColor } }, x: { grid: { display: false } } }
      }
    });

    // ── Lead Temperature (Pie) ──
    const tempCounts = { hot: 0, warm: 0, cold: 0 };
    all.forEach(c => {
      const tier = c.score_tier || 'cold';
      if (tempCounts[tier] !== undefined) tempCounts[tier]++;
      else tempCounts.cold++;
    });
    new Chart(document.getElementById('chart-temp'), {
      type: 'pie',
      data: {
        labels: ['Hot', 'Warm', 'Cold'],
        datasets: [{ data: [tempCounts.hot, tempCounts.warm, tempCounts.cold], backgroundColor: ['#f87171','#fbbf24','#60a5fa'], borderWidth: 0 }]
      },
      options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { boxWidth: 12, padding: 10 } } } }
    });

    // ── Leads Over Time 30 Days (Line) ──
    const now = new Date();
    const days = [];
    const dayCounts = {};
    for (let i = 29; i >= 0; i--) {
      const d = new Date(now);
      d.setDate(d.getDate() - i);
      const key = d.toISOString().split('T')[0];
      days.push(key);
      dayCounts[key] = 0;
    }
    all.forEach(c => {
      const d = (c.lead_created || c.created_at || '').split('T')[0];
      if (dayCounts[d] !== undefined) dayCounts[d]++;
    });
    new Chart(document.getElementById('chart-timeline'), {
      type: 'line',
      data: {
        labels: days.map(d => { const p = d.split('-'); return p[1] + '/' + p[2]; }),
        datasets: [{
          data: days.map(d => dayCounts[d]),
          borderColor: '#C9A84C',
          backgroundColor: 'rgba(201,168,76,0.1)',
          fill: true,
          tension: 0.35,
          pointRadius: 2,
          pointHoverRadius: 5
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: { y: { beginAtZero: true, ticks: { stepSize: 1 }, grid: { color: gridColor } }, x: { grid: { display: false } } }
      }
    });

  } catch (err) {
    console.error('Reports load error:', err);
    document.querySelector('.rp-stats').innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:40px;color:var(--muted);">Error loading reports: ${err.message}</div>`;
  }
}

/* ── THEME ── */
function toggleTheme() {
  document.body.classList.toggle('light');
  const isLight = document.body.classList.contains('light');
  localStorage.setItem('rr-theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-btn').textContent = isLight ? '☀️' : '🌙';
}
if (localStorage.getItem('rr-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-btn').textContent = '☀️';
}

loadReports();
</script>
</body>
</html>
