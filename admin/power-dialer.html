<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <script src="/api/env.js?v=20260412b"></script>
  <title>Power Dialer | Rates &amp; Realty CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="/admin/js/supabase-client.js?v=2026061501"></script>
  <script src="/admin/js/auth-guard.js?v=2026061501"></script>
  <script src="https://sdk.twilio.com/js/voice/releases/2.11.0/twilio.min.js"></script>
  <style>
    :root{
      --bg:#050505; --surface:rgba(13,13,13,0.98); --surface2:rgba(20,20,20,0.98);
      --border:rgba(255,255,255,0.08); --border2:rgba(255,255,255,0.05);
      --text:#f6f1e8; --text2:#d4cbb8; --muted:#b6ab93;
      --gold:#C9A84C; --gold-dk:#9A7B2E; --gold-bg:rgba(201,168,76,0.08); --gold-bdr:rgba(201,168,76,0.25);
      --green:#3FB950; --red:#E5484D; --blue:#5B8DEF; --amber:#E5984D;
    }
    *{box-sizing:border-box;}
    html,body{margin:0;padding:0;height:100%;}
    body{background:var(--bg);color:var(--text);font-family:'Manrope',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;display:flex;flex-direction:column;height:100vh;overflow:hidden;}
    a{color:inherit;text-decoration:none;}
    .muted{color:var(--muted);}
    .empty{color:var(--muted);font-size:12px;padding:14px 4px;}
    .chip{display:inline-block;font-size:10px;font-weight:700;border-radius:10px;padding:2px 9px;white-space:nowrap;}
    .chip-muted{color:var(--muted);border:1px solid var(--border);background:rgba(255,255,255,.03);}
    .chip-green{color:var(--green);border:1px solid rgba(63,185,80,.4);background:rgba(63,185,80,.08);}
    .chip-red{color:var(--red);border:1px solid rgba(229,72,77,.4);background:rgba(229,72,77,.08);}
    .btn-gold{background:linear-gradient(135deg,#7A5020,#C9A84C);color:#1A0E00;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;padding:9px 16px;font-family:inherit;}
    .btn-ghost{background:transparent;border:1px solid var(--gold-bdr);color:var(--gold);border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;padding:7px 12px;font-family:inherit;}
    .fld{width:100%;background:#0d0d0d;border:1px solid var(--border);color:var(--text);border-radius:8px;font-size:13px;padding:8px 10px;font-family:inherit;outline:none;box-sizing:border-box;}
    .fld:focus{border-color:var(--gold-bdr);}
    .q-copy{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:6px;font-size:11px;cursor:pointer;padding:3px 8px;font-family:inherit;}
    .q-copy:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .q-note-text{font-size:11.5px;color:var(--text2);cursor:pointer;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-word;}
    .q-note-text.expanded{-webkit-line-clamp:unset;overflow:visible;}
    .spin{width:18px;height:18px;border:2px solid rgba(201,168,76,.25);border-top-color:var(--gold);border-radius:50%;display:inline-block;animation:sp .7s linear infinite;vertical-align:middle;}
    @keyframes sp{to{transform:rotate(360deg)}}
    .loading{color:var(--muted);font-size:12px;padding:14px;display:flex;align-items:center;gap:10px;}
    /* Top bar */
    .pd-top{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap;padding:12px 20px;border-bottom:1px solid var(--border);background:var(--surface);}
    .pd-top h1{font-size:18px;font-weight:800;margin:0;}
    .pd-back{font-size:12px;color:var(--muted);margin-right:10px;}
    .pd-back:hover{color:var(--gold);}
    .pd-session{font-size:12px;color:var(--text2);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-weight:600;}
    /* Controls */
    .pd-controls{flex-shrink:0;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:9px 20px;border-bottom:1px solid var(--border);background:#0c0c0c;}
    .pd-tabs{display:flex;gap:4px;flex-wrap:wrap;}
    .pd-tab{background:transparent;border:1px solid var(--border);color:var(--muted);border-radius:8px;font-family:inherit;font-size:13px;font-weight:700;padding:7px 13px;cursor:pointer;}
    .pd-tab.active{background:var(--gold-bg);border-color:var(--gold-bdr);color:var(--gold);}
    .pd-hint{margin-left:auto;font-size:10.5px;color:var(--muted);}
    .pd-hint kbd{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:0 4px;font-size:10px;}
    /* Main */
    .pd-main{flex:1;display:grid;grid-template-columns:minmax(300px,38%) 1fr;min-height:0;}
    .pd-list{overflow-y:auto;border-right:1px solid var(--border);background:#0a0a0a;}
    .pd-list-hd{position:sticky;top:0;background:#0a0a0a;border-bottom:1px solid var(--border);padding:8px 12px;font-size:11px;color:var(--muted);display:flex;align-items:center;justify-content:space-between;z-index:2;}
    .pd-mtoggle{display:none;}
    .pd-row{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border2);cursor:pointer;border-left:3px solid transparent;line-height:1.5;}
    .pd-row:hover{background:rgba(255,255,255,.02);}
    .pd-row.active{background:var(--gold-bg);border-left-color:var(--gold);}
    .pd-row .nm{font-size:18px;font-weight:700;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .pd-row .sub{font-size:13px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
    .pd-badge{display:inline-block;font-size:9.5px;font-weight:800;border-radius:9px;padding:1px 7px;white-space:nowrap;}
    .pd-pe{display:inline-block;font-size:10.5px;font-weight:800;color:var(--gold);background:var(--gold-bg);border:1px solid var(--gold-bdr);border-radius:9px;padding:1px 7px;white-space:nowrap;}
    .pd-after{display:inline-block;font-size:9px;font-weight:800;color:#E5984D;background:rgba(229,152,77,.14);border:1px solid rgba(229,152,77,.4);border-radius:9px;padding:1px 6px;white-space:nowrap;}
    .chip-gold{color:var(--gold);border:1px solid var(--gold-bdr);background:var(--gold-bg);}
    .pd-focus{overflow-y:auto;padding:22px 26px 90px;}
    .pd-bigphone{display:inline-block;font-size:30px;font-weight:800;color:var(--gold);letter-spacing:.5px;}
    .pd-hours-banner{background:rgba(229,72,77,.10);border:1px solid rgba(229,72,77,.4);color:#F2A5A8;font-size:12.5px;font-weight:600;border-radius:9px;padding:8px 11px;margin-top:12px;}
    .pd-summary{flex-shrink:0;font-size:11.5px;color:var(--muted);padding:6px 20px;border-bottom:1px solid var(--border);background:#0a0a0a;}
    .pd-summary strong{color:var(--text2);font-weight:700;}
    .pd-modal{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:9999;padding:20px;}
    .pd-modal-box{background:var(--surface);border:1px solid var(--gold-bdr);border-radius:14px;padding:18px;width:520px;max-width:100%;max-height:85vh;overflow-y:auto;}
    .pd-tag{display:inline-block;font-size:10px;font-weight:700;border-radius:9px;padding:1px 7px;white-space:nowrap;}
    .pd-tag-sm{font-size:9px;padding:0 6px;}
    .pd-tagopt{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:14px;font-size:11px;cursor:pointer;padding:3px 9px;font-family:inherit;}
    .pd-tagopt:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .pd-fpanel{display:none;position:absolute;top:calc(100% + 6px);right:0;z-index:50;background:var(--surface);border:1px solid var(--gold-bdr);border-radius:12px;padding:14px;width:300px;box-shadow:0 12px 36px rgba(0,0,0,.6);}
    .pd-fpanel.open{display:block;}
    /* Smart empty-state card */
    .pd-emptycard{width:480px;max-width:100%;background:var(--surface2);border:1px solid var(--border);border-radius:14px;padding:24px;text-align:center;}
    .pd-fix{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:9px;padding:11px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:7px;text-align:left;}
    .pd-fix:hover{border-color:var(--gold-bdr);color:var(--text);}
    .pd-fix-n{color:var(--gold);font-weight:800;white-space:nowrap;flex-shrink:0;}
    .pd-fix-all{border-color:var(--gold-bdr);}
    .pd-bchip{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:16px;font-size:12px;font-weight:700;padding:5px 12px;cursor:pointer;font-family:inherit;}
    .pd-bchip:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .pd-bchip.on{background:var(--gold-bg);border-color:var(--gold-bdr);color:var(--gold);}
    .pd-empty-amber{background:rgba(229,152,77,.10);border:1px solid rgba(229,152,77,.35);color:#E7B380;font-size:12.5px;border-radius:9px;padding:9px 12px;margin-top:14px;line-height:1.5;}
    /* Auto-dial */
    .pd-auto-on{background:linear-gradient(135deg,#7A5020,#C9A84C)!important;color:#1A0E00!important;border-color:transparent!important;}
    .pd-auto-sec{display:inline-flex;gap:4px;margin-left:6px;vertical-align:middle;}
    .pd-secbtn{background:var(--surface2);border:1px solid var(--border);color:var(--muted);border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;padding:4px 8px;font-family:inherit;}
    .pd-secbtn.on{background:var(--gold-bg);border-color:var(--gold-bdr);color:var(--gold);}
    .pd-auto{background:var(--surface2);border:1px solid var(--gold-bdr);border-radius:10px;padding:12px;margin-top:12px;}
    .pd-auto-bar{height:6px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden;margin-top:8px;}
    .pd-auto-bar-fill{height:100%;background:var(--gold);transition:width .25s linear;}
    .pd-auto-paused{border-color:rgba(229,152,77,.4);color:#E7B380;}
    .pd-auto-help{font-size:11.5px;color:var(--muted);margin-top:8px;line-height:1.5;}
    .pd-bridge-note{background:var(--surface2);border:1px solid var(--gold-bdr);border-radius:9px;padding:9px 12px;margin-top:10px;font-size:12px;color:var(--text2);line-height:1.5;}
    /* Live call bar */
    #callBar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);display:none;align-items:center;gap:12px;background:#161616;border:1px solid var(--gold-bdr);border-radius:12px;padding:9px 16px;z-index:9998;box-shadow:0 12px 36px rgba(0,0,0,.6);font-size:13px;}
    .pd-dispo{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;padding:9px 13px;font-family:inherit;}
    .pd-dispo:hover{border-color:var(--gold-bdr);color:var(--gold);}
    .pd-dispo b{color:var(--muted);font-size:11px;margin-right:3px;}
    .pd-section{margin-top:18px;}
    .pd-section-h{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
    .pd-cleared{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;color:var(--muted);font-size:16px;font-weight:700;gap:8px;}
    #toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#161616;border:1px solid var(--gold-bdr);color:var(--text);font-size:13px;padding:10px 18px;border-radius:10px;opacity:0;pointer-events:none;transition:all .25s;z-index:9999;box-shadow:0 10px 30px rgba(0,0,0,.5);}
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    @media(max-width:960px){
      body{height:auto;overflow:auto;}
      .pd-main{display:block;}
      .pd-list{max-height:42vh;border-right:none;border-bottom:1px solid var(--border);}
      .pd-mtoggle{display:inline-block;}
      .pd-list.collapsed #queueList{display:none;}
      .pd-hint{display:none;}
    }
  </style>
</head>
<body>
  <div class="pd-top">
    <div style="display:flex;align-items:center;min-width:0;">
      <a class="pd-back" href="people.html">← Leads</a>
      <h1>⚡ Power Dialer</h1>
    </div>
    <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
      <button class="btn-ghost" onclick="openCallerIds()">☎ Caller IDs</button>
      <div id="sessionStrip" class="pd-session">0 calls · 0 connects · 0 callbacks set — today</div>
    </div>
  </div>

  <div class="pd-controls">
    <div class="pd-tabs" id="pdTabs"></div>
    <select id="partnerSelect" class="fld" style="width:auto;height:32px;font-size:13px;padding:0 8px;" onchange="changePartner()"><option value="">All partners</option></select>
    <select id="stageSelect" class="fld" style="width:auto;height:32px;font-size:13px;padding:0 8px;" onchange="changeStage()">
      <option value="">All stages</option>
      <option value="New Lead">New Lead</option>
      <option value="Contacted">Contacted</option>
      <option value="Processing">Processing</option>
      <option value="Pre-Approved">Pre-Approved</option>
      <option value="Under Contract">Under Contract</option>
      <option value="Clear to Close">Clear to Close</option>
    </select>
    <select id="viewSelect" class="fld" style="width:auto;height:32px;font-size:13px;padding:0 8px;" onchange="applyView(this.value)"><option value="">Saved views…</option></select>
    <button class="btn-ghost" style="padding:5px 10px;" onclick="saveView()">Save view</button>
    <button id="viewDelBtn" class="q-copy" style="display:none;" onclick="deleteView()" title="Delete selected view">×</button>
    <div style="position:relative;">
      <button class="btn-ghost" style="padding:5px 10px;" onclick="toggleFilters()">Filters <span id="filtersCount"></span> ▾</button>
      <div id="filtersPanel" class="pd-fpanel"></div>
    </div>
    <span class="pd-hint"><kbd>N</kbd>/<kbd>Enter</kbd> next · <kbd>1</kbd>–<kbd>5</kbd> dispositions · <kbd>C</kbd> note</span>
  </div>
  <div id="filterSummary" class="pd-summary">Showing: New · Stage: All · Partner: All · 0 leads</div>

  <div class="pd-main">
    <aside class="pd-list" id="pdListPane" onscroll="onListScroll(event)">
      <div class="pd-list-hd">
        <span id="listCount">Loading…</span>
        <button class="q-copy pd-mtoggle" onclick="toggleList()">Hide / Show</button>
      </div>
      <div id="queueList"><div class="loading"><span class="spin"></span> Loading queue…</div></div>
      <div id="queueMore"></div>
    </aside>
    <section class="pd-focus" id="pdFocus">
      <div id="focusBody"><div class="loading"><span class="spin"></span> Loading…</div></div>
    </section>
  </div>

  <div id="callBar"></div>
  <div id="callerIdModal" class="pd-modal" onclick="if(event.target===this)closeCallerIds()">
    <div class="pd-modal-box">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div style="font-weight:800;font-size:15px;">☎ Caller IDs · Local Presence</div>
        <button class="q-copy" onclick="closeCallerIds()">Close</button>
      </div>
      <div id="callerIdBody"></div>
    </div>
  </div>
  <div id="toast"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script>
  /* ── helpers ── */
  function _authClient(){ return window._supabaseClient; }
  function esc(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function showToast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(t._tm); t._tm=setTimeout(function(){ t.classList.remove('show'); },2500); }
  function fmtMoney(n){ n=Number(n)||0; var a=Math.abs(n); if(a>=1e6) return '$'+(n/1e6).toFixed(1).replace(/\.0$/,'')+'M'; if(a>=1e3) return '$'+(n/1e3).toFixed(1).replace(/\.0$/,'')+'K'; return '$'+n.toLocaleString('en-US',{maximumFractionDigits:0}); }
  function titleCase(s){ return String(s||'').replace(/\b\w/g,function(c){return c.toUpperCase();}); }
  function timeAgo(iso){
    if(!iso) return '';
    var d=new Date(iso), s=Math.floor((Date.now()-d.getTime())/1000);
    if(s<60) return 'just now';
    var m=Math.floor(s/60); if(m<60) return m+'m ago';
    var h=Math.floor(m/60); if(h<24) return h+'h ago';
    var dd=Math.floor(h/24); if(dd<30) return dd+'d ago';
    var mo=Math.floor(dd/30); if(mo<12) return mo+'mo ago';
    return Math.floor(mo/12)+'y ago';
  }
  function fmtDateTime(iso){ if(!iso) return ''; try{ return new Date(iso).toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'numeric',minute:'2-digit'}); }catch(e){ return ''; } }
  function prettySource(s){
    s=String(s||'').trim().replace(/^call_console:/,'');
    var low=s.toLowerCase();
    var special={ 'sms':'SMS', 'sms_ocr':'SMS OCR', 'call':'Call', 'note':'Note', 'email':'Email', 'manual':'Manual' };
    if(special[low]) return special[low];
    return s.replace(/[_-]+/g,' ').replace(/\s+/g,' ').trim().replace(/\b\w/g,function(c){ return c.toUpperCase(); }) || '—';
  }
  function _currentAuthorName(){ var u=window._adminUser||{}; return (u.user_metadata && u.user_metadata.full_name) || u.email || 'You'; }
  function copyText(t){
    t=String(t||'');
    if(navigator.clipboard && navigator.clipboard.writeText){ navigator.clipboard.writeText(t).then(function(){ showToast('Copied'); },function(){ showToast('Copy failed'); }); }
    else { try{ var ta=document.createElement('textarea'); ta.value=t; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); showToast('Copied'); }catch(e){ showToast('Copy failed'); } }
  }
  async function waitClient(ms){ ms=ms||7000; var s=Date.now(); while(!window._supabaseClient && Date.now()-s<ms){ await new Promise(function(r){setTimeout(r,40);}); } return window._supabaseClient; }

  /* ── state ── */
  var _filter='new', _stage='', _partnerId='', _sort='priority', _queue=[], _offset=0, _limit=75, _loading=false, _exhausted=false, _currentIdx=-1;
  var _source=null, _tagIds=null, _callableOnly=false, _minLoan=null;
  var _counts={}, _notesCache={}, _partners=[], _views=[], _tagsList=[], _sourcesList=[];
  var _sCalls=0, _sConnects=0, _sCallbacks=0;
  var _device=null, _call=null, _voiceReady=false, _callT=null, _callSec=0, _pendingDur=0;
  var _vmTemplates=[], _vmLoaded=false, _vmRec=null, _vmChunks=[];
  var _twNumbers=[];
  var _autoDial=false, _autoSeconds=3, _autoTimer=null, _autoRemaining=0, _autoSkipped=0, _autoHelpShown=false, _autoHelpVisible=false;
  var DISPOS=['No answer','Left VM','Connected','Not interested','Wrong number'];
  var TABS=[['due','Due','due'],['new','New','new_leads'],['stale','Stale','stale'],['scheduled','Scheduled','scheduled'],['all','All','total_active']];

  /* ── boot ── */
  try{ _autoDial=localStorage.getItem('pd_autodial')==='1'; }catch(e){}
  try{ var _as=parseInt(localStorage.getItem('pd_autosecs'),10); if([3,5,8].indexOf(_as)>-1) _autoSeconds=_as; }catch(e){}
  window.addEventListener('beforeunload', function(){ clearAutoTimer(); }); // disarm on navigate away

  (async function(){
    await waitClient();
    if(!window._supabaseClient) return; // auth-guard redirects
    renderTabs();
    await loadCounts();
    loadPartners();
    loadViews();
    loadTags();      // cache lead_tags_list for chips + the + Tag picker + filters
    loadTwNumbers(); // local-presence caller IDs (also used to label the Call button)
    await loadQueue(true);
    initVoice(); // async; re-renders focus when ready (or stays on tel: fallback)
  })();

  /* ── counts + tabs ── */
  async function loadCounts(){
    try{ var r=await _authClient().rpc('power_dialer_counts'); _counts=(r&&!r.error&&r.data)?(Array.isArray(r.data)?(r.data[0]||{}):r.data):{}; }
    catch(e){ _counts={}; }
    renderTabs();
  }
  function renderTabs(){
    var box=document.getElementById('pdTabs'); if(!box) return;
    box.innerHTML=TABS.map(function(t){
      var c=_counts[t[2]]; var n=(c==null?'':' ('+c+')');
      return '<button class="pd-tab'+(_filter===t[0]?' active':'')+'" onclick="setFilter(\''+t[0]+'\')">'+t[1]+n+'</button>';
    }).join('');
  }
  function setFilter(f){ if(_filter===f) return; _filter=f; renderTabs(); loadQueue(true); }
  function changeStage(){
    _stage=(document.getElementById('stageSelect')||{}).value||'';
    if(_stage){ _filter='all'; renderTabs(); } // a stage = its whole segment, not the bucket intersection
    updateFilterSummary(); loadQueue(true);
  }
  function changePartner(){
    _partnerId=(document.getElementById('partnerSelect')||{}).value||'';
    if(_partnerId){ _filter='all'; renderTabs(); } // a partner = their whole segment
    updateFilterSummary(); loadQueue(true);
  }
  function updateFilterSummary(){
    var el=document.getElementById('filterSummary'); if(!el) return;
    var tab=(TABS.filter(function(t){ return t[0]===_filter; })[0]||['','All'])[1]||titleCase(_filter);
    var partnerName='All';

  /* ── queue load / infinite scroll ── */
  async function loadQueue(reset){
    if(_loading) return;
    _loading=true;
    if(reset){ _queue=[]; _offset=0; _exhausted=false; _currentIdx=-1; document.getElementById('queueList').innerHTML='<div class="loading"><span class="spin"></span> Loading queue…</div>'; }
    try{
      var r=await _authClient().rpc('power_dialer_queue',{
        p_filter:_filter, p_stage:_stage||null, p_partner_id:_partnerId||null,
        p_limit:_limit, p_offset:_offset,
        p_source:_source||null,
        p_tag_ids:(_tagIds&&_tagIds.length)?_tagIds:null,
        p_callable_only:!!_callableOnly,
        p_min_loan:(_minLoan!=null&&_minLoan!=='')?Number(_minLoan):null,
        p_sort:_sort||'priority'
      });
      var rows=(r&&!r.error&&r.data)?r.data:[];
      _queue=_queue.concat(rows);
      _offset+=rows.length;
      if(rows.length<_limit) _exhausted=true;
      renderList();
      updateFilterSummary();
      if(reset){
        if(_queue.length){ _currentIdx=0; renderFocus(); scrollCurrentIntoView(); autoDialTick(); }
        else { showCleared(); }
      }
    }catch(e){ document.getElementById('queueList').innerHTML='<div class="empty">Could not load queue.</div>'; }
    _loading=false;
  }
  async function loadMore(){ if(_loading||_exhausted) return; await loadQueue(false); }
  function onListScroll(e){

  /* ── calling-hours guardrail + local presence helpers ── */

  }
  function leadAreaCode(phone){
    var d=String(phone||'').replace(/\D/g,'');

    return d.length>=10 ? d.slice(0,3) : '';

  /* ── click-to-call via the user's own phone (bridge_call) ── */
  function getAgentPhone(){ try{ return (localStorage.getItem('pd_agent_phone')||'').trim(); }catch(e){ return ''; } }
  function setAgentPhone(v){ try{ localStorage.setItem('pd_agent_phone', v||''); }catch(e){} }
  function fmtPhone(p){
    var d=String(p||'').replace(/\D/g,'');
    if(d.length===11 && d.charAt(0)==='1') d=d.slice(1);

  function promptAgentPhone(){

  async function bridgeCall(){

    try{

      if(r&&r.error) throw new Error((r.error&&r.error.message)||'Could not start call');
      showToast('📞 Ringing your phone — answer to connect to '+(lead.name||'this lead'));
      var bn=document.getElementById('bridgeNote');

  }

  function hexA(hex, a){
    var c=String(hex||'#C9A84C').trim();
    var m=/^#?([0-9a-fA-F]{6})$/.exec(c);
    if(!m) return c;
    var n=parseInt(m[1],16);
    return 'rgba('+((n>>16)&255)+','+((n>>8)&255)+','+(n&255)+','+a+')';
  }
  function tagChipsHTML(tags, compact){

      return '<span class="pd-tag'+(compact?' pd-tag-sm':'')+'" style="color:'+c+';background:'+hexA(c,0.18)+';border:1px solid '+hexA(c,0.5)+';">'+esc(t.name||'')+x+'</span>';
    }).join('');

      if(!tg){ // fall back to whatever the RPC returned

  /* ── recent notes (focus) ── */
  function renderNotesHTML(rows){
    rows=rows||[];
    if(!rows.length) return '<div class="muted" style="font-size:11px;">No notes yet for this lead.</div>';
    return '<div style="max-height:150px;overflow-y:auto;">'+rows.map(function(nt){
      var meta=esc(prettySource(nt.source))+' · '+esc(nt.author_display||'—')+' · '+esc(timeAgo(nt.created_at));
      return '<div style="padding:5px 0;border-top:1px solid var(--border2);">'
        +'<div class="q-note-text" onclick="this.classList.toggle(\'expanded\')" title="Click to expand">'+esc(nt.note_text||'')+'</div>'
        +'<div class="muted" style="font-size:9.5px;margin-top:2px;">'+meta+'</div>'
      +'</div>';
    }).join('')+'</div>';
  }
  async function fetchFocusNotes(contactId){
    var box=document.getElementById('focusNotes'); if(!box) return;
    if(!contactId){ box.innerHTML=renderNotesHTML([]); return; }
    if(_notesCache[contactId]){ box.innerHTML=renderNotesHTML(_notesCache[contactId]); return; }
    try{
      var r=await _authClient().rpc('contact_recent_notes',{p_contact_id:contactId,p_limit:5});
      var rows=(r&&!r.error&&r.data)?r.data:[];
      if(!_notesCache[contactId]) _notesCache[contactId]=rows;
      var b2=document.getElementById('focusNotes'); if(b2 && _curContactId()===contactId) b2.innerHTML=renderNotesHTML(_notesCache[contactId]);
    }catch(e){ var b3=document.getElementById('focusNotes'); if(b3) b3.innerHTML=renderNotesHTML(_notesCache[contactId]||[]); }
  }
  function _curContactId(){ var l=_queue[_currentIdx]; return l?l.contact_id:null; }

  /* ── logging ── */
  async function rpcLog(lead, type, dir, note, dur){
    try{
      var r=await _authClient().rpc('contact_log_activity',{p_contact_id:lead.contact_id,p_type:type,p_direction:dir,p_note:note||null,p_duration:dur||null});
      if(r&&r.error) throw new Error(r.error.message);
      // reflect in cached notes if a note was written
      if(note){
        if(!_notesCache[lead.contact_id]) _notesCache[lead.contact_id]=[];
        _notesCache[lead.contact_id].unshift({ id:'local-'+new Date().getTime(), note_text:note, author_display:_currentAuthorName(), source:type, created_at:new Date().toISOString() });
      }
      return true;
    }catch(e){ showToast((e&&e.message)||'Could not log'); return false; }
  }
  async function dispo(text){
    var lead=_queue[_currentIdx]; if(!lead) return;
    if(!confirmHours(lead)) return; // calling-hours guardrail (dispositions log a call)
    var ok=await rpcLog(lead,'call','outbound',text,null); if(!ok) return;
    if(/wrong number/i.test(text)){ // wrong numbers shouldn't be redialed
      try{ await _authClient().rpc('contact_set_dnc',{p_contact_id:lead.contact_id,p_value:true,p_reason:'wrong number'}); }catch(e){}
    }
    _sCalls++; if(/connected/i.test(text)) _sConnects++;
    updateSession(); showToast('Logged: '+text);
    loadCounts();
    advance(true);
  }
  async function logAndNext(){
    var lead=_queue[_currentIdx]; if(!lead) return;
    var note=((document.getElementById('focusNote')||{}).value||'').trim();
    var dur=_pendingDur>0?_pendingDur:null; // duration captured from a browser call
    var ok=await rpcLog(lead,'call','outbound',note||null,dur); if(!ok) return;
    _pendingDur=0;
    _sCalls++; updateSession(); showToast('Call logged');
    loadCounts(); advance(true);
  }
  async function quickLog(type){
    var lead=_queue[_currentIdx]; if(!lead) return;
    var note=((document.getElementById('focusNote')||{}).value||'').trim();
    var dir=(type==='sms')?'outbound':null;
    var ok=await rpcLog(lead,type,dir,note||null,null); if(!ok) return;
    updateSession(); showToast(titleCase(type)+' logged');
    loadCounts(); advance(true);
  }

  /* ── callbacks ── */
  function presetISO(kind){
    var d=new Date(); d.setHours(9,0,0,0);
    if(kind==='tomorrow') d.setDate(d.getDate()+1);
    else if(kind==='3days') d.setDate(d.getDate()+3);
    else if(kind==='nextweek') d.setDate(d.getDate()+7);
    return d.toISOString();
  }
  function cbPreset(kind){ saveCallback(presetISO(kind)); }
  function cbCustom(){
    var v=(document.getElementById('cbInput')||{}).value||'';
    if(!v){ showToast('Pick a date/time'); return; }
    var iso; try{ iso=new Date(v).toISOString(); }catch(e){ showToast('Invalid date'); return; }
    saveCallback(iso);
  }
  async function saveCallback(iso){
    var lead=_queue[_currentIdx]; if(!lead) return;
    var note=((document.getElementById('focusNote')||{}).value||'').trim();
    try{
      var r=await _authClient().rpc('contact_set_followup',{p_contact_id:lead.contact_id,p_when:iso,p_note:note||null});
      if(r&&r.error) throw new Error(r.error.message);
      _sCallbacks++; updateSession();
      showToast('Callback set for '+fmtDateTime(iso));
      loadCounts(); advance(true);
    }catch(e){ showToast((e&&e.message)||'Could not set callback'); }
  }
  async function clearCallback(){
    var lead=_queue[_currentIdx]; if(!lead) return;
    try{
      var r=await _authClient().rpc('contact_clear_followup',{p_contact_id:lead.contact_id});
      if(r&&r.error) throw new Error(r.error.message);
      lead.next_followup_at=null;
      showToast('Callback cleared');
      loadCounts(); renderFocus();
    }catch(e){ showToast((e&&e.message)||'Could not clear'); }
  }

  /* ── advance / skip ── */
  function skipNext(){ advance(false); }
  async function advance(removed){
    if(_currentIdx<0) return;
    _pendingDur=0; // moving to a new lead — clear any leftover call duration
    if(removed){ _queue.splice(_currentIdx,1); } // dispositioned/callbacked — don't recall this session
    else { _currentIdx++; }
    // fetch next page when nearing the end
    if(!_exhausted && _currentIdx >= _queue.length-5){ await loadMore(); }
    if(_currentIdx >= _queue.length){
      if(_exhausted){ renderList(); showCleared(); return; }
      // not exhausted but loadMore added nothing reachable — clamp
      _currentIdx=_queue.length-1;
      if(_currentIdx<0){ renderList(); showCleared(); return; }
    }
    renderList();
    renderFocus();
    scrollCurrentIntoView();
    autoDialTick(); // if auto-dial is armed, place the next call (or skip after-hours)
  }

  function updateFiltersCount(){
    var n=0; if(_source) n++; if(_tagIds&&_tagIds.length) n++; if(_sort&&_sort!=='priority') n++; if(_callableOnly) n++; if(_minLoan!=null) n++;

  async function toggleFilters(){
    var p=document.getElementById('filtersPanel'); if(!p) return;
    if(p.classList.contains('open')){ p.classList.remove('open'); return; }

  function renderFiltersPanel(){

    var hasSrc=_sourcesList.some(function(s){ return String(s.source)===String(_source); });

      +_sourcesList.map(function(s){ return '<option value="'+esc(String(s.source||''))+'"'+((_source!=null&&String(_source)===String(s.source))?' selected':'')+'>'+esc((s.source||'(none)')+' ('+(s.n!=null?s.n:0)+')')+'</option>'; }).join('');
    var tagChecks=_tagsList.map(function(t){
      var checked=(_tagIds&&_tagIds.indexOf(String(t.id))>-1)?'checked':'';
      var c=t.color||'#C9A84C';
      return '<label style="display:flex;align-items:center;gap:7px;padding:3px 0;cursor:pointer;font-size:12px;"><input type="checkbox" class="pd-tagck" value="'+esc(String(t.id))+'" '+checked+'><span style="display:inline-block;width:9px;height:9px;border-radius:50%;background:'+c+';"></span>'+esc(t.name||'')+'</label>';
    }).join('')||'<div class="muted" style="font-size:11px;">No tags yet.</div>';
    var sortOpts=[['priority','Priority (smart)'],['value','Highest value'],['loan','Highest loan'],['recent','Newest'],['oldest','Oldest']]
      .map(function(o){ return '<option value="'+o[0]+'"'+((_sort||'priority')===o[0]?' selected':'')+'>'+o[1]+'</option>'; }).join('');
    p.innerHTML='<div class="pd-section-h">Source</div><select id="fSource" class="fld" style="margin-bottom:10px;">'+srcOpts+'</select>'
      +'<div class="pd-section-h">Tags</div><div style="max-height:130px;overflow-y:auto;margin-bottom:10px;">'+tagChecks+'</div>'
      +'<div class="pd-section-h">Sort</div><select id="fSort" class="fld" style="margin-bottom:10px;">'+sortOpts+'</select>'
      +'<label style="display:flex;align-items:center;gap:8px;font-size:12px;margin-bottom:10px;cursor:pointer;"><input type="checkbox" id="fCallable" '+(_callableOnly?'checked':'')+'> Callable now only</label>'
      +'<div class="pd-section-h">Min loan $</div><input id="fMinLoan" class="fld" type="number" min="0" step="1000" value="'+(_minLoan!=null?esc(String(_minLoan)):'')+'" placeholder="Any" style="margin-bottom:12px;">'
      +'<div style="display:flex;gap:8px;"><button class="btn-gold" onclick="applyFilters()">Apply</button><button class="btn-ghost" onclick="clearFilters()">Clear filters</button></div>';
  }
  function applyFilters(){
    var s=document.getElementById('fSource'); _source=(s&&s.value)?s.value:null;
    var ids=[]; Array.prototype.forEach.call(document.querySelectorAll('#filtersPanel .pd-tagck:checked'),function(c){ ids.push(c.value); });
    _tagIds=ids.length?ids:null;
    var so=document.getElementById('fSort'); _sort=(so&&so.value)||'priority';
    var cc=document.getElementById('fCallable'); _callableOnly=!!(cc&&cc.checked);
    var ml=document.getElementById('fMinLoan'); var mv=ml?ml.value:''; _minLoan=(mv!==''&&mv!=null)?Number(mv):null;
    var p=document.getElementById('filtersPanel'); if(p) p.classList.remove('open');
    updateFiltersCount(); updateFilterSummary(); loadQueue(true);
  }
  function clearFilters(){
    _source=null; _tagIds=null; _sort='priority'; _callableOnly=false; _minLoan=null;
    updateFiltersCount(); updateFilterSummary(); renderFiltersPanel(); loadQueue(true);
  }

  /* ── saved views ── */
  async function loadViews(){
    try{ var r=await _authClient().rpc('dialer_views_list'); _views=(r&&!r.error&&r.data)?r.data:[]; }catch(e){ _views=[]; }
    var sel=document.getElementById('viewSelect'); if(!sel) return;
    var keep=sel.value||'';
    sel.innerHTML='<option value="">Saved views…</option>'+_views.map(function(v){ var mc=(v.match_count!=null?(' ('+v.match_count+')'):''); return '<option value="'+esc(String(v.id))+'">'+esc(v.name||'View')+mc+'</option>'; }).join('');
    if(keep && _views.some(function(v){ return String(v.id)===keep; })) sel.value=keep;
  }
  function applyView(id){
    var del=document.getElementById('viewDelBtn'); if(del) del.style.display=id?'inline-block':'none';
    if(!id) return;
    var v=_views.filter(function(x){ return String(x.id)===String(id); })[0]; if(!v) return;
    // Saved views set the FULL state together — no auto-'all' rule here.
    _filter=v.filter||'all'; _stage=v.stage||''; _partnerId=v.partner_id!=null?String(v.partner_id):''; _sort=v.sort||'priority';
    _source=(v.source!=null&&v.source!=='')?v.source:null;
    _tagIds=(Array.isArray(v.tag_ids)&&v.tag_ids.length)?v.tag_ids.map(String):null;
    _callableOnly=!!v.callable_only;
    _minLoan=(v.min_loan!=null&&v.min_loan!=='')?Number(v.min_loan):null;
    var ss=document.getElementById('stageSelect'); if(ss) ss.value=_stage;
    var ps=document.getElementById('partnerSelect'); if(ps) ps.value=_partnerId;
    renderTabs();
    renderFiltersPanel();   // sync popover controls to the view (safe even when closed)
    updateFiltersCount();
    updateFilterSummary();
    loadQueue(true);
  }
  async function saveView(){
    var name=prompt('Name this view:'); if(name==null) return; name=name.trim(); if(!name){ showToast('Name required'); return; }
    try{
      var r=await _authClient().rpc('dialer_view_save',{
        p_name:name, p_filter:_filter, p_stage:_stage||null, p_partner_id:_partnerId||null, p_sort:_sort||'priority',
        p_source:_source||null, p_tag_ids:(_tagIds&&_tagIds.length)?_tagIds:null, p_callable_only:!!_callableOnly,
        p_min_loan:(_minLoan!=null&&_minLoan!=='')?Number(_minLoan):null
      });
      if(r&&r.error) throw new Error(r.error.message);
      showToast('View saved'); await loadViews(); // refresh so the new count shows
    }catch(e){ showToast((e&&e.message)||'Could not save view'); }
  }
  async function deleteView(){
    var sel=document.getElementById('viewSelect'); var id=sel?sel.value:''; if(!id) return;
    if(!confirm('Delete this saved view?')) return;
    try{
      var r=await _authClient().rpc('dialer_view_delete',{p_id:id});
      if(r&&r.error) throw new Error(r.error.message);
      showToast('View deleted'); if(sel) sel.value=''; var del=document.getElementById('viewDelBtn'); if(del) del.style.display='none'; await loadViews();
    }catch(e){ showToast((e&&e.message)||'Could not delete view'); }
  }

  /* ── browser calling (Twilio Voice) ── */
  async function getVoiceToken(){
    try{
      var r=await _authClient().functions.invoke('twilio-voice',{body:{action:'get_token'}});
      if(r&&r.error) throw new Error((r.error&&r.error.message)||'token error');
      var d=r&&r.data?r.data:null;
      return (d&&d.token)?d.token:null;
    }catch(e){ return null; }
  }
  async function initVoice(){
    if(typeof Twilio==='undefined' || !Twilio.Device){ _voiceReady=false; return; }
    try{
      var tok=await getVoiceToken();
      if(!tok){ _voiceReady=false; return; }
      _device=new Twilio.Device(tok,{codecPreferences:['opus','pcmu']});
      _device.on('tokenWillExpire', async function(){ try{ var t=await getVoiceToken(); if(t) _device.updateToken(t); }catch(e){} });
      _device.on('error', function(err){ console.warn('Twilio device error', err); });
      _voiceReady=true;
    }catch(e){ _voiceReady=false; }
    if(_currentIdx>=0) renderFocus(); // surface the Call button (or keep tel: fallback)
    if(_voiceReady && _autoDial) autoDialTick(); // resume auto-dial once browser calling is ready
  }
  async function startCall(){
    clearAutoTimer(); // a (manual or auto) call supersedes any pending countdown
    var lead=_queue[_currentIdx]; if(!lead||!lead.phone){ showToast('No phone on file'); return; }
    if(!confirmHours(lead)) return; // calling-hours guardrail
    if(!_voiceReady||!_device){ showToast('Browser calling unavailable'); return; }
    try{
      showCallBar('Ringing…');
      _call=await _device.connect({params:{To:lead.phone}});
      _call.on('accept', function(){ startCallTimer(); });
      _call.on('disconnect', function(){ endCall(); });
      _call.on('error', async function(err){
        var msg=(err&&err.message)||'';
        if(/token/i.test(msg) && /expir/i.test(msg)){ var t=await getVoiceToken(); if(t&&_device) _device.updateToken(t); }
        showToast('Call error'); endCall();
      });
    }catch(e){ showToast((e&&e.message)||'Could not start call'); hideCallBar(); _call=null; }
  }
  function startCallTimer(){ _callSec=0; updateCallBar(); if(_callT) clearInterval(_callT); _callT=setInterval(function(){ _callSec++; updateCallBar(); },1000); }
  function updateCallBar(){ var st=document.getElementById('callStatus'); if(st){ var m=Math.floor(_callSec/60), s=_callSec%60; st.textContent='In call '+m+':'+(s<10?'0':'')+s; } }
  function showCallBar(status){
    var bar=document.getElementById('callBar'); if(!bar) return;
    var lead=_queue[_currentIdx]||{};
    bar.innerHTML='<span style="font-weight:700;">📞 '+esc(lead.name||'')+'</span>'
      +'<span id="callStatus" style="color:var(--gold);font-weight:700;">'+esc(status)+'</span>'
      +'<button class="q-copy" onclick="toggleMute(this)">Mute</button>'
      +'<button onclick="hangUp()" style="background:var(--red);color:#fff;border:none;border-radius:8px;font-weight:700;cursor:pointer;padding:7px 16px;font-family:inherit;">Hang Up</button>';
    bar.style.display='flex';
  }
  function hideCallBar(){ var bar=document.getElementById('callBar'); if(bar){ bar.style.display='none'; bar.innerHTML=''; } }
  function endCall(){
    if(_callT){ clearInterval(_callT); _callT=null; }
    _pendingDur=_callSec; _callSec=0;
    hideCallBar();
    _call=null;
    var ta=document.getElementById('focusNote');
    if(ta){ ta.focus(); showToast('Call ended — add a note & Log'); }
  }
  function hangUp(){ if(_call){ try{ _call.disconnect(); }catch(e){} } }
  function toggleMute(btn){
    if(!_call) return;
    var muted=(_call.isMuted?_call.isMuted():false);
    try{ _call.mute(!muted); }catch(e){}
    if(btn) btn.textContent=(!muted?'Unmute':'Mute');
  }

  /* ── voicemail drop ── */
  async function loadVmTemplates(){
    try{ var r=await _authClient().rpc('vm_templates_list'); _vmTemplates=(r&&!r.error&&r.data)?r.data:[]; }catch(e){ _vmTemplates=[]; }
    _vmLoaded=true;

  async function dropVMClick(){
    var lead=_queue[_currentIdx]; if(!lead) return;
    if(!_vmLoaded) await loadVmTemplates();
    if(!_vmTemplates.length){ openVmPanel(); return; }
    if(_vmTemplates.length===1){ dropVM(_vmTemplates[0].url); return; }
    showVmMenu();
  }
  function showVmMenu(){
    var box=document.getElementById('vmArea'); if(!box) return;
    box.innerHTML='<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:8px;">'
      +'<span class="muted" style="font-size:11px;">Drop:</span>'
      +_vmTemplates.map(function(t,i){ return '<button class="pd-dispo" onclick="dropVMByIndex('+i+')">'+esc(t.name||'Template')+'</button>'; }).join('')
      +'<button class="q-copy" onclick="openVmPanel()">Manage</button>'
    +'</div>';
  }
  function dropVMByIndex(i){ var t=_vmTemplates[i]; if(t) dropVM(t.url); }
  async function dropVM(url){
    var lead=_queue[_currentIdx]; if(!lead) return;
    if(!confirmHours(lead)) return; // calling-hours guardrail
    try{
      var r=await _authClient().functions.invoke('twilio-voice',{body:{action:'voicemail_drop', to:lead.phone, voicemail_url:url, contact_id:lead.contact_id}});
      if(r&&r.error) throw new Error((r.error&&r.error.message)||'drop failed');
      showToast('Voicemail dropped'); loadCounts(); advance(true);
    }catch(e){ showToast((e&&e.message)||'Voicemail failed'); }
  }
  function openVmPanel(){
    var box=document.getElementById('vmArea'); if(!box) return;
    var list=_vmTemplates.length
      ? '<div style="margin-bottom:8px;">'+_vmTemplates.map(function(t,i){ return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:3px 0;"><span style="font-size:12px;">'+esc(t.name||'Template')+'</span><button class="q-copy" onclick="deleteVm('+i+')">Delete</button></div>'; }).join('')+'</div>'
      : '<div class="muted" style="font-size:11px;margin-bottom:8px;">No voicemail templates yet.</div>';
    box.innerHTML='<div style="border:1px solid var(--border);border-radius:10px;padding:11px;background:var(--surface2);margin-top:10px;">'
      +'<div class="pd-section-h">Voicemail templates</div>'+list
      +'<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;">'
        +'<input id="vmName" class="fld" placeholder="Template name" style="max-width:160px;">'
        +'<input id="vmUrl" class="fld" placeholder="Public MP3 URL" style="max-width:240px;">'
        +'<button class="btn-ghost" onclick="saveVmUrl()">Save URL</button>'
        +'<button class="btn-ghost" id="vmRecBtn" onclick="toggleVmRecord(this)">● Record</button>'
        +'<span id="vmRecStatus" class="muted" style="font-size:11px;"></span>'
      +'</div></div>';
  }
  async function saveVmUrl(){
    var name=((document.getElementById('vmName')||{}).value||'').trim()||'Voicemail';
    var url=((document.getElementById('vmUrl')||{}).value||'').trim();
    if(!url){ showToast('Paste a public MP3 URL'); return; }
    await vmSave(name,url);
  }
  async function vmSave(name,url){
    try{ var r=await _authClient().rpc('vm_template_save',{p_name:name,p_url:url}); if(r&&r.error) throw new Error(r.error.message); showToast('Template saved'); await loadVmTemplates(); openVmPanel(); }
    catch(e){ showToast((e&&e.message)||'Could not save template'); }
  }
  async function deleteVm(i){
    var t=_vmTemplates[i]; if(!t) return; if(!confirm('Delete this template?')) return;
    try{ var r=await _authClient().rpc('vm_template_delete',{p_id:t.id}); if(r&&r.error) throw new Error(r.error.message); showToast('Deleted'); await loadVmTemplates(); openVmPanel(); }
    catch(e){ showToast((e&&e.message)||'Could not delete'); }
  }
  async function toggleVmRecord(btn){
    if(_vmRec && _vmRec.state==='recording'){ _vmRec.stop(); return; }
    try{
      var stream=await navigator.mediaDevices.getUserMedia({audio:true});
      _vmChunks=[]; _vmRec=new MediaRecorder(stream);
      _vmRec.ondataavailable=function(e){ if(e.data&&e.data.size) _vmChunks.push(e.data); };
      _vmRec.onstop=async function(){
        stream.getTracks().forEach(function(t){ t.stop(); });
        var blob=new Blob(_vmChunks,{type:_vmRec.mimeType||'audio/webm'});
        var st=document.getElementById('vmRecStatus'); if(st) st.textContent='Uploading…';
        await uploadVm(blob);
        var b=document.getElementById('vmRecBtn'); if(b) b.textContent='● Record';
      };
      _vmRec.start();
      if(btn) btn.textContent='■ Stop';
      var st=document.getElementById('vmRecStatus'); if(st) st.textContent='Recording…';
    }catch(e){ showToast('Microphone unavailable'); }
  }
  async function uploadVm(blob){
    try{
      var fname='vm_'+new Date().getTime()+'.webm';
      var up=await _authClient().storage.from('voicemails').upload(fname, blob, {contentType:blob.type||'audio/webm', upsert:true});
      if(up&&up.error) throw new Error(up.error.message);
      var pub=_authClient().storage.from('voicemails').getPublicUrl(fname);
      var url=pub&&pub.data?pub.data.publicUrl:'';
      if(!url) throw new Error('No public URL');
      var name=((document.getElementById('vmName')||{}).value||'').trim()||('Recording '+new Date().toLocaleDateString());
      await vmSave(name,url);
    }catch(e){ showToast((e&&e.message)||'Upload failed'); var st=document.getElementById('vmRecStatus'); if(st) st.textContent=''; }
  }

  /* ── quick SMS ── */
  async function sendSMS(){
    var lead=_queue[_currentIdx]; if(!lead) return;
    var ta=document.getElementById('smsBox'); var msg=((ta&&ta.value)||'').trim();
    if(!msg){ showToast('Type a message'); return; }
    if(!confirmHours(lead)) return; // calling-hours guardrail
    if(!/\bstop\b/i.test(msg)) msg=msg+' Reply STOP to opt out.';
    try{
      var r=await _authClient().functions.invoke('sms-service',{body:{trigger:'custom', to_phone:lead.phone, params:{message:msg}, contact_id:lead.contact_id}});
      if(r&&r.error) throw new Error((r.error&&r.error.message)||'send failed');
      showToast('SMS sent'); loadCounts(); advance(true);
    }catch(e){ showToast((e&&e.message)||'SMS failed'); }
  }
  async function draftSMS(){
    var lead=_queue[_currentIdx]; if(!lead) return;
    var ta=document.getElementById('smsBox'); if(!ta) return;
    var intent=(ta.value||'').trim()||'friendly intro';
    var prev=ta.value; ta.value='Drafting…'; ta.disabled=true;
    try{
      var r=await _authClient().functions.invoke('sms-service',{body:{trigger:'ai_compose', prompt:intent, contact_name:lead.name, tone:'friendly'}});
      if(r&&r.error) throw new Error((r.error&&r.error.message)||'draft failed');
      var d=r&&r.data?r.data:null;
      ta.value=(d&&(d.message||d.text))||prev;
    }catch(e){ ta.value=prev; showToast((e&&e.message)||'AI draft failed'); }
    ta.disabled=false; ta.focus();
  }

  /* ── local presence: caller-ID manager ── */
  async function loadTwNumbers(){
    try{ var r=await _authClient().rpc('twilio_numbers_list'); _twNumbers=(r&&!r.error&&r.data)?r.data:[]; }catch(e){ _twNumbers=[]; }
  }
  async function openCallerIds(){
    await loadTwNumbers();
    renderCallerIds();
    var m=document.getElementById('callerIdModal'); if(m) m.style.display='flex';
  }
  function closeCallerIds(){ var m=document.getElementById('callerIdModal'); if(m) m.style.display='none'; }
  function changeAgentPhone(){ if(promptAgentPhone()!=null){ renderCallerIds(); if(_currentIdx>=0) renderFocus(); } }
  function renderCallerIds(){
    var box=document.getElementById('callerIdBody'); if(!box) return;
    var ap=getAgentPhone();
    var agentRow='<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:8px 0 12px;border-bottom:1px solid var(--border2);margin-bottom:8px;">'
      +'<span style="font-size:13px;">Your call-back phone: <strong>'+(ap?esc(fmtPhone(ap)):'<span class="muted">not set</span>')+'</strong></span>'
      +'<button class="q-copy" onclick="changeAgentPhone()">Change</button></div>';
    var list=_twNumbers.length
      ? _twNumbers.map(function(t,i){ return '<div style="display:flex;align-items:center;justify-content:space-between;gap:8px;padding:7px 0;border-top:1px solid var(--border2);">'
          +'<span style="font-size:13px;"><strong>'+esc(t.phone_number||'')+'</strong> <span class="muted">'+esc(t.label||'')+(t.area_code?(' · '+esc(String(t.area_code))):'')+(t.active===false?' · inactive':'')+'</span></span>'
          +'<button class="q-copy" onclick="deleteTwNumber('+i+')">Delete</button></div>'; }).join('')
      : '<div class="muted" style="font-size:12px;padding:8px 0;">No caller IDs yet.</div>';
    box.innerHTML=agentRow+list
      +'<div style="display:flex;flex-wrap:wrap;gap:6px;align-items:center;margin-top:12px;">'
        +'<input id="twNum" class="fld" placeholder="+1714…" style="max-width:170px;">'
        +'<input id="twLabel" class="fld" placeholder="Label (e.g. OC)" style="max-width:160px;">'
        +'<button class="btn-gold" onclick="addTwNumber()">Add</button>'
      +'</div>'
      +'<div class="muted" style="font-size:11px;margin-top:12px;line-height:1.5;">Numbers must be ones you own in Twilio. Calls auto-use the number matching the lead’s area code.</div>';
  }
  async function addTwNumber(){
    var num=((document.getElementById('twNum')||{}).value||'').trim();
    var label=((document.getElementById('twLabel')||{}).value||'').trim();
    if(!num){ showToast('Enter a number'); return; }
    try{ var r=await _authClient().rpc('twilio_number_add',{p_number:num,p_label:label||null}); if(r&&r.error) throw new Error(r.error.message); showToast('Number added'); await loadTwNumbers(); renderCallerIds(); }
    catch(e){ showToast((e&&e.message)||'Could not add number'); }
  }
  async function deleteTwNumber(i){
    var t=_twNumbers[i]; if(!t) return; if(!confirm('Delete this caller ID?')) return;
    try{ var r=await _authClient().rpc('twilio_number_delete',{p_id:t.id}); if(r&&r.error) throw new Error(r.error.message); showToast('Deleted'); await loadTwNumbers(); renderCallerIds(); }
    catch(e){ showToast((e&&e.message)||'Could not delete'); }
  }

  /* ── auto-dial ── */
  function callActive(){ return !!_call; } // a Twilio call is live (ringing or connected)
  function clearAutoTimer(){ if(_autoTimer){ clearInterval(_autoTimer); _autoTimer=null; } _autoRemaining=0; }
  function hideAutoPanel(){ var b=document.getElementById('autoPanel'); if(b) b.innerHTML=''; }
  function toggleAutoDial(){
    if(!_voiceReady){ showToast('Auto-dial needs in-browser calling'); return; }
    _autoDial=!_autoDial;
    try{ localStorage.setItem('pd_autodial', _autoDial?'1':'0'); }catch(e){}
    if(_autoDial){
      if(!_autoHelpShown){ _autoHelpShown=true; _autoHelpVisible=true; }
      renderFocus();
      autoDialTick();
    } else {
      clearAutoTimer(); _autoHelpVisible=false; renderFocus();
    }
  }
  function setAutoSeconds(s){
    if([3,5,8].indexOf(s)<0) s=3;
    _autoSeconds=s;
    try{ localStorage.setItem('pd_autosecs', String(s)); }catch(e){}
    renderFocus();
    if(_autoTimer) startAutoCountdown(); // restart running countdown at the new length
  }
  // Like Skip (no log, no removal): move the cursor to the next lead, paging as needed.
  async function autoMoveNext(){
    _currentIdx++;
    if(!_exhausted && _currentIdx >= _queue.length-5){ await loadMore(); }
    if(_currentIdx >= _queue.length){
      if(_exhausted){ renderList(); return false; }
      _currentIdx=_queue.length-1;
      if(_currentIdx<0){ renderList(); return false; }
    }
    renderList(); renderFocus(); scrollCurrentIntoView();
    return true;
  }
  function pauseAutoNoCallable(){
    clearAutoTimer();
    var b=document.getElementById('autoPanel'); if(!b) return;
    b.innerHTML='<div class="pd-auto pd-auto-paused">⏸ No leads are callable right now — auto-dial paused.'+(_autoSkipped>0?(' <span class="muted">Skipped '+_autoSkipped+' after-hours.</span>'):'')+'</div>';
  }
  async function autoDialTick(){
    if(!_autoDial || !_voiceReady){ clearAutoTimer(); return; }
    clearAutoTimer();
    if(callActive()) return;                 // wait until the active call ends (user dispositions to advance)
    var lead=_queue[_currentIdx];
    if(!lead) return;                        // empty/exhausted handled by showCleared (which disarms the timer)
    // skip after-hours leads until we find a callable one (or run out)
    var guard=0, max=Math.max(1,_queue.length)+2;
    while(lead && lead.callable_now===false){
      _autoSkipped++;
      var moved=await autoMoveNext();
      if(!moved){ pauseAutoNoCallable(); return; }   // reached the end with no callable lead
      if(++guard>max){ pauseAutoNoCallable(); return; }
      lead=_queue[_currentIdx];
    }
    lead=_queue[_currentIdx];
    if(!lead){ return; }
    if(lead.callable_now===false){ pauseAutoNoCallable(); return; }
    startAutoCountdown();
  }
  function startAutoCountdown(){
    clearAutoTimer();
    _autoHelpVisible=false; var h=document.getElementById('autoHelp'); if(h) h.innerHTML=''; // dialing begins → drop the helper line
    _autoRemaining=Math.max(1, Number(_autoSeconds)||3);
    renderAutoPanel();
    _autoTimer=setInterval(function(){
      _autoRemaining--;
      if(_autoRemaining<=0){ clearAutoTimer(); autoFire(); }
      else { renderAutoPanel(); }
    }, 1000);
  }
  function renderAutoPanel(){
    var box=document.getElementById('autoPanel'); if(!box) return;
    var lead=_queue[_currentIdx]; if(!lead){ box.innerHTML=''; return; }
    var pct=Math.max(0, Math.min(100, ((_autoSeconds-_autoRemaining)/_autoSeconds)*100));
    var skip=_autoSkipped>0?('<div class="muted" style="font-size:11px;margin-top:6px;">Skipped '+_autoSkipped+' after-hours</div>'):'';
    box.innerHTML='<div class="pd-auto">'
      +'<div style="font-size:13px;font-weight:700;">⚡ Auto-dialing '+esc(lead.name||'this lead')+' in '+_autoRemaining+'s</div>'
      +'<div class="pd-auto-bar"><div class="pd-auto-bar-fill" style="width:'+pct.toFixed(0)+'%;"></div></div>'
      +'<div style="display:flex;gap:8px;margin-top:9px;"><button class="btn-gold" onclick="autoCallNow()">Call now</button><button class="btn-ghost" onclick="autoCancel()">Cancel</button></div>'
      +skip
    +'</div>';
  }
  function autoFire(){ hideAutoPanel(); if(callActive()) return; startCall(); }   // same in-browser call as the manual button
  function autoCallNow(){ clearAutoTimer(); autoFire(); }
  function autoCancel(){ clearAutoTimer(); hideAutoPanel(); } // stay on this lead; auto-dial stays armed for the next advance

  /* ── keyboard shortcuts ── */
  document.addEventListener('keydown', function(e){
    var tag=(document.activeElement&&document.activeElement.tagName)||'';
    var typing=(tag==='TEXTAREA'||tag==='INPUT'||tag==='SELECT');
    if(e.key==='Escape'){ if(_autoTimer){ e.preventDefault(); autoCancel(); return; } if(document.activeElement&&document.activeElement.blur) document.activeElement.blur(); return; }
    if(typing) return;
    if(_currentIdx<0) return;
    if(e.key==='n'||e.key==='N'||e.key==='Enter'){ e.preventDefault(); skipNext(); }
    else if(e.key>='1'&&e.key<='5'){ e.preventDefault(); var d=DISPOS[parseInt(e.key,10)-1]; if(d) dispo(d); }
    else if(e.key==='c'||e.key==='C'){ e.preventDefault(); var ta=document.getElementById('focusNote'); if(ta) ta.focus(); }
  });
  </script>
</body>
