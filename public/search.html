<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-03P16TMWM8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-03P16TMWM8');
  </script>
  <title>Search Homes | Rates & Realty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/components/styles.css">
  <link rel="stylesheet" href="/public/css/responsive.css">
  <link rel="stylesheet" href="/public/css/responsive-global.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="section">
    <div class="container narrow-page">
      <div class="section-visual">
        <div>
          <p class="kicker">Real Estate Search</p>
          <h1>Search curated listings before you start the loan conversation.</h1>
          <p class="section-copy">This page uses mock listing cards for now. Replace the dataset later with IDX or MLS feed data when you are ready.</p>
        </div>
        <div class="hero-media">
          <img src="/public/images/search-estate.svg" alt="Luxury real estate search illustration">
        </div>
      </div>
      <section class="panel">
        <form id="property-search-form" class="stack-form" novalidate>
          <div class="search-filter-grid">
            <label class="field"><span>City</span><input name="city" type="text" placeholder="Los Angeles"></label>
            <label class="field"><span>Min Price</span><input name="minPrice" type="number" placeholder="500000"></label>
            <label class="field"><span>Max Price</span><input name="maxPrice" type="number" placeholder="1500000"></label>
            <label class="field"><span>Beds</span><select name="beds"><option value="">Any</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option><option value="4">4+</option></select></label>
            <label class="field"><span>Baths</span><select name="baths"><option value="">Any</option><option value="1">1+</option><option value="2">2+</option><option value="3">3+</option></select></label>
            <label class="field"><span>Property Type</span><select name="propertyType"><option value="">Any</option><option value="Single Family">Single Family</option><option value="Condo">Condo</option><option value="Townhome">Townhome</option><option value="Multi Family">Multi Family</option></select></label>
          </div>
          <label class="field"><span>Keyword</span><input name="keyword" type="text" placeholder="view, turnkey, pool, investor"></label>
          <div class="action-row">
            <button class="btn btn-primary" type="submit">Search Listings</button>
            <button id="reset-search-button" class="btn btn-secondary" type="button">Reset</button>
          </div>
        </form>
      </section>
      <section>
        <div class="crm-section-title">
          <div>
            <p class="kicker">Results</p>
            <h2>Featured mock inventory</h2>
          </div>
        </div>
        <div id="listing-results" class="listings-grid"></div>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script type="module" src="/components/layout.js"></script>
  <script type="module" src="/components/search-page.js"></script>
  <script src="js/chat-widget.js"></script>
</body>
</html>
