<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showing Requests | Rates &amp; Realty CRM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#eee;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex}
a{text-decoration:none;color:inherit}
#sidebar{width:220px;flex-shrink:0;background:#0d0d0d;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.sb-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#C9A84C,#8A6A1E);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#000;flex-shrink:0}
.sb-logo-text{font-size:.88rem;font-weight:700;color:#C9A84C;line-height:1.2}
.sb-logo-sub{font-size:.6rem;color:#444;text-transform:uppercase;letter-spacing:.1em}
.sb-section{padding:12px 10px 4px;font-size:.62rem;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.1em}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;font-size:.82rem;color:#666;cursor:pointer;transition:all .15s;margin:1px 4px}
.sb-link:hover{background:#161616;color:#aaa}
.sb-link.active{background:rgba(201,168,76,.1);color:#C9A84C}
.sb-link i{width:16px;text-align:center;font-size:.8rem}
.sb-bottom{margin-top:auto;padding:12px;border-top:1px solid #1a1a1a}
.sb-bottom a{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:.78rem;color:#555;border-radius:7px}
.sb-bottom a:hover{color:#aaa;background:#111}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}
.topbar{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:700;color:#eee}
.topbar-sub{font-size:.73rem;color:#444;margin-left:12px}
.topbar-right{display:flex;align-items:center;gap:8px}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px 24px 0}
.stat-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.stat-val{font-size:1.4rem;font-weight:800;color:#eee;line-height:1}
.stat-lbl{font-size:.67rem;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 24px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#444;font-size:.8rem}
.search-wrap input{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:8px 12px 8px 34px;color:#eee;font-size:.82rem;outline:none}
.search-wrap input:focus{border-color:#C9A84C}
.toolbar select{background:#111;border:1px solid #1e1e1e;color:#888;border-radius:8px;padding:8px 12px;font-size:.8rem;outline:none;cursor:pointer}
.btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:#C9A84C;color:#000}.btn-gold:hover{background:#e8c96a}
.btn-outline{background:#111;border:1px solid #2a2a2a;color:#888}.btn-outline:hover{border-color:#C9A84C;color:#C9A84C}
.count-badge{background:rgba(201,168,76,.1);color:#C9A84C;border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700;margin-left:auto}
.table-wrap{padding:0 24px 24px;flex:1}
.table-container{background:#111;border:1px solid #1a1a1a;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#0d0d0d;padding:10px 14px;text-align:left;font-size:.68rem;color:#444;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1a1a1a;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#888}
td{padding:11px 14px;border-bottom:1px solid #111;font-size:.8rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0f0f0f}
.td-name{font-weight:600;color:#ddd}
.td-sub{font-size:.7rem;color:#555;margin-top:2px}
.td-id{font-family:monospace;font-size:.72rem;color:#C9A84C;background:rgba(201,168,76,.08);padding:2px 7px;border-radius:6px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-pending{background:rgba(201,168,76,.12);color:#C9A84C}
.badge-confirmed{background:rgba(34,197,94,.12);color:#22c55e}
.badge-completed{background:rgba(100,100,100,.1);color:#888}
.badge-cancelled{background:rgba(239,68,68,.1);color:#ef4444}
.status-select{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;border-radius:6px;padding:4px 7px;font-size:.7rem;outline:none;cursor:pointer}
.expand-row td{background:#0d0d0d;padding:0}
.expand-inner{padding:14px 20px 14px 52px;border-top:1px solid #1a1a1a}
.home-cards{display:flex;gap:8px;flex-wrap:wrap}
.home-card{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:8px 10px;max-width:280px}
.home-card img{width:50px;height:40px;object-fit:cover;border-radius:5px;flex-shrink:0}
.home-card-price{font-size:.82rem;font-weight:700;color:#C9A84C}
.home-card-addr{font-size:.72rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.home-card-specs{font-size:.67rem;color:#555}
.empty{text-align:center;padding:60px 20px;color:#333}
.empty i{font-size:2.5rem;display:block;margin-bottom:14px;color:#1e1e1e}
@media(max-width:900px){#sidebar{width:60px}.sb-logo-text,.sb-logo-sub,.sb-link span,.sb-section{display:none}.sb-link{justify-content:center;padding:10px 0}.sb-link i{width:auto}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}.table-wrap{padding:0 12px 16px}.topbar{padding:0 14px}}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">R&R</div><div><div class="sb-logo-text">Rates &amp; Realty</div><div class="sb-logo-sub">Admin CRM</div></div></div>
  <div class="sb-section">CRM</div>
  <a class="sb-link" href="/admin/people.html"><i class="fas fa-users"></i><span>People</span></a>
  <a class="sb-link" href="/admin/pipeline.html"><i class="fas fa-chart-bar"></i><span>Pipeline</span></a>
  <a class="sb-link" href="/admin/people.html"><i class="fas fa-address-book"></i><span>People</span></a>
  <a class="sb-link" href="/admin/reports.html"><i class="fas fa-chart-line"></i><span>Reports</span></a>
  <div class="sb-section">Real Estate</div>
  <a class="sb-link active" href="/admin/showings.html"><i class="fas fa-calendar-check"></i><span>Showings</span></a>
  <a class="sb-link" href="/public/search-homes.html" target="_blank"><i class="fas fa-search"></i><span>Search Homes</span></a>
  <div class="sb-bottom">
    <a href="/" target="_blank"><i class="fas fa-arrow-left"></i><span>Back to Site</span></a>
  </div>
</nav>
<div id="main">
  <div class="topbar">
    <div style="display:flex;align-items:center"><h1><i class="fas fa-calendar-check" style="color:#C9A84C;margin-right:8px"></i>Showing Requests</h1><span class="topbar-sub">All scheduled showing requests</span></div>
    <div class="topbar-right">
      <button class="btn btn-outline" onclick="loadTours()"><i class="fas fa-sync-alt"></i> Refresh</button>
      <button class="btn btn-gold" onclick="openBuilderPlaceholder()"><i class="fas fa-plus"></i> New Tour</button>
      <a href="/public/search-homes.html" target="_blank" class="btn btn-outline"><i class="fas fa-external-link-alt"></i> Search</a>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon" style="background:rgba(201,168,76,.1)"><i class="fas fa-list" style="color:#C9A84C"></i></div><div><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(201,168,76,.15)"><i class="fas fa-bell" style="color:#C9A84C"></i></div><div><div class="stat-val" id="statPending">—</div><div class="stat-lbl">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(34,197,94,.1)"><i class="fas fa-check-circle" style="color:#22c55e"></i></div><div><div class="stat-val" id="statConfirmed">—</div><div class="stat-lbl">Confirmed</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(100,100,100,.1)"><i class="fas fa-flag-checkered" style="color:#888"></i></div><div><div class="stat-val" id="statCompleted">—</div><div class="stat-lbl">Completed</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(239,68,68,.1)"><i class="fas fa-times-circle" style="color:#ef4444"></i></div><div><div class="stat-val" id="statCancelled">—</div><div class="stat-lbl">Cancelled</div></div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search name, email, property..." oninput="renderTable()"></div>
    <select id="statusFilter" onchange="renderTable()"><option value="">All Statuses</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select>
    <select id="dateFilter" onchange="renderTable()"><option value="">All Dates</option><option value="today">Today</option><option value="week">This Week</option><option value="month">This Month</option></select>
    <span class="count-badge" id="countBadge">Loading...</span>
  </div>
  <div class="table-wrap"><div class="table-container">
    <table><thead><tr>
      <th onclick="sortBy('name')">Name</th><th>Contact</th><th>ID</th>
      <th onclick="sortBy('property_address')">Property</th><th onclick="sortBy('preferred_date')">Date</th>
      <th>Time</th><th onclick="sortBy('status')">Status</th><th>Homes</th><th>Actions</th>
    </tr></thead>
    <tbody id="showingsBody"><tr><td colspan="9" class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></td></tr></tbody>
    </table>
  </div></div>
</div>

<script>
// Read-only swap (PR 1) — data source moved from /rest/v1/showings to
// the tours-admin edge function. Drag-reorder, per-stop modal, send-email
// and exact-time controls were removed; they ship with the tour builder
// modal in PR 2. The placeholder modal explains this and surfaces the
// public itinerary link + clipboard copy as immediate escape hatches.
var SB = 'https://ljywhvbmsibwnssxpesh.supabase.co';
var SK = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeXdodmJtc2lid25zc3hwZXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQwNjE2NTUsImV4cCI6MjA4OTYzNzY1NX0.QaewUhTWdATj35VewvmfQcHB_b3I9FhhwXSRuqNBKvw';
var TOUR_BASE = window.location.origin + '/tour/';
var allTours = [];
var sortKey = 'scheduled_start';
var sortDir = -1;

async function toursAdmin(action, payload) {
  try {
    var r = await fetch(SB + '/functions/v1/tours-admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SK },
      body: JSON.stringify(Object.assign({ action: action }, payload || {})),
    });
    return await r.json();
  } catch (e) { return { error: e.message }; }
}

async function loadTours() {
  document.getElementById('showingsBody').innerHTML = '<tr><td colspan="9" class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading tours...</p></td></tr>';
  var d = await toursAdmin('list_all_tours', { limit: 200 });
  allTours = (d && d.tours) || [];
  if (d && d.error) showToast('Load failed: ' + d.error, 'error');
  updateStats();
  renderTable();
}
// Back-compat alias for any markup still calling loadShowings()
function loadShowings() { return loadTours(); }

function statusBucket(s) {
  if (s === 'draft' || s === 'scheduled' || s === 'sent') return 'pending';
  if (s === 'confirmed' || s === 'in_progress') return 'confirmed';
  if (s === 'completed') return 'completed';
  if (s === 'canceled' || s === 'cancelled' || s === 'no_show') return 'cancelled';
  return 'pending';
}

function updateStats() {
  document.getElementById('statTotal').textContent = allTours.length;
  document.getElementById('statPending').textContent = allTours.filter(function(t){return statusBucket(t.status) === 'pending';}).length;
  document.getElementById('statConfirmed').textContent = allTours.filter(function(t){return statusBucket(t.status) === 'confirmed';}).length;
  document.getElementById('statCompleted').textContent = allTours.filter(function(t){return statusBucket(t.status) === 'completed';}).length;
  document.getElementById('statCancelled').textContent = allTours.filter(function(t){return statusBucket(t.status) === 'cancelled';}).length;
}

function fmtDate(iso) { if (!iso) return '—'; return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }); }
function fmtTime(iso) { if (!iso) return '—'; return new Date(iso).toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' }); }

function esc(s) {
  if (s == null) return '';
  return String(s).replace(/[&<>"']/g, function(c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; });
}

function renderTable() {
  var q = (document.getElementById('searchInput').value || '').toLowerCase();
  var sf = document.getElementById('statusFilter').value;
  var df = document.getElementById('dateFilter').value;
  var today = new Date(); today.setHours(0, 0, 0, 0);

  var list = allTours.filter(function(t) {
    var name = ((t.contact_first_name || '') + ' ' + (t.contact_last_name || '')).toLowerCase();
    var email = (t.contact_email || '').toLowerCase();
    var title = (t.title || '').toLowerCase();
    var phone = (t.contact_phone || '').toLowerCase();
    if (q && name.indexOf(q) < 0 && email.indexOf(q) < 0 && title.indexOf(q) < 0 && phone.indexOf(q) < 0) return false;
    if (sf && statusBucket(t.status) !== sf) return false;
    if (df && t.scheduled_start) {
      var d = new Date(t.scheduled_start);
      if (df === 'today' && d.toDateString() !== today.toDateString()) return false;
      if (df === 'week') { var we = new Date(today); we.setDate(today.getDate() + 7); if (d < today || d > we) return false; }
      if (df === 'month' && (d.getMonth() !== today.getMonth() || d.getFullYear() !== today.getFullYear())) return false;
    }
    return true;
  });

  list.sort(function(a, b) {
    var av = a[sortKey] || ''; var bv = b[sortKey] || '';
    return av < bv ? sortDir : av > bv ? -sortDir : 0;
  });

  document.getElementById('countBadge').textContent = list.length + ' tour' + (list.length !== 1 ? 's' : '');

  if (!list.length) {
    document.getElementById('showingsBody').innerHTML = '<tr><td colspan="9" class="empty"><i class="fas fa-calendar-times"></i><p>No tours found.</p></td></tr>';
    return;
  }

  var sm = { pending: 'badge-pending', confirmed: 'badge-confirmed', completed: 'badge-completed', cancelled: 'badge-cancelled' };
  document.getElementById('showingsBody').innerHTML = list.map(function(t) {
    var name = ((t.contact_first_name || '') + ' ' + (t.contact_last_name || '')).trim() || 'Unknown';
    var email = t.contact_email || '—';
    var phone = t.contact_phone || '';
    var rrid = 'RR-' + (t.batch_id || '').slice(0, 6).toUpperCase();
    var propLabel = t.title || (t.stop_count + ' home' + (t.stop_count === 1 ? '' : 's'));
    var bucket = statusBucket(t.status);
    var bid = t.batch_id;
    var token = t.share_token || '';
    var publicUrl = token ? (TOUR_BASE + token) : '';
    return '<tr data-batch-id="' + esc(bid) + '" data-token="' + esc(token) + '" style="cursor:pointer">'
      + '<td><div class="td-name">' + esc(name) + '</div><div class="td-sub">' + esc(phone) + '</div></td>'
      + '<td><div style="font-size:.78rem;color:#888">' + esc(email) + '</div></td>'
      + '<td><span class="td-id">' + rrid + '</span></td>'
      + '<td style="max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#aaa">' + esc(propLabel) + '</td>'
      + '<td style="white-space:nowrap">' + fmtDate(t.scheduled_start) + '</td>'
      + '<td style="font-size:.78rem">' + fmtTime(t.scheduled_start) + '</td>'
      + '<td><span class="badge ' + (sm[bucket] || 'badge-pending') + '">' + esc(t.status || 'draft') + '</span>'
      + (t.view_count ? '<div class="td-sub" style="margin-top:3px"><i class="fas fa-eye" style="font-size:.62rem"></i> ' + t.view_count + '</div>' : '')
      + '</td>'
      + '<td>' + t.stop_count + (t.confirmed_stops != null && t.confirmed_stops > 0 ? '<span style="color:#22c55e;font-size:.7rem;margin-left:4px">(' + t.confirmed_stops + ' ✓)</span>' : '') + '</td>'
      + '<td><div style="display:flex;gap:4px">'
      + (publicUrl ? '<a href="' + esc(publicUrl) + '" target="_blank" data-stop title="Open public itinerary" style="width:32px;height:32px;background:rgba(95,168,224,.12);border:1px solid rgba(95,168,224,.3);color:#5fa8e0;border-radius:7px;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none">🔗</a>' : '')
      + '<button data-act="confirm" data-bid="' + esc(bid) + '" data-stop title="Mark confirmed" style="width:32px;height:32px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:7px;font-size:.85rem;cursor:pointer">✓</button>'
      + '<button data-act="pending" data-bid="' + esc(bid) + '" data-stop title="Mark scheduled" style="width:32px;height:32px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#C9A84C;border-radius:7px;font-size:.85rem;cursor:pointer">⏳</button>'
      + '<button data-act="cancel" data-bid="' + esc(bid) + '" data-token="' + esc(token) + '" data-stop title="Cancel tour" style="width:32px;height:32px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:7px;font-size:.85rem;cursor:pointer">✕</button>'
      + '</div></td>'
      + '</tr>';
  }).join('');

  // Wire row clicks → placeholder builder. Action cells stop propagation
  // via data-stop so they don't trigger the row click.
  document.querySelectorAll('#showingsBody tr[data-batch-id]').forEach(function(row) {
    row.addEventListener('click', function(e) {
      if (e.target.closest('[data-stop]')) return;
      openBuilderPlaceholder(row.getAttribute('data-batch-id'), row.getAttribute('data-token'));
    });
  });
  document.querySelectorAll('#showingsBody [data-act]').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.stopPropagation();
      handleAction(btn.getAttribute('data-act'), btn.getAttribute('data-bid'), btn.getAttribute('data-token'));
    });
  });
}

async function handleAction(action, bid, token) {
  if (!bid && !token) return;
  if (action === 'confirm') {
    var r = await toursAdmin('update_tour', { batch_id: bid, status: 'confirmed' });
    if (r.error) showToast('Failed: ' + r.error, 'error'); else { showToast('Marked confirmed'); loadTours(); }
  } else if (action === 'pending') {
    var r = await toursAdmin('update_tour', { batch_id: bid, status: 'scheduled' });
    if (r.error) showToast('Failed: ' + r.error, 'error'); else { showToast('Marked scheduled'); loadTours(); }
  } else if (action === 'cancel') {
    if (!confirm('Cancel this tour? The lead will not be re-notified.')) return;
    var r = await toursAdmin('cancel', token ? { share_token: token } : { batch_id: bid });
    if (r.error) showToast('Failed: ' + r.error, 'error'); else { showToast('Tour canceled'); loadTours(); }
  }
}

function openBuilderPlaceholder(bid, token) {
  var existing = document.getElementById('builderPlaceholder');
  if (existing) existing.remove();
  var tour = bid ? allTours.find(function(t) { return t.batch_id === bid; }) : null;
  var publicUrl = token ? (TOUR_BASE + token) : '';
  var modal = document.createElement('div');
  modal.id = 'builderPlaceholder';
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px';
  modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
  var headerTitle = tour ? (tour.title || ('Tour for ' + ((tour.contact_first_name || '') + ' ' + (tour.contact_last_name || '')).trim())) : 'New Tour';
  var detailsHtml = '';
  if (tour) {
    detailsHtml = '<div style="font-size:.78rem;color:#aaa;line-height:1.7;margin-bottom:18px">'
      + '<div><span style="color:#555">Status:</span> ' + esc(tour.status || 'draft') + '</div>'
      + '<div><span style="color:#555">Stops:</span> ' + tour.stop_count + (tour.confirmed_stops ? ' (' + tour.confirmed_stops + ' confirmed)' : '') + '</div>'
      + (tour.scheduled_start ? '<div><span style="color:#555">Scheduled:</span> ' + fmtDate(tour.scheduled_start) + ' ' + fmtTime(tour.scheduled_start) + '</div>' : '')
      + (tour.view_count ? '<div><span style="color:#555">Views:</span> ' + tour.view_count + '</div>' : '')
      + '<div><span style="color:#555">Lead:</span> ' + esc(((tour.contact_first_name || '') + ' ' + (tour.contact_last_name || '')).trim()) + ' &middot; ' + esc(tour.contact_email || '—') + '</div>'
      + '</div>';
  }
  modal.innerHTML = '<div style="background:#111;border:1px solid #2a2a2a;border-radius:14px;max-width:520px;width:100%;padding:28px">'
    + '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">'
    + '<div>'
    + '<div style="font-size:.7rem;color:#C9A84C;text-transform:uppercase;letter-spacing:.1em;font-weight:700;margin-bottom:6px">Tour Builder</div>'
    + '<h2 style="margin:0;font-size:1.2rem;color:#eee;font-weight:700">' + esc(headerTitle) + '</h2>'
    + '</div>'
    + '<button onclick="document.getElementById(\'builderPlaceholder\').remove()" style="background:none;border:none;color:#888;font-size:1.2rem;cursor:pointer">✕</button>'
    + '</div>'
    + '<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:10px;padding:16px;margin-bottom:18px">'
    + '<div style="display:flex;align-items:center;gap:10px;margin-bottom:8px"><i class="fas fa-tools" style="color:#C9A84C"></i><strong style="font-size:.85rem;color:#ddd">Builder coming next session</strong></div>'
    + '<div style="font-size:.8rem;color:#888;line-height:1.5">The full tour builder (stops editor, drag-reorder, MLS lookup, send dialog) ships in the next PR. Until then, use the actions below.</div>'
    + '</div>'
    + detailsHtml
    + '<div style="display:flex;gap:8px;flex-wrap:wrap">'
    + (publicUrl ? '<a href="' + esc(publicUrl) + '" target="_blank" class="btn btn-gold" style="text-decoration:none;flex:1;justify-content:center">🔗 View public itinerary</a>' : '')
    + (publicUrl ? '<button onclick="copyToClipboard(\'' + esc(publicUrl) + '\')" class="btn btn-outline" style="flex:1;justify-content:center">📋 Copy share link</button>' : '')
    + '</div>'
    + '</div>';
  document.body.appendChild(modal);
}

function copyToClipboard(text) {
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(text).then(function() { showToast('Link copied'); }, function() { showToast('Copy failed', 'error'); });
  } else {
    showToast('Copy not supported', 'error');
  }
}

function showToast(msg, kind) {
  var old = document.getElementById('showToast');
  if (old) old.remove();
  var t = document.createElement('div');
  t.id = 'showToast';
  var color = kind === 'error' ? '#ef4444' : '#22c55e';
  var bg = kind === 'error' ? '#1a0d0d' : '#0a1a0a';
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:10000;background:' + bg + ';border:1px solid ' + color + '66;color:' + color + ';border-radius:10px;padding:12px 18px;font-size:.82rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:380px';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 4000);
}

function sortBy(key) {
  // Map legacy column keys onto the new tour fields.
  var keyMap = { 'name': 'contact_first_name', 'property_address': 'title', 'preferred_date': 'scheduled_start', 'status': 'status' };
  var col = keyMap[key] || key;
  sortDir = (sortKey === col) ? -sortDir : -1;
  sortKey = col;
  renderTable();
}

loadTours();
setInterval(loadTours, 60000);
</script>
