<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contacts | Rates &amp; Realty CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/responsive.css">
  <script src="/admin/js/auth-guard.js"></script>
  <script>if(localStorage.getItem('rr-theme')==='light')document.documentElement.classList.add('light-preload');</script>
  <style>
    html.light-preload body, html.light-preload { background: #f5f5f5 !important; }
  </style>
  <style>
    :root {
      --bg:       #050505;
      --surface:  rgba(13,13,13,0.98);
      --surface2: rgba(18,18,18,0.98);
      --border:   rgba(255,255,255,0.08);
      --border2:  rgba(255,255,255,0.05);
      --text:     #f6f1e8;
      --text2:    #d4cbb8;
      --muted:    #b6ab93;
      --gold:     #C9A84C;
      --gold-bg:  rgba(201,168,76,0.08);
      --gold-bdr: rgba(201,168,76,0.25);
      --input-bg: rgba(20,20,20,0.98);
      --sidebar-w: 220px;
      --topbar-h:  60px;
    }
    body.light {
      --bg:       #f4f2ee;
      --surface:  #ffffff;
      --surface2: #f8f6f2;
      --border:   rgba(0,0,0,0.09);
      --border2:  rgba(0,0,0,0.05);
      --text:     #1a1410;
      --text2:    #3d3427;
      --muted:    #7a6f5c;
      --input-bg: #ffffff;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      transition: background 0.3s ease, color 0.3s ease;
    }
    a { color: inherit; text-decoration: none; }
    button, input, select, textarea { font-family: 'Manrope', sans-serif; font-size: 0.85rem; }

    /* ── SIDEBAR ── */
    .ct-sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: rgba(8,8,8,0.99);
      border-right: 1px solid rgba(255,255,255,0.07);
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      transition: background .3s ease, border-color .3s ease;
    }
    body.light .ct-sidebar { background: #ffffff; border-right-color: #e0e0e0; }
    .ct-sidebar-brand {
      display: flex; align-items: center; gap: 10px;
      padding: 20px 20px 14px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }
    body.light .ct-sidebar-brand { border-bottom-color: #e0e0e0; }
    .ct-sidebar-mark {
      width: 36px; height: 36px; border-radius: 10px;
      background: linear-gradient(135deg, #f2cf85, #C9A84C);
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; font-size: 0.85rem; color: #111;
      flex-shrink: 0;
    }
    .ct-sidebar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem; font-weight: 600; color: var(--text);
    }
    .ct-sidebar-sub {
      font-size: 0.68rem; color: var(--muted);
    }
    .ct-sidebar-label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: .12em; text-transform: uppercase;
      color: rgba(182,171,147,0.5);
      padding: 18px 20px 8px;
    }
    body.light .ct-sidebar-label { color: #888; }
    .ct-nav-link {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 20px; border-radius: 0;
      font-size: 0.84rem; font-weight: 500;
      color: #b6ab93; text-decoration: none;
      transition: all .18s ease;
      border: none; background: none;
      cursor: pointer; width: 100%; text-align: left;
    }
    .ct-nav-link:hover { color: #f6f1e8; background: rgba(255,255,255,0.04); }
    .ct-nav-link.active {
      color: #C9A84C;
      background: rgba(201,168,76,0.08);
      border-left: 2px solid #C9A84C;
    }
    body.light .ct-nav-link { color: #555; }
    body.light .ct-nav-link:hover { color: #1a1a1a; background: rgba(0,0,0,0.05); }
    body.light .ct-nav-link.active { color: #a07828; background: rgba(192,152,60,0.1); border-left-color: #a07828; }
    .ct-sidebar-spacer { flex: 1; }
    .ct-sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid rgba(255,255,255,0.07);
    }
    body.light .ct-sidebar-footer { border-top-color: #e0e0e0; }

    /* ── MAIN ── */
    .ct-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
    }

    /* ── TOPBAR ── */
    .ct-topbar {
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 0 28px;
      position: sticky;
      top: 0;
      z-index: 100;
      flex-shrink: 0;
    }
    .ct-topbar-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem; font-weight: 600;
      color: var(--text); flex-shrink: 0;
    }
    .ct-topbar-count {
      padding: 3px 10px; border-radius: 999px;
      background: var(--gold-bg);
      border: 1px solid var(--gold-bdr);
      color: var(--gold);
      font-size: 0.75rem; font-weight: 700;
      flex-shrink: 0;
    }
    .ct-topbar-sep { flex: 1; }
    .ct-topbar-right { display: flex; align-items: center; gap: 10px; }
    .ct-search {
      width: 240px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px 8px 34px;
      color: var(--text);
      font-size: 0.84rem;
      outline: none;
      transition: border-color .18s;
    }
    .ct-search:focus { border-color: var(--gold-bdr); }
    .ct-search-wrap {
      position: relative; flex-shrink: 0;
    }
    .ct-search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--muted); pointer-events: none;
    }
    .ct-filter-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      color: var(--text2);
      font-size: 0.82rem;
      outline: none;
      appearance: none;
      cursor: pointer;
    }
    .ct-filter-select option { background: #1a1a1a; }
    .ct-btn-new {
      padding: 8px 18px;
      border-radius: 8px;
      background: linear-gradient(135deg, #f2cf85, #C9A84C);
      border: none;
      color: #111;
      font-size: 0.84rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity .18s;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .ct-btn-new:hover { opacity: 0.88; }
    .ct-theme-btn {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--muted); font-size: 1rem;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .18s; flex-shrink: 0;
    }
    .ct-theme-btn:hover { color: var(--gold); border-color: var(--gold-bdr); }

    /* ── CONTENT ── */
    .ct-content {
      flex: 1;
      padding: 28px;
      overflow-y: auto;
    }

    /* ── TABLE ── */
    .ct-table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
    }
    .ct-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.84rem;
    }
    .ct-table thead th {
      padding: 12px 16px;
      text-align: left;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
      transition: color .15s;
    }
    .ct-table thead th:hover { color: var(--text); }
    .ct-table thead th.sort-asc::after  { content: ' ↑'; color: var(--gold); }
    .ct-table thead th.sort-desc::after { content: ' ↓'; color: var(--gold); }
    .ct-table tbody tr {
      border-bottom: 1px solid var(--border2);
      transition: background .12s;
    }
    .ct-table tbody tr:last-child { border-bottom: none; }
    .ct-table tbody tr:hover { background: rgba(255,255,255,0.025); }
    .ct-table tbody td {
      padding: 13px 16px;
      color: var(--text2);
      vertical-align: middle;
    }
    .ct-name-link {
      font-weight: 700;
      color: var(--text);
      text-decoration: none;
      transition: color .15s;
      white-space: nowrap;
    }
    .ct-name-link:hover { color: var(--gold); }
    .ct-avatar {
      width: 32px; height: 32px; border-radius: 50%;
      background: linear-gradient(135deg, #f2cf85, #C9A84C);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 0.72rem; font-weight: 800; color: #111;
      flex-shrink: 0; margin-right: 10px;
      vertical-align: middle;
    }
    .ct-name-cell { display: flex; align-items: center; gap: 10px; }
    .ct-score-badge {
      padding: 3px 10px; border-radius: 999px;
      font-size: 0.72rem; font-weight: 700;
      white-space: nowrap;
    }
    .score-green  { background:rgba(74,222,128,.12);  border:1px solid rgba(74,222,128,.3);  color:#4ade80; }
    .score-yellow { background:rgba(251,191,36,.12);  border:1px solid rgba(251,191,36,.3);  color:#fbbf24; }
    .score-red    { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.3); color:#f87171; }
    .score-none   { background:var(--surface2); border:1px solid var(--border); color:var(--muted); }
    /* Lead score tier badges */
    .score-tier-badge-sm {
      display:inline-flex; align-items:center; gap:4px;
      padding:3px 9px; border-radius:999px;
      font-size:0.75rem; font-weight:700; white-space:nowrap;
    }
    .score-tier-hot  { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.3); color:#f87171; }
    .score-tier-warm { background:rgba(251,191,36,.12);  border:1px solid rgba(251,191,36,.3);  color:#fbbf24; }
    .score-tier-cold { background:rgba(96,165,250,.12);  border:1px solid rgba(96,165,250,.3);  color:#60a5fa; }
    .ct-status-pill {
      padding: 3px 10px; border-radius: 999px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .05em;
      white-space: nowrap;
    }
    .sp-new        { background:rgba(96,165,250,.12);  border:1px solid rgba(96,165,250,.3);  color:#60a5fa; }
    .sp-contacted  { background:rgba(251,191,36,.12);  border:1px solid rgba(251,191,36,.3);  color:#fbbf24; }
    .sp-prequalified { background:rgba(251,146,60,.12); border:1px solid rgba(251,146,60,.3); color:#fb923c; }
    .sp-preapproved  { background:rgba(52,211,153,.12); border:1px solid rgba(52,211,153,.3); color:#34d399; }
    .sp-in_process   { background:rgba(167,139,250,.12);border:1px solid rgba(167,139,250,.3);color:#a78bfa; }
    .sp-in_escrow    { background:rgba(232,121,249,.12);border:1px solid rgba(232,121,249,.3);color:#e879f9; }
    .sp-closed     { background:rgba(74,222,128,.12);  border:1px solid rgba(74,222,128,.3);  color:#4ade80; }
    .sp-lost       { background:rgba(248,113,113,.12); border:1px solid rgba(248,113,113,.3); color:#f87171; }
    .sp-none       { color:var(--muted); font-style:italic; }

    /* Pagination */
    .ct-pagination {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem; color: var(--muted);
      flex-wrap: wrap; gap: 10px;
    }
    .ct-pag-btns { display: flex; gap: 6px; }
    .ct-pag-btn {
      padding: 5px 12px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text2); font-size: 0.8rem; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .ct-pag-btn:hover:not(:disabled) { border-color: var(--gold-bdr); color: var(--gold); }
    .ct-pag-btn:disabled { opacity: .35; cursor: default; }
    .ct-pag-btn.active { background: var(--gold-bg); border-color: var(--gold-bdr); color: var(--gold); }

    /* ── VIEW BUTTON ── */
    .ct-view-btn {
      padding: 4px 14px; border-radius: 6px;
      background: var(--gold-bg); border: 1px solid var(--gold-bdr);
      color: var(--gold); font-size: 0.8rem; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .ct-view-btn:hover { background: var(--gold-bdr); color: #111; }

    /* ── EMPTY / LOADING ── */
    .ct-empty {
      text-align: center; padding: 64px 24px; color: var(--muted);
    }
    .ct-empty-icon { font-size: 2.4rem; opacity: .5; margin-bottom: 12px; }
    .ct-empty h4 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem; color: var(--text); margin-bottom: 6px;
    }
    .ct-empty p { font-size: 0.83rem; }

    /* ── MODAL ── */
    .ct-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 500;
      display: none;
      align-items: center; justify-content: center;
      padding: 24px;
    }
    .ct-modal-overlay.open { display: flex; }
    .ct-modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%; max-width: 640px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 24px 80px rgba(0,0,0,.7);
    }
    .ct-modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 22px 28px 16px;
      border-bottom: 1px solid var(--border);
    }
    .ct-modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem; font-weight: 600; color: var(--text);
    }
    .ct-modal-close {
      width: 32px; height: 32px; border-radius: 8px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 1.1rem;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
    }
    .ct-modal-close:hover { color: var(--text); border-color: var(--border); }
    .ct-modal-body { padding: 24px 28px; }
    .ct-form-grid {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 16px; margin-bottom: 20px;
    }
    .ct-form-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
    .ct-field { display: flex; flex-direction: column; gap: 5px; }
    .ct-field.span-2 { grid-column: span 2; }
    .ct-field.span-3 { grid-column: span 3; }
    .ct-label {
      font-size: 0.68rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--muted);
    }
    .ct-input, .ct-select {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 12px;
      color: var(--text);
      font-size: 0.85rem;
      outline: none;
      transition: border-color .18s;
      width: 100%;
    }
    .ct-select { appearance: none; cursor: pointer; }
    .ct-select option { background: #1a1a1a; }
    .ct-input:focus, .ct-select:focus { border-color: var(--gold-bdr); }
    .ct-input::placeholder { color: var(--muted); opacity: .6; }
    .ct-modal-footer {
      display: flex; gap: 10px; justify-content: flex-end;
      padding: 16px 28px 24px;
      border-top: 1px solid var(--border);
    }
    .ct-btn-save {
      padding: 9px 24px; border-radius: 8px;
      background: linear-gradient(135deg, #f2cf85, #C9A84C);
      border: none; color: #111;
      font-size: 0.84rem; font-weight: 800;
      cursor: pointer; transition: opacity .18s;
    }
    .ct-btn-save:hover { opacity: .88; }
    .ct-btn-cancel {
      padding: 9px 18px; border-radius: 8px;
      background: none; border: 1px solid var(--border);
      color: var(--muted); font-size: 0.84rem; font-weight: 600;
      cursor: pointer;
    }

    /* ── TOAST ── */
    .ct-toast {
      position: fixed; bottom: 24px; right: 24px;
      padding: 11px 18px; border-radius: 12px;
      background: rgba(20,20,20,0.98);
      border: 1px solid var(--gold-bdr);
      color: var(--text); font-size: 0.84rem; font-weight: 600;
      z-index: 999; box-shadow: 0 6px 28px rgba(0,0,0,.5);
      transform: translateY(16px); opacity: 0;
      transition: all .28s ease; pointer-events: none;
    }
    .ct-toast.show { transform: translateY(0); opacity: 1; }
    .ct-toast.error { border-color: rgba(248,113,113,.4); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(201,168,76,.2); border-radius: 999px; }

    @media (max-width: 900px) {
      .ct-sidebar { display: none; }
      .ct-search { width: 160px; }
    }
    @media (max-width: 640px) {
      .ct-form-grid { grid-template-columns: 1fr; }
      .ct-form-grid.cols-3 { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/api/env.js"></script>
<script>
/* ── INIT ── */
const { createClient } = window.supabase;
const sb = createClient(window.APP_CONFIG.SUPABASE_URL, window.APP_CONFIG.SUPABASE_ANON_KEY);

/* ── SCORING (mirrors admin-api.js calculateLeadScore) ── */
function calcScore(lead, contact) {
  lead = lead || {}; contact = contact || {};
  let total = 0;
  const tm = { asap:25,'30days':20,'1-3months':20,'60days':15,'3-6months':15,'90days':10,'6-12months':5,'6months':5,exploring:0,browsing:0 };
  total += tm[(lead.timeline||'').toLowerCase()] ?? 0;
  const cs = Number(contact.credit_score||0);
  total += cs>=740?25:cs>=700?20:cs>=660?15:cs>=620?10:cs>=580?5:0;
  const em = {new:0,contacted:5,prequalified:12,preapproved:16,in_process:20,in_escrow:20,closed:20,lost:8};
  total += em[lead.status||'new'] ?? 0;
  if (lead.property_address&&lead.property_address.trim().length>3) total+=15;
  else if (lead.purchase_price&&Number(lead.purchase_price)>0) total+=10;
  const src = (lead.source||contact.source||'').toLowerCase();
  const sm = {referral:10,website:8,google:7,google_ads:7,zillow:7,realtor:7,facebook:6,fb:6,social:6,direct:8,cold:2,cold_list:2,other:4};
  total += sm[src] ?? 5;
  const days = lead.created_at ? Math.floor((Date.now()-new Date(lead.created_at).getTime())/86400000) : 0;
  if (lead.status&&lead.status!=='new') total+=5;
  else if (days<=0) total+=5; else if (days<=3) total+=3; else if (days>=14) total-=10; else if (days>=7) total-=5;
  const score = Math.max(0,Math.min(100,Math.round(total)));
  return { score, tier: score>=80?'hot':score>=50?'warm':'cold' };
}

/* ── STATE ── */
let allContacts  = [];   // raw from Supabase (contacts joined with leads)
let filtered     = [];
let sortField    = 'lead_score';
let sortDir      = 'desc';
const PAGE_SIZE  = 50;
let currentPage  = 1;

/* ── LOAD ── */
async function loadContacts() {
  try {
    // Join leads to get latest status per contact
    const { data: contacts, error } = await sb
      .from('contacts')
      .select(`
        id, first_name, last_name, email, phone, secondary_phone,
        source, credit_score, monthly_income, created_at,
        address, city, state, zip,
        employer_name, job_title, employment_type,
        lead_score, score_tier,
        leads(id, status, loan_type, source, timeline, property_address, purchase_price, created_at)
      `)
      .order('created_at', { ascending: false });

    if (error) throw error;

    // Flatten: pick the most-recent lead's status for each contact; compute score if not stored
    allContacts = (contacts || []).map(c => {
      const leads = Array.isArray(c.leads) ? c.leads : (c.leads ? [c.leads] : []);
      const latestLead = leads.sort((a, b) => new Date(b.created_at) - new Date(a.created_at))[0] || null;
      const computed = calcScore(latestLead || {}, c);
      return {
        ...c,
        leads: undefined,
        lead_id:    latestLead ? latestLead.id       : null,
        status:     latestLead ? latestLead.status   : null,
        loan_type:  latestLead ? latestLead.loan_type : null,
        lead_score: c.lead_score != null ? c.lead_score : computed.score,
        score_tier: c.score_tier || computed.tier,
      };
    });

    // Populate stat cards
    const totalEl = document.getElementById('stat-total');
    const hotEl   = document.getElementById('stat-hot');
    const apptsEl = document.getElementById('stat-appts');
    const closedEl = document.getElementById('stat-closed');
    if (totalEl) totalEl.textContent = allContacts.length;
    if (hotEl)   hotEl.textContent   = allContacts.filter(c => c.score_tier === 'hot').length;
    if (apptsEl) apptsEl.textContent = allContacts.filter(c => ['preapproved','in_process'].includes(c.status)).length;
    if (closedEl) closedEl.textContent = allContacts.filter(c => c.status === 'closed').length;

    applyFilters();
  } catch (err) {
    document.getElementById('ct-tbody').innerHTML = `
      <tr><td colspan="10">
        <div class="ct-empty">
          <div class="ct-empty-icon">⚠️</div>
          <h4>Could Not Load Contacts</h4>
          <p>${esc(err.message)}</p>
        </div>
      </td></tr>`;
  }
}

/* ── FILTER + SORT ── */
function applyFilters() {
  const q      = (document.getElementById('ct-search').value || '').toLowerCase();
  const status = document.getElementById('ct-filter-status').value;
  const source = document.getElementById('ct-filter-source').value;
  const tier   = document.getElementById('ct-filter-tier').value;

  filtered = allContacts.filter(c => {
    const name  = [c.first_name, c.last_name].filter(Boolean).join(' ').toLowerCase();
    const email = (c.email || '').toLowerCase();
    const phone = (c.phone || '').replace(/\D/g,'');
    if (q && !name.includes(q) && !email.includes(q) && !phone.includes(q.replace(/\D/g,''))) return false;
    if (status && c.status !== status) return false;
    if (source && c.source !== source) return false;
    if (tier && c.score_tier !== tier) return false;
    return true;
  });

  sortContacts();
}

function sortContacts() {
  filtered.sort((a, b) => {
    let av, bv;
    if (sortField === 'name') {
      av = [a.first_name, a.last_name].filter(Boolean).join(' ').toLowerCase();
      bv = [b.first_name, b.last_name].filter(Boolean).join(' ').toLowerCase();
    } else if (sortField === 'credit_score' || sortField === 'monthly_income' || sortField === 'lead_score') {
      av = Number(a[sortField] || 0);
      bv = Number(b[sortField] || 0);
    } else {
      av = (a[sortField] || '').toString().toLowerCase();
      bv = (b[sortField] || '').toString().toLowerCase();
    }
    if (av < bv) return sortDir === 'asc' ? -1 : 1;
    if (av > bv) return sortDir === 'asc' ?  1 : -1;
    return 0;
  });
  currentPage = 1;
  renderTable();
}

function sortBy(field) {
  if (sortField === field) {
    sortDir = sortDir === 'asc' ? 'desc' : 'asc';
  } else {
    sortField = field;
    sortDir = (field === 'created_at' || field === 'credit_score' || field === 'monthly_income' || field === 'lead_score') ? 'desc' : 'asc';
  }
  // Update header styles
  document.querySelectorAll('.ct-table thead th').forEach(th => {
    th.classList.remove('sort-asc', 'sort-desc');
  });
  const headers = ['name','email','phone','source','lead_score','credit_score','monthly_income','status','created_at'];
  const idx = headers.indexOf(field);
  if (idx >= 0) {
    const th = document.querySelectorAll('.ct-table thead th')[idx];
    th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
  }
  sortContacts();
}

/* ── RENDER TABLE ── */
function renderTable() {
  const tbody = document.getElementById('ct-tbody');
  document.getElementById('ct-count').textContent = filtered.length.toLocaleString();

  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="10">
      <div class="ct-empty">
        <div class="ct-empty-icon">👥</div>
        <h4>No contacts found</h4>
        <p>Try adjusting your search or filters.</p>
      </div>
    </td></tr>`;
    document.getElementById('ct-pagination').style.display = 'none';
    return;
  }

  const start = (currentPage - 1) * PAGE_SIZE;
  const page  = filtered.slice(start, start + PAGE_SIZE);

  tbody.innerHTML = page.map(c => {
    const name     = [c.first_name, c.last_name].filter(Boolean).join(' ') || '(No name)';
    const initials = [(c.first_name||'')[0], (c.last_name||'')[0]].filter(Boolean).join('').toUpperCase() || '?';
    const href     = `lead-detail.html?contact_id=${c.id}`;
    const score    = c.credit_score;
    const scoreClass = !score ? 'score-none' : score >= 700 ? 'score-green' : score >= 620 ? 'score-yellow' : 'score-red';
    const scoreLabel = score ? score : '—';
    const statusClass = c.status ? 'sp-' + c.status : '';
    const statusLabel = {
      new:'New', contacted:'Contacted', prequalified:'Pre-Qualified',
      preapproved:'Pre-Approved', in_process:'In Process', in_escrow:'In Escrow',
      closed:'Closed', lost:'Lost'
    }[c.status] || '—';

    const ls = c.lead_score != null ? c.lead_score : 0;
    const lt = c.score_tier || (ls >= 80 ? 'hot' : ls >= 50 ? 'warm' : 'cold');
    const tierEmoji = { hot: '🔴', warm: '🟡', cold: '🔵' }[lt] || '⚪';
    const tierClass = { hot: 'score-tier-hot', warm: 'score-tier-warm', cold: 'score-tier-cold' }[lt] || '';
    return `<tr style="cursor:pointer;" onclick="window.location.href='${href}'">
      <td>
        <div class="ct-name-cell">
          <div class="ct-avatar">${initials}</div>
          <span class="ct-name-link">${esc(name)}</span>
        </div>
      </td>
      <td style="color:var(--text2);">${esc(c.email || '—')}</td>
      <td style="white-space:nowrap;">${esc(fmtPhone(c.phone) || '—')}</td>
      <td style="text-transform:capitalize;">${esc(c.source || '—')}</td>
      <td><span class="score-tier-badge-sm ${tierClass}" title="${lt.toUpperCase()}">${tierEmoji} ${ls}</span></td>
      <td><span class="ct-score-badge ${scoreClass}">${scoreLabel}</span></td>
      <td>${c.monthly_income ? fmt$(c.monthly_income) : '—'}</td>
      <td>${c.status ? `<span class="ct-status-pill ${statusClass}">${statusLabel}</span>` : '<span class="sp-none">—</span>'}</td>
      <td style="white-space:nowrap;">${fmtDate(c.created_at)}</td>
      <td style="white-space:nowrap;" onclick="event.stopPropagation()"><button class="ct-view-btn" onclick="window.location.href='${href}'">View</button></td>
    </tr>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = filtered.length;
  const pages = Math.ceil(total / PAGE_SIZE);
  const pag   = document.getElementById('ct-pagination');
  const info  = document.getElementById('ct-pag-info');
  const btns  = document.getElementById('ct-pag-btns');

  if (pages <= 1) { pag.style.display = 'none'; return; }
  pag.style.display = 'flex';

  const start = (currentPage - 1) * PAGE_SIZE + 1;
  const end   = Math.min(currentPage * PAGE_SIZE, total);
  info.textContent = `${start}–${end} of ${total} contacts`;

  let html = `<button class="ct-pag-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>← Prev</button>`;
  // Show up to 7 page buttons
  const lo = Math.max(1, currentPage - 3);
  const hi = Math.min(pages, currentPage + 3);
  for (let i = lo; i <= hi; i++) {
    html += `<button class="ct-pag-btn ${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="ct-pag-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}>Next →</button>`;
  btns.innerHTML = html;
}

function goPage(n) {
  const pages = Math.ceil(filtered.length / PAGE_SIZE);
  if (n < 1 || n > pages) return;
  currentPage = n;
  renderTable();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── NEW CONTACT MODAL ── */
function openNewContactModal() {
  document.getElementById('new-contact-modal').classList.add('open');
  document.getElementById('nc-first').focus();
}
function closeNewContactModal() {
  document.getElementById('new-contact-modal').classList.remove('open');
  // Reset form
  ['nc-first','nc-last','nc-email','nc-phone','nc-phone2','nc-credit','nc-income',
   'nc-employer','nc-title','nc-address','nc-city','nc-state','nc-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.value = '';
  });
  ['nc-source','nc-emp-type','nc-loan-type'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.selectedIndex = 0;
  });
}

async function saveNewContact() {
  const firstName = document.getElementById('nc-first').value.trim();
  const lastName  = document.getElementById('nc-last').value.trim();
  if (!firstName && !lastName) { toast('First or last name required', true); return; }

  const parseNum = s => { if (!s) return null; const n = parseFloat(String(s).replace(/[$,]/g,'')); return isNaN(n) ? null : n; };

  const contact = {
    first_name:      firstName,
    last_name:       lastName,
    email:           document.getElementById('nc-email').value.trim() || null,
    phone:           document.getElementById('nc-phone').value.trim() || null,
    secondary_phone: document.getElementById('nc-phone2').value.trim() || null,
    source:          document.getElementById('nc-source').value || null,
    credit_score:    parseInt(document.getElementById('nc-credit').value) || null,
    monthly_income:  parseNum(document.getElementById('nc-income').value),
    employer_name:   document.getElementById('nc-employer').value.trim() || null,
    job_title:       document.getElementById('nc-title').value.trim() || null,
    employment_type: document.getElementById('nc-emp-type').value || null,
    address:         document.getElementById('nc-address').value.trim() || null,
    city:            document.getElementById('nc-city').value.trim() || null,
    state:           document.getElementById('nc-state').value.trim() || null,
  };
  // Remove null fields
  Object.keys(contact).forEach(k => contact[k] === null && delete contact[k]);

  try {
    const { data: newContact, error: cErr } = await sb.from('contacts').insert(contact).select('id').single();
    if (cErr) throw cErr;

    // Also create a lead if loan type selected
    const loanType = document.getElementById('nc-loan-type').value;
    if (loanType) {
      await sb.from('leads').insert({
        contact_id: newContact.id,
        loan_type:  loanType,
        source:     contact.source || null,
        status:     'new',
        notes:      document.getElementById('nc-notes').value.trim() || null,
      }).catch(() => {});
    }

    toast('✓ Contact created');
    closeNewContactModal();
    await loadContacts();
  } catch (err) {
    toast('Error: ' + err.message, true);
  }
}

/* ── THEME ── */
function toggleTheme() {
  document.body.classList.toggle('light');
  const btn = document.getElementById('theme-btn');
  btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
  localStorage.setItem('rr-theme', document.body.classList.contains('light') ? 'light' : 'dark');
}

/* ── HELPERS ── */
function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt$(n) {
  if (!n) return '$0';
  return '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 0 });
}
function fmtDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}
function fmtPhone(p) {
  if (!p) return '';
  const d = p.replace(/\D/g,'');
  if (d.length === 10) return `(${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6)}`;
  if (d.length === 11 && d[0] === '1') return `(${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7)}`;
  return p;
}

function toast(msg, isError = false) {
  const el = document.getElementById('ct-toast');
  el.textContent = msg;
  el.className = 'ct-toast show' + (isError ? ' error' : '');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

/* ── KEYBOARD: close modal on Esc ── */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeNewContactModal();
});
/* ── Click outside modal to close ── */
document.getElementById('new-contact-modal').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeNewContactModal();
});

/* ── BOOT ── */
if (localStorage.getItem('rr-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-btn').textContent = '🌙';
}
loadContacts();
</script>
  <script>
  // Mobile hamburger menu
  (function() {
    var nav = document.querySelector('nav, .main-nav, .navbar');
    if (!nav) return;
    var navLinks = nav.querySelector('.nav-links, .nav-menu, ul.nav');
    if (!navLinks) return;
    var hamburger = document.createElement('button');
    hamburger.className = 'nav-hamburger';
    hamburger.setAttribute('aria-label', 'Toggle menu');
    hamburger.innerHTML = '☰';
    nav.insertBefore(hamburger, navLinks);
    hamburger.addEventListener('click', function() {
      var isOpen = navLinks.classList.toggle('open');
      hamburger.innerHTML = isOpen ? '✕' : '☰';
    });
    document.addEventListener('click', function(e) {
      if (!nav.contains(e.target)) {
        navLinks.classList.remove('open');
        hamburger.innerHTML = '☰';
      }
    });
  })();
  </script>
