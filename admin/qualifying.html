<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <script src="/api/env.js?v=20260412b"></script>
  <title>Qualifying Analyzer | Rates &amp; Realty CRM</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/public/css/responsive.css?v=2026033001">
  <script src="/admin/js/auth-guard.js?v=2026033001"></script>
  <script>if(localStorage.getItem('rr-theme')==='light')document.documentElement.classList.add('light-preload');</script>
  <style>
    html.light-preload body, html.light-preload { background: #f5f5f5 !important; }

    /* ── CSS VARIABLES (matched to lead-detail.html) ── */
    :root {
      --bg:        #050505;
      --surface:   rgba(13,13,13,0.98);
      --surface2:  rgba(18,18,18,0.98);
      --border:    rgba(255,255,255,0.08);
      --border2:   rgba(255,255,255,0.05);
      --text:      #f6f1e8;
      --text2:     #d4cbb8;
      --muted:     #b6ab93;
      --gold:      #C9A84C;
      --gold-bg:   rgba(201,168,76,0.08);
      --gold-bdr:  rgba(201,168,76,0.25);
      --input-bg:  rgba(20,20,20,0.98);
      --topbar-h:  48px;
      --green:     #4ade80;
      --green-bg:  rgba(74,222,128,0.07);
      --yellow:    #fbbf24;
      --yellow-bg: rgba(251,191,36,0.06);
      --red:       #f87171;
      --red-bg:    rgba(248,113,113,0.06);
    }
    body.light {
      --bg:       #f4f2ee;
      --surface:  #ffffff;
      --surface2: #f8f6f2;
      --border:   rgba(0,0,0,0.09);
      --border2:  rgba(0,0,0,0.05);
      --text:     #1a1410;
      --text2:    #3d3427;
      --muted:    #7a6f5c;
      --input-bg: #ffffff;
      --green-bg:  rgba(34,160,90,0.08);
      --yellow-bg: rgba(180,130,10,0.08);
      --red-bg:    rgba(200,60,60,0.07);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 14px; }
    body {
      font-family: 'Manrope', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s ease, color 0.3s ease;
    }
    a { color: inherit; text-decoration: none; }
    button, select, input { font-family: 'Manrope', sans-serif; font-size: 0.85rem; }

    /* ── ACTION BAR (same chrome as lead-detail.html) ── */
    .action-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 6px;
      padding: 0 12px; z-index: 200;
      white-space: nowrap;
    }
    .ab-back {
      display: flex; align-items: center; gap: 4px;
      padding: 3px 8px; border-radius: 999px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--border);
      color: var(--muted); font-size: 11px; font-weight: 600;
      cursor: pointer; transition: all .18s; white-space: nowrap;
      flex-shrink: 0; text-decoration: none;
    }
    .ab-back:hover { color: var(--text); background: rgba(255,255,255,0.09); }
    .ab-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px; font-weight: 600;
      color: var(--text); white-space: nowrap; flex-shrink: 0;
      margin-left: 4px;
    }
    .ab-divider { flex: 1; min-width: 8px; }
    .ab-controls { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .ab-btn {
      padding: 4px 10px; border-radius: 6px;
      font-size: 11px; font-weight: 700;
      cursor: pointer; transition: all .18s;
      white-space: nowrap; flex-shrink: 0;
    }
    .ab-btn-danger {
      background: rgba(248,113,113,0.1);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f87171;
    }
    .ab-btn-danger:hover { background: rgba(248,113,113,0.18); }
    .ab-theme {
      width: 28px; height: 28px; border-radius: 6px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: .85rem; flex-shrink: 0;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all .18s;
    }
    .ab-theme:hover { color: var(--gold); border-color: var(--gold-bdr); }

    /* ── PAGE WRAP ── */
    .page {
      max-width: 1320px; margin: 0 auto;
      padding: calc(var(--topbar-h) + 22px) 22px 60px;
    }
    .page-sub { color: var(--muted); font-size: 12px; margin: 2px 0 22px; }

    /* ── STATS BANNER ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px; margin-bottom: 16px;
    }
    .stat-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 16px 18px;
    }
    .stat-card.accent { border-color: var(--gold-bdr); background: var(--gold-bg); }
    .stat-label {
      font-size: 10.5px; font-weight: 700; letter-spacing: .07em;
      text-transform: uppercase; color: var(--muted);
    }
    .stat-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 30px; font-weight: 700; color: var(--text);
      margin-top: 6px; line-height: 1;
    }
    .stat-card.accent .stat-value { color: var(--gold); }
    .stat-note { font-size: 11px; color: var(--muted); margin-top: 5px; }

    /* ── GAP BREAKDOWN STRIP ── */
    .gap-strip {
      display: flex; flex-wrap: wrap; gap: 8px;
      margin-bottom: 18px;
    }
    .gap-pill {
      display: inline-flex; align-items: center; gap: 7px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 999px; padding: 5px 12px;
      font-size: 11px; color: var(--text2);
    }
    .gap-pill b { color: var(--yellow); font-weight: 800; }

    /* ── FILTER CHIPS ── */
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
    .chip {
      padding: 6px 14px; border-radius: 999px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--muted); font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all .15s;
    }
    .chip:hover { color: var(--text); border-color: var(--gold-bdr); }
    .chip.active {
      background: var(--gold-bg); border-color: var(--gold-bdr); color: var(--gold);
    }

    /* ── TABLE ── */
    .table-wrap {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left; font-size: 10.5px; font-weight: 700;
      letter-spacing: .06em; text-transform: uppercase; color: var(--muted);
      padding: 12px 14px; border-bottom: 1px solid var(--border);
      cursor: pointer; user-select: none; white-space: nowrap;
      position: sticky; top: var(--topbar-h); background: var(--surface); z-index: 5;
    }
    thead th:hover { color: var(--text2); }
    thead th .arrow { color: var(--gold); margin-left: 4px; font-size: 9px; }
    thead th.num, tbody td.num { text-align: right; }
    tbody td {
      padding: 12px 14px; font-size: 13px; color: var(--text2);
      border-bottom: 1px solid var(--border2); vertical-align: middle;
    }
    .row-main { cursor: pointer; transition: background .12s; }
    .row-main:hover { background: rgba(255,255,255,0.025); }
    .row-main.open { background: rgba(201,168,76,0.05); }
    /* doc-status row tint via left accent bar */
    .row-main td:first-child { border-left: 3px solid transparent; }
    .row-main.s-green  td:first-child { border-left-color: var(--green); }
    .row-main.s-yellow td:first-child { border-left-color: var(--yellow); }
    .row-main.s-red    td:first-child { border-left-color: var(--red); }
    .name-cell { font-weight: 700; color: var(--text); }
    .name-cell .caret { color: var(--muted); font-size: 10px; margin-right: 6px; display: inline-block; transition: transform .15s; }
    .row-main.open .name-cell .caret { transform: rotate(90deg); color: var(--gold); }
    .money { font-variant-numeric: tabular-nums; }
    .money.agency { color: var(--text); font-weight: 600; }
    .money.upside { color: var(--gold); font-weight: 700; }

    .badge {
      padding: 2px 8px; border-radius: 999px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
      white-space: nowrap; display: inline-block;
    }
    .b-status { background: rgba(96,165,250,.12); border:1px solid rgba(96,165,250,.3); color:#60a5fa; }
    .b-doc-yes { background: var(--green-bg); border:1px solid rgba(74,222,128,.35); color: var(--green); }
    .b-doc-no  { background: var(--surface2); border:1px solid var(--border); color: var(--muted); }
    .b-gap-0 { color: var(--green); }
    .b-gap-low { color: var(--yellow); }
    .b-gap-high { color: var(--red); font-weight: 800; }
    .temp-hot  { color:#f87171; }
    .temp-warm { color:#fbbf24; }
    .temp-cold { color:#60a5fa; }

    /* ── DETAIL PANEL ── */
    .detail-row td { padding: 0; border-bottom: 1px solid var(--border2); }
    .detail-inner {
      padding: 20px 22px;
      display: grid; gap: 22px;
      grid-template-columns: 1.4fr 1fr;
      background: var(--surface2);
    }
    @media (max-width: 820px) { .detail-inner { grid-template-columns: 1fr; } }
    .detail-block h4 {
      font-size: 11px; font-weight: 700; letter-spacing: .06em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 10px;
    }
    /* category bars */
    .cat-row { display: grid; grid-template-columns: 110px 1fr 90px; align-items: center; gap: 10px; margin-bottom: 7px; }
    .cat-label { font-size: 12px; color: var(--text2); }
    .cat-bar-track { height: 8px; background: rgba(255,255,255,0.06); border-radius: 5px; overflow: hidden; }
    .cat-bar-fill { height: 100%; background: linear-gradient(90deg, #f2cf85, var(--gold)); border-radius: 5px; }
    .cat-val { text-align: right; font-size: 12px; font-weight: 600; color: var(--text); font-variant-numeric: tabular-nums; }
    .cat-row.empty .cat-label, .cat-row.empty .cat-val { color: var(--muted); opacity: .5; }

    /* ocr docs */
    .ocr-grid { display: flex; gap: 12px; flex-wrap: wrap; }
    .ocr-card {
      flex: 1; min-width: 110px; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 12px; text-align: center;
    }
    .ocr-icon { font-size: 20px; }
    .ocr-count { font-family: 'Cormorant Garamond', serif; font-size: 24px; font-weight: 700; color: var(--text); }
    .ocr-name { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    /* gaps list */
    .gap-list { display: grid; gap: 7px; }
    .gap-item { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; }
    .gap-item .dot { color: var(--red); margin-top: 1px; }
    .gap-item.ok { color: var(--muted); }
    .gap-item.ok .dot { color: var(--green); }

    /* piti table */
    .piti { width: 100%; border-collapse: collapse; margin-top: 4px; }
    .piti th, .piti td { padding: 7px 8px; font-size: 12px; text-align: right; border-bottom: 1px solid var(--border2); }
    .piti th:first-child, .piti td:first-child { text-align: left; color: var(--text2); }
    .piti thead th { color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: .05em; }
    .piti td { color: var(--text); font-variant-numeric: tabular-nums; }
    .piti tr.prelim td:first-child { color: var(--muted); }

    .detail-foot { grid-column: 1 / -1; display: flex; justify-content: flex-end; padding-top: 4px; }
    .detail-link {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(135deg, #f2cf85, #C9A84C);
      color: #111; font-weight: 800; font-size: 12px;
      padding: 8px 16px; border-radius: 8px; transition: opacity .15s;
    }
    .detail-link:hover { opacity: .88; }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
    .empty-state .big { font-size: 2.5rem; margin-bottom: 10px; }
  </style>
</head>
<body>

<!-- ── ACTION BAR ── -->
<div class="action-bar">
  <a href="people.html" class="ab-back" title="People">&#128101;</a>
  <a href="pipeline.html" class="ab-back" title="Pipeline">&#127937;</a>
  <a href="guideline-ai.html" class="ab-back" title="Guideline AI">&#128270;</a>
  <div class="ab-name">&#128202; Qualifying Analyzer</div>
  <div class="ab-divider"></div>
  <div class="ab-controls">
    <button class="ab-btn ab-btn-danger" onclick="(window.adminLogout||function(){location.href='/admin-login.html'})()">Logout</button>
    <button class="ab-theme" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#127769;</button>
  </div>
</div>

<div class="page">
  <div class="page-sub">Pipeline-wide qualifying overview — preliminary ceiling vs. FNMA-adjusted agency floor, and the upside locked behind documentation gaps. <span id="updated"></span></div>

  <!-- stats banner -->
  <div class="stats" id="statsBanner"></div>

  <!-- gap-type breakdown -->
  <div class="gap-strip" id="gapStrip"></div>

  <!-- filter chips -->
  <div class="chips" id="chips"></div>

  <!-- table -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr id="headRow"></tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="7" class="empty-state">Loading qualifying snapshot…</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
/* ── INIT (same Supabase setup pattern as lead-detail.html) ── */
const { createClient } = window.supabase;
const sb = createClient(
  window.APP_CONFIG.SUPABASE_URL,
  window.APP_CONFIG.SUPABASE_ANON_KEY
);

// Prefer the session-aware client set up by admin/js/auth-guard.js; fall back to anon.
async function _waitForAuthClient(maxMs) {
  if (maxMs == null) maxMs = 5000;
  if (typeof window.getSupabaseClient === 'function') {
    try { return await window.getSupabaseClient(); } catch (e) { /* fall through */ }
  }
  const start = Date.now();
  while (!window._supabaseClient && Date.now() - start < maxMs) {
    await new Promise(r => setTimeout(r, 50));
  }
  return window._supabaseClient || sb;
}

/* ── THEME ── */
function toggleTheme() {
  const light = document.body.classList.toggle('light');
  document.documentElement.classList.toggle('light-preload', light);
  localStorage.setItem('rr-theme', light ? 'light' : 'dark');
  document.getElementById('theme-toggle').textContent = light ? '☀️' : '🌙';
}
if (localStorage.getItem('rr-theme') === 'light') {
  document.body.classList.add('light');
  document.getElementById('theme-toggle').textContent = '☀️';
}

/* ── HELPERS ── */
function fmtMoney(n)   { n = Number(n) || 0; return '$' + Math.round(n).toLocaleString('en-US'); }
function fmtPerMo(n)   { return fmtMoney(n) + '/mo'; }
function fmtDate(d) {
  if (!d) return '—';
  const dt = new Date(d);
  if (isNaN(dt)) return '—';
  return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

// Gap field → human label
const GAP_DEFS = [
  { key: 'gap_no_application',            label: 'No application on file' },
  { key: 'gap_base_salary_no_paystubs',  label: 'Base salary — no paystubs uploaded' },
  { key: 'gap_variable_needs_2yr_w2',    label: 'Variable income — needs 2-yr W-2 history' },
  { key: 'gap_se_needs_tax_returns',     label: 'Self-employed — needs tax returns' },
  { key: 'gap_rental_needs_schedule_e',  label: 'Rental income — needs Schedule E' },
  { key: 'gap_other_needs_classification', label: 'Other income — needs classification' },
];
const GAP_SHORT = {
  gap_no_application: 'No app',
  gap_base_salary_no_paystubs: 'No paystubs',
  gap_variable_needs_2yr_w2: 'No 2yr W-2',
  gap_se_needs_tax_returns: 'No tax returns',
  gap_rental_needs_schedule_e: 'No Sched. E',
  gap_other_needs_classification: 'Unclassified',
};
const INCOME_CATS = [
  { key: 'base_salary_monthly',   label: 'Base salary' },
  { key: 'variable_monthly',      label: 'Variable' },
  { key: 'self_employed_monthly', label: 'Self-employed' },
  { key: 'rental_monthly',        label: 'Rental' },
  { key: 'investment_monthly',    label: 'Investment' },
  { key: 'retirement_monthly',    label: 'Retirement' },
  { key: 'support_monthly',       label: 'Support' },
  { key: 'other_monthly',         label: 'Other' },
];

function gapsFired(r) { return GAP_DEFS.filter(g => r[g.key]).map(g => g.key); }
function statusClass(r) {
  if (r.qualifying_documentation_complete) return 's-green';
  const n = gapsFired(r).length;
  if (n >= 3) return 's-red';
  if (n >= 1) return 's-yellow';
  return 's-green';
}
function tempClass(t) {
  const s = (t || '').toLowerCase();
  if (s.includes('hot')) return 'temp-hot';
  if (s.includes('warm')) return 'temp-warm';
  return 'temp-cold';
}

/* ── STATE ── */
let ROWS = [];                 // all rows from the view
let activeFilter = 'income';   // default chip
let sortKey = 'qualifying_upside_locked_by_doc_gaps';
let sortDir = 'desc';
let openId = null;             // currently expanded contact_id

const COLUMNS = [
  { key: 'name',                              label: 'Name',         num: false },
  { key: 'pipeline_status',                   label: 'Status',       num: false },
  { key: 'qualifying_documentation_complete', label: 'Documented',   num: false },
  { key: 'agency_qualifying_monthly',         label: 'Agency Qual',  num: true  },
  { key: 'qualifying_upside_locked_by_doc_gaps', label: 'Upside Locked', num: true },
  { key: '_gapcount',                         label: 'Gaps',         num: true  },
  { key: 'last_contact_date',                 label: 'Last Contact', num: true  },
];

/* ── FILTERS ── */
const FILTERS = [
  { id: 'all',      label: 'All' },
  { id: 'income',   label: 'Has Income' },
  { id: 'gaps',     label: 'Has Gaps' },
  { id: 'complete', label: 'Docs Complete' },
  { id: 'hot',      label: 'Hot Leads' },
];
function passesFilter(r) {
  switch (activeFilter) {
    case 'all':      return true;
    case 'income':   return Number(r.income_row_count) > 0;
    case 'gaps':     return gapsFired(r).length > 0;
    case 'complete': return !!r.qualifying_documentation_complete;
    case 'hot':      return (r.lead_temperature || '').toLowerCase().includes('hot');
    default:         return true;
  }
}

/* ── LOAD ── */
async function loadData() {
  try {
    const client = await _waitForAuthClient();
    const { data, error } = await client
      .from('borrower_qualifying_snapshot')
      .select('*');
    if (error) throw error;
    ROWS = Array.isArray(data) ? data : [];
    document.getElementById('updated').textContent =
      '· ' + ROWS.length + ' borrowers analyzed';
    renderStats();
    renderChips();
    renderHead();
    renderTable();
  } catch (e) {
    console.error('[qualifying] load failed:', e);
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" class="empty-state"><div class="big">⚠️</div>
        Could not load qualifying snapshot.<br><span style="font-size:12px;">${(e && e.message) || e}</span></td></tr>`;
  }
}

/* ── STATS BANNER ── */
function renderStats() {
  const withIncome = ROWS.filter(r => Number(r.income_row_count) > 0);
  const totalAgency = withIncome.reduce((s, r) => s + (Number(r.agency_qualifying_monthly) || 0), 0);
  const totalPrelim = withIncome.reduce((s, r) => s + (Number(r.preliminary_qualifying_monthly) || 0), 0);
  const totalUpside = withIncome.reduce((s, r) => s + (Number(r.qualifying_upside_locked_by_doc_gaps) || 0), 0);
  const docComplete = ROWS.filter(r => r.qualifying_documentation_complete).length;
  const withGaps = ROWS.filter(r => gapsFired(r).length > 0).length;

  const cards = [
    { label: 'Pipeline Qualifying (Agency)', value: fmtPerMo(totalAgency), note: withIncome.length + ' borrowers w/ income', accent: true },
    { label: 'Preliminary Ceiling',          value: fmtPerMo(totalPrelim), note: 'optimistic, pre-FNMA' },
    { label: 'Upside Locked by Doc Gaps',    value: fmtPerMo(totalUpside), note: 'priority queue value', accent: true },
    { label: 'Docs Complete',                value: docComplete,           note: 'fully documented borrowers' },
    { label: 'Borrowers w/ Gaps',            value: withGaps,              note: 'need follow-up docs' },
    { label: 'Total Analyzed',               value: ROWS.length,           note: 'rows in snapshot' },
  ];
  document.getElementById('statsBanner').innerHTML = cards.map(c => `
    <div class="stat-card${c.accent ? ' accent' : ''}">
      <div class="stat-label">${c.label}</div>
      <div class="stat-value">${c.value}</div>
      <div class="stat-note">${c.note}</div>
    </div>`).join('');

  // gap-type breakdown
  const counts = {};
  GAP_DEFS.forEach(g => counts[g.key] = ROWS.filter(r => r[g.key]).length);
  document.getElementById('gapStrip').innerHTML = GAP_DEFS.map(g =>
    `<span class="gap-pill">${g.label.split(' — ')[0].replace(/^No /, 'No ')} <b>${counts[g.key]}</b></span>`
  ).join('');
}

/* ── CHIPS ── */
function renderChips() {
  document.getElementById('chips').innerHTML = FILTERS.map(f =>
    `<div class="chip${activeFilter === f.id ? ' active' : ''}" onclick="setFilter('${f.id}')">${f.label}</div>`
  ).join('');
}
function setFilter(id) {
  activeFilter = id;
  openId = null;
  renderChips();
  renderTable();
}

/* ── TABLE HEAD ── */
function renderHead() {
  document.getElementById('headRow').innerHTML = COLUMNS.map(c => {
    const arrow = sortKey === c.key ? `<span class="arrow">${sortDir === 'asc' ? '▲' : '▼'}</span>` : '';
    return `<th class="${c.num ? 'num' : ''}" onclick="setSort('${c.key}')">${c.label}${arrow}</th>`;
  }).join('');
}
function setSort(key) {
  if (sortKey === key) { sortDir = sortDir === 'asc' ? 'desc' : 'asc'; }
  else { sortKey = key; sortDir = (key === 'name' || key === 'pipeline_status') ? 'asc' : 'desc'; }
  renderHead();
  renderTable();
}
function sortVal(r, key) {
  if (key === '_gapcount') return gapsFired(r).length;
  if (key === 'qualifying_documentation_complete') return r[key] ? 1 : 0;
  if (key === 'last_contact_date') return r[key] ? new Date(r[key]).getTime() : 0;
  if (key === 'name' || key === 'pipeline_status') return (r[key] || '').toLowerCase();
  return Number(r[key]) || 0;
}

/* ── TABLE BODY ── */
function renderTable() {
  const rows = ROWS.filter(passesFilter).sort((a, b) => {
    const va = sortVal(a, sortKey), vb = sortVal(b, sortKey);
    if (va < vb) return sortDir === 'asc' ? -1 : 1;
    if (va > vb) return sortDir === 'asc' ? 1 : -1;
    return 0;
  });

  if (!rows.length) {
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="7" class="empty-state"><div class="big">🔍</div>No borrowers match this filter.</td></tr>`;
    return;
  }

  document.getElementById('tbody').innerHTML = rows.map(r => {
    const gaps = gapsFired(r);
    const sc = statusClass(r);
    const gapCls = gaps.length === 0 ? 'b-gap-0' : (gaps.length >= 3 ? 'b-gap-high' : 'b-gap-low');
    const docBadge = r.qualifying_documentation_complete
      ? '<span class="badge b-doc-yes">✓ Complete</span>'
      : '<span class="badge b-doc-no">Incomplete</span>';
    const isOpen = openId === r.contact_id;
    const main = `
      <tr class="row-main ${sc}${isOpen ? ' open' : ''}" onclick="toggleRow('${r.contact_id}')">
        <td class="name-cell"><span class="caret">▶</span>${r.name || 'Unknown Borrower'}</td>
        <td><span class="badge b-status">${r.pipeline_status || '—'}</span></td>
        <td>${docBadge}</td>
        <td class="num money agency">${fmtPerMo(r.agency_qualifying_monthly)}</td>
        <td class="num money upside">${Number(r.qualifying_upside_locked_by_doc_gaps) > 0 ? fmtPerMo(r.qualifying_upside_locked_by_doc_gaps) : '—'}</td>
        <td class="num"><span class="${gapCls}">${gaps.length}</span></td>
        <td class="num" style="color:var(--muted);">${fmtDate(r.last_contact_date)}</td>
      </tr>`;
    const detail = isOpen ? detailRow(r) : '';
    return main + detail;
  }).join('');
}

function toggleRow(id) {
  openId = (openId === id) ? null : id;
  renderTable();
}

/* ── DETAIL PANEL ── */
function detailRow(r) {
  // category breakdown
  const catMax = Math.max(1, ...INCOME_CATS.map(c => Number(r[c.key]) || 0));
  const cats = INCOME_CATS.map(c => {
    const v = Number(r[c.key]) || 0;
    const pct = v > 0 ? Math.max(4, (v / catMax) * 100) : 0;
    return `<div class="cat-row${v > 0 ? '' : ' empty'}">
        <div class="cat-label">${c.label}</div>
        <div class="cat-bar-track">${v > 0 ? `<div class="cat-bar-fill" style="width:${pct}%"></div>` : ''}</div>
        <div class="cat-val">${v > 0 ? fmtMoney(v) : '—'}</div>
      </div>`;
  }).join('');

  // ocr docs
  const ocr = [
    { icon: '📄', name: 'Paystubs',        n: r.paystub_ocr_count },
    { icon: '📋', name: 'W-2s',            n: r.w2_ocr_count },
    { icon: '🏦', name: 'Bank Statements', n: r.bank_statement_ocr_count },
  ].map(o => `<div class="ocr-card">
      <div class="ocr-icon">${o.icon}</div>
      <div class="ocr-count">${Number(o.n) || 0}</div>
      <div class="ocr-name">${o.name}</div>
    </div>`).join('');

  // full gap list (labels for every gap, fired or not)
  const gapList = GAP_DEFS.map(g => {
    const fired = !!r[g.key];
    return `<div class="gap-item${fired ? '' : ' ok'}">
        <span class="dot">${fired ? '●' : '✓'}</span>
        <span>${g.label}</span>
      </div>`;
  }).join('');

  // piti rows
  const piti = `
    <table class="piti">
      <thead><tr><th>Scenario</th><th>@ 43% DTI</th><th>@ 50% DTI</th></tr></thead>
      <tbody>
        <tr class="prelim">
          <td>Preliminary PITI</td>
          <td>${fmtMoney(r.max_back_end_piti_at_43_dti)}</td>
          <td>${fmtMoney(r.max_back_end_piti_at_50_dti)}</td>
        </tr>
        <tr>
          <td>Agency PITI</td>
          <td>${fmtMoney(r.agency_max_piti_at_43_dti)}</td>
          <td>${fmtMoney(r.agency_max_piti_at_50_dti)}</td>
        </tr>
      </tbody>
    </table>`;

  return `
    <tr class="detail-row"><td colspan="7">
      <div class="detail-inner">
        <div class="detail-block">
          <h4>Income Category Breakdown</h4>
          ${cats}
          <div style="margin-top:12px;font-size:12px;color:var(--muted);">
            Total documented: <b style="color:var(--text);">${fmtPerMo(r.total_documented_monthly)}</b>
            &nbsp;·&nbsp; Preliminary qualifying: <b style="color:var(--text);">${fmtPerMo(r.preliminary_qualifying_monthly)}</b>
            &nbsp;·&nbsp; Agency qualifying: <b style="color:var(--gold);">${fmtPerMo(r.agency_qualifying_monthly)}</b>
          </div>
          <h4 style="margin-top:20px;">Max Back-End PITI</h4>
          ${piti}
        </div>
        <div class="detail-block">
          <h4>OCR Documents on File</h4>
          <div class="ocr-grid">${ocr}</div>
          <div style="font-size:11px;color:var(--muted);margin-top:6px;text-align:right;">
            Latest OCR: ${fmtDate(r.latest_ocr_at)}
          </div>
          <h4 style="margin-top:20px;">Documentation Gaps</h4>
          <div class="gap-list">${gapList}</div>
        </div>
        <div class="detail-foot">
          <a class="detail-link" href="lead-detail.html?contact_id=${r.contact_id}">
            Open borrower &rarr;
          </a>
        </div>
      </div>
    </td></tr>`;
}

loadData();
</script>
</body>
</html>
