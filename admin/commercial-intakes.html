<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commercial Intakes — Rates & Realty CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--gold:#c9a84c;--dark:#0a0a0a;--card:#111;--border:rgba(255,255,255,0.08);--text:rgba(255,255,255,0.85);--muted:rgba(255,255,255,0.4);}
    html,body{height:100%;background:var(--dark);color:var(--text);font-family:'Inter',sans-serif;}
    .topnav{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;background:#111;border-bottom:1px solid var(--border);}
    .nav-brand{display:flex;align-items:center;gap:10px;text-decoration:none;}
    .brand-logo{width:32px;height:32px;border-radius:8px;background:linear-gradient(135deg,var(--gold),#a07830);display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:700;color:#1a1a1a;}
    .brand-name{font-family:'Cormorant Garamond',serif;font-size:16px;color:#fff;font-weight:600;}
    .btn-back{padding:7px 14px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:var(--muted);font-size:12px;text-decoration:none;}
    .filter-bar{display:flex;gap:8px;padding:16px 24px;border-bottom:1px solid #1a1a1a;flex-wrap:wrap;align-items:center;}
    .fb{padding:7px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;color:#fff;font-size:11px;font-family:inherit;outline:none;min-width:100px;}
    .fb-search{flex:1;min-width:200px;}
    .fb-btn{padding:7px 14px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:7px;color:#888;font-size:11px;cursor:pointer;font-family:inherit;white-space:nowrap;}
    .fb-btn:hover{border-color:#C9A84C44;color:#C9A84C;}
    .stats-bar{display:flex;gap:10px;padding:12px 24px;border-bottom:1px solid #111;}
    .stat-card{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:10px 16px;text-align:center;flex:1;}
    .stat-val{font-size:18px;font-weight:800;color:var(--gold);}
    .stat-label{font-size:9px;color:#555;margin-top:2px;text-transform:uppercase;letter-spacing:.5px;}
    .content{padding:20px 24px;overflow-y:auto;height:calc(100vh - 180px);}
    .drawer-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:999;display:none;}
    .drawer{position:fixed;top:0;right:0;width:700px;height:100vh;background:#0d0d0d;border-left:1px solid #1e1e1e;z-index:1000;overflow-y:auto;padding:24px;transform:translateX(100%);transition:transform .25s ease;display:none;}
    .drawer.open{display:block;transform:translateX(0);}
    .drawer-tab{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:600;background:transparent;color:#666;font-family:inherit;}
    .drawer-tab.active{background:var(--gold);color:#000;}
  </style>
</head>
<body>
  <nav class="topnav">
    <a href="/admin/people.html" class="nav-brand"><div class="brand-logo">R&R</div><span class="brand-name">Rates & Realty</span></a>
    <div style="display:flex;gap:8px;">
      <a href="/admin/lenders.html" class="btn-back">Lender DB</a>
      <a href="/admin/people.html" class="btn-back">← CRM</a>
    </div>
  </nav>

  <div class="filter-bar">
    <select id="filterStatus" class="fb" onchange="loadIntakes()"><option value="">All Status</option><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="reviewing">Reviewing</option><option value="needs_docs">Needs Docs</option><option value="submitted_to_lender">To Lender</option><option value="approved">Approved</option><option value="declined">Declined</option></select>
    <select id="filterPurpose" class="fb" onchange="loadIntakes()"><option value="">All Purpose</option><option>Purchase</option><option>Refinance</option><option>Cash-Out Refinance</option><option>Bridge</option><option>Construction</option><option>Rehab / Value-Add</option><option>SBA</option><option>Owner-User</option><option>Hard Money</option></select>
    <select id="filterType" class="fb" onchange="loadIntakes()"><option value="">All Types</option><option>Multifamily 5+</option><option>Mixed-Use</option><option>Retail</option><option>Office</option><option>Industrial/Warehouse</option><option>Self Storage</option><option>Mobile Home Park</option><option>Hotel/Motel</option><option>Other</option></select>
    <input id="filterState" class="fb" placeholder="State" maxlength="2" style="width:60px;text-transform:uppercase;" oninput="clearTimeout(window._st);window._st=setTimeout(loadIntakes,400)">
    <input id="filterMinLoan" class="fb" placeholder="Min $" style="width:90px;" oninput="clearTimeout(window._st);window._st=setTimeout(loadIntakes,400)">
    <input id="filterMaxLoan" class="fb" placeholder="Max $" style="width:90px;" oninput="clearTimeout(window._st);window._st=setTimeout(loadIntakes,400)">
    <input id="filterSearch" class="fb fb-search" placeholder="🔍 Search name, address, email, ID..." oninput="clearTimeout(window._st);window._st=setTimeout(loadIntakes,400)">
    <button class="fb-btn" onclick="exportCSV()">📥 Export CSV</button>
    <button class="fb-btn" onclick="loadIntakes()">↻ Refresh</button>
  </div>

  <div class="stats-bar">
    <div class="stat-card"><div class="stat-val" id="statTotal">0</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-val" id="statSubmitted">0</div><div class="stat-label">Submitted</div></div>
    <div class="stat-card"><div class="stat-val" id="statReviewing">0</div><div class="stat-label">Reviewing</div></div>
    <div class="stat-card"><div class="stat-val" id="statNeedsDocs">0</div><div class="stat-label">Needs Docs</div></div>
    <div class="stat-card"><div class="stat-val" id="statPipeline">$0</div><div class="stat-label">Total Pipeline</div></div>
  </div>

  <div class="content" id="intakesList">
    <div style="text-align:center;padding:60px;color:#555;"><div style="font-size:40px;margin-bottom:16px;">📋</div><div style="font-size:15px;color:#888;">Loading commercial intakes...</div></div>
  </div>

  <!-- Detail Drawer -->
  <div class="drawer-overlay" id="drawerOverlay" onclick="closeDrawer()"></div>
  <div class="drawer" id="intakeDrawer">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
      <div style="font-size:16px;font-weight:700;color:#fff;" id="drawerTitle">Intake Detail</div>
      <button onclick="closeDrawer()" style="background:none;border:none;color:#555;font-size:22px;cursor:pointer;">×</button>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;" id="drawerTabs"></div>
    <div id="drawerContent"></div>
  </div>

<script src="/api/env.js"></script>
<script>
var cfg = window.APP_CONFIG || {};
var INTAKE_URL = (cfg.SUPABASE_URL || 'https://ljywhvbmsibwnssxpesh.supabase.co') + '/functions/v1/commercial-intake';
var SB_URL = cfg.SUPABASE_URL || 'https://ljywhvbmsibwnssxpesh.supabase.co';
var SB_KEY = cfg.SUPABASE_ANON_KEY;
function HDR() { return { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY }; }

var STATUS_COLORS = { draft:'#555', submitted:'#C9A84C', reviewing:'#2980B9', needs_docs:'#E67E22', submitted_to_lender:'#8E44AD', approved:'#27AE60', declined:'#E74C3C' };
var DOC_FIELDS = ['doc_purchase_contract','doc_offering_memorandum','doc_rent_roll','doc_t12','doc_leases','doc_property_photos','doc_mortgage_statement','doc_bank_statements','doc_pfs','doc_sre','doc_personal_tax_returns','doc_business_tax_returns','doc_pl','doc_balance_sheet','doc_entity_docs','doc_driver_license','doc_scope_of_work','doc_contractor_bids','doc_plans_permits','doc_insurance_decl','doc_other'];
var DOC_LABELS = { doc_purchase_contract:'Purchase Contract', doc_offering_memorandum:'Offering Memo', doc_rent_roll:'Rent Roll', doc_t12:'T-12 Statement', doc_leases:'Leases', doc_property_photos:'Photos', doc_mortgage_statement:'Mortgage Stmt', doc_bank_statements:'Bank Statements', doc_pfs:'PFS', doc_sre:'SRE', doc_personal_tax_returns:'Personal Tax Returns', doc_business_tax_returns:'Business Tax Returns', doc_pl:'P&L', doc_balance_sheet:'Balance Sheet', doc_entity_docs:'Entity Docs', doc_driver_license:'ID', doc_scope_of_work:'Scope of Work', doc_contractor_bids:'Contractor Bids', doc_plans_permits:'Plans/Permits', doc_insurance_decl:'Insurance', doc_other:'Other' };
var _allIntakes = [];

async function loadIntakes() {
  try {
    var url = SB_URL + '/rest/v1/commercial_loan_intakes?select=*&order=created_at.desc&limit=100';
    var status = document.getElementById('filterStatus')?.value;
    var purpose = document.getElementById('filterPurpose')?.value;
    var type = document.getElementById('filterType')?.value;
    var state = document.getElementById('filterState')?.value?.toUpperCase();
    var minLoan = document.getElementById('filterMinLoan')?.value?.replace(/,/g,'');
    var maxLoan = document.getElementById('filterMaxLoan')?.value?.replace(/,/g,'');
    var search = (document.getElementById('filterSearch')?.value || '').toLowerCase();
    if (status) url += '&status=eq.' + status;
    if (purpose) url += '&loan_purpose=eq.' + encodeURIComponent(purpose);
    if (type) url += '&property_type=eq.' + encodeURIComponent(type);
    if (state) url += '&property_state=eq.' + state;
    if (minLoan) url += '&requested_loan_amount=gte.' + minLoan;
    if (maxLoan) url += '&requested_loan_amount=lte.' + maxLoan;
    var res = await fetch(url, { headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY } });
    var intakes = await res.json();
    if (!Array.isArray(intakes)) intakes = [];
    if (search) intakes = intakes.filter(function(i) { return (i.borrower_name||'').toLowerCase().includes(search) || (i.property_address||'').toLowerCase().includes(search) || (i.submission_id||'').toLowerCase().includes(search) || (i.borrower_email||'').toLowerCase().includes(search); });
    _allIntakes = intakes;
    updateStats(intakes);
    renderIntakes(intakes);
  } catch(e) { document.getElementById('intakesList').innerHTML = '<div style="padding:40px;text-align:center;color:#E74C3C;">Error: ' + e.message + '</div>'; }
}

function updateStats(intakes) {
  document.getElementById('statTotal').textContent = intakes.length;
  document.getElementById('statSubmitted').textContent = intakes.filter(function(i){return i.status==='submitted';}).length;
  document.getElementById('statReviewing').textContent = intakes.filter(function(i){return i.status==='reviewing';}).length;
  document.getElementById('statNeedsDocs').textContent = intakes.filter(function(i){return i.status==='needs_docs';}).length;
  var pipeline = intakes.reduce(function(s,i){return s+(parseFloat(i.requested_loan_amount)||0);},0);
  document.getElementById('statPipeline').textContent = '$' + (pipeline >= 1e6 ? (pipeline/1e6).toFixed(1)+'M' : Math.round(pipeline).toLocaleString());
}

function renderIntakes(intakes) {
  var container = document.getElementById('intakesList');
  if (!intakes.length) { container.innerHTML = '<div style="text-align:center;padding:60px;color:#555;"><div style="font-size:40px;margin-bottom:16px;">📋</div><div style="font-size:15px;color:#888;">No commercial intakes found</div></div>'; return; }
  container.innerHTML = intakes.map(function(i) {
    var c = STATUS_COLORS[i.status] || '#555';
    var loan = i.requested_loan_amount ? '$' + Number(i.requested_loan_amount).toLocaleString() : '—';
    var ltv = i.requested_loan_amount && i.purchase_price ? ((i.requested_loan_amount / i.purchase_price) * 100).toFixed(1) + '%' : '—';
    var date = new Date(i.submitted_at || i.created_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    var docsUp = DOC_FIELDS.filter(function(f) { return i[f]; }).length;
    var docsMiss = DOC_FIELDS.length - docsUp;
    return '<div style="background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:20px;margin-bottom:12px;cursor:pointer;" onclick="openDrawer(\'' + i.id + '\')">' +
      '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">' +
        '<div><div style="display:flex;align-items:center;gap:10px;margin-bottom:4px;"><span style="font-size:12px;font-weight:700;color:#C9A84C;font-family:monospace;">' + (i.submission_id || '—') + '</span><span style="font-size:10px;padding:3px 10px;border-radius:10px;background:' + c + '22;border:1px solid ' + c + '44;color:' + c + ';font-weight:700;text-transform:uppercase;">' + (i.status || 'draft').replace(/_/g, ' ') + '</span></div>' +
        '<div style="font-size:14px;font-weight:700;color:#fff;">' + (i.property_address || 'No address') + (i.property_city ? ', ' + i.property_city : '') + (i.property_state ? ', ' + i.property_state : '') + '</div>' +
        '<div style="font-size:11px;color:#555;margin-top:2px;">' + (i.property_type || '—') + ' · ' + (i.loan_purpose || '—') + '</div></div>' +
        '<div style="text-align:right;font-size:11px;color:#555;">' + date + '</div></div>' +
      '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;">' +
        '<div style="background:#0d0d0d;border-radius:6px;padding:8px;text-align:center;"><div style="font-size:13px;font-weight:700;color:#C9A84C;">' + loan + '</div><div style="font-size:9px;color:#444;margin-top:1px;">Loan</div></div>' +
        '<div style="background:#0d0d0d;border-radius:6px;padding:8px;text-align:center;"><div style="font-size:13px;font-weight:700;color:' + (i.dscr >= 1.25 ? '#27AE60' : i.dscr >= 1.0 ? '#E67E22' : '#888') + ';">' + (i.dscr || '—') + 'x</div><div style="font-size:9px;color:#444;margin-top:1px;">DSCR</div></div>' +
        '<div style="background:#0d0d0d;border-radius:6px;padding:8px;text-align:center;"><div style="font-size:13px;font-weight:700;color:#C9A84C;">' + ltv + '</div><div style="font-size:9px;color:#444;margin-top:1px;">LTV</div></div>' +
        '<div style="background:#0d0d0d;border-radius:6px;padding:8px;text-align:center;"><div style="font-size:13px;font-weight:700;color:#C9A84C;">' + (i.cap_rate || '—') + '%</div><div style="font-size:9px;color:#444;margin-top:1px;">Cap Rate</div></div></div>' +
      '<div style="display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #1a1a1a;">' +
        '<div><div style="font-size:12px;color:#ddd;font-weight:600;">👤 ' + (i.borrower_name || '—') + '</div>' +
        '<div style="font-size:11px;color:#555;">' + (i.borrower_email || '') + (i.borrower_phone ? ' · ' + i.borrower_phone : '') + '</div>' +
        '<div style="font-size:11px;color:#555;margin-top:2px;">Credit: ' + (i.credit_score_estimate || '—') + ' · NW: ' + (i.net_worth ? '$' + Number(i.net_worth).toLocaleString() : '—') + ' · Liq: ' + (i.liquidity ? '$' + Number(i.liquidity).toLocaleString() : '—') + '</div></div>' +
        '<div style="text-align:right;"><div style="font-size:11px;color:#27AE60;">✅ ' + docsUp + ' uploaded</div>' + (docsMiss > 0 ? '<div style="font-size:11px;color:#E67E22;">○ ' + docsMiss + ' missing</div>' : '') + '</div></div>' +
      '<div style="display:flex;gap:8px;margin-top:12px;" onclick="event.stopPropagation()">' +
        '<button onclick="window.open(SB_URL+\'/functions/v1/commercial-intake?action=get_pdf&id=' + i.id + '\')" style="padding:6px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#888;font-size:11px;cursor:pointer;font-family:inherit;">📄 PDF</button>' +
        '<select onchange="updateStatus(\'' + i.id + '\',this.value);this.selectedIndex=0;" style="padding:5px 10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;color:#888;font-size:11px;font-family:inherit;"><option value="">Status...</option><option value="reviewing">Reviewing</option><option value="needs_docs">Needs Docs</option><option value="submitted_to_lender">To Lender</option><option value="approved">Approved</option><option value="declined">Declined</option></select>' +
        (i.borrower_email ? '<a href="mailto:' + i.borrower_email + '?subject=Re: Commercial Loan ' + (i.submission_id || '') + '" style="padding:6px 12px;background:#C9A84C22;border:1px solid #C9A84C44;border-radius:6px;color:#C9A84C;font-size:11px;text-decoration:none;">📧 Email</a>' : '') +
      '</div></div>';
  }).join('');
}

async function updateStatus(id, status) {
  if (!status) return;
  await fetch(SB_URL + '/rest/v1/commercial_loan_intakes?id=eq.' + id, {
    method: 'PATCH', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ status: status, updated_at: new Date().toISOString() })
  });
  showToast('✅ Status updated');
  loadIntakes();
}

function openDrawer(id) {
  var i = _allIntakes.find(function(x) { return x.id === id; });
  if (!i) return;
  var drawer = document.getElementById('intakeDrawer');
  var overlay = document.getElementById('drawerOverlay');
  document.getElementById('drawerTitle').textContent = (i.submission_id || 'Intake') + ' — ' + (i.property_address || 'Detail');
  var tabs = ['Overview','Financials','Borrower','Documents','Notes'];
  document.getElementById('drawerTabs').innerHTML = tabs.map(function(t, idx) { return '<button class="drawer-tab' + (idx === 0 ? ' active' : '') + '" onclick="showDrawerTab(\'' + t.toLowerCase() + '\',this)">' + t + '</button>'; }).join('');
  renderDrawerTab(i, 'overview');
  drawer.style.display = 'block';
  overlay.style.display = 'block';
  setTimeout(function() { drawer.classList.add('open'); }, 10);
  window._drawerIntake = i;
}

function closeDrawer() {
  var drawer = document.getElementById('intakeDrawer');
  drawer.classList.remove('open');
  setTimeout(function() { drawer.style.display = 'none'; document.getElementById('drawerOverlay').style.display = 'none'; }, 250);
}

function showDrawerTab(tab, btn) {
  document.querySelectorAll('.drawer-tab').forEach(function(b) { b.classList.remove('active'); });
  if (btn) btn.classList.add('active');
  renderDrawerTab(window._drawerIntake, tab);
}

function renderDrawerTab(i, tab) {
  var c = document.getElementById('drawerContent');
  var f = function(v, pre) { return v ? (pre || '') + v : '<span style="color:#333;">—</span>'; };
  var fn = function(v) { return v ? '$' + Number(v).toLocaleString() : '<span style="color:#333;">—</span>'; };
  var row = function(l, v) { return '<div style="display:flex;justify-content:space-between;font-size:12px;padding:6px 0;border-bottom:1px solid #111;"><span style="color:#555;">' + l + '</span><span style="color:#ddd;">' + v + '</span></div>'; };

  if (tab === 'overview') {
    c.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">' +
      '<div>' + row('Submission ID', f(i.submission_id)) + row('Status', '<span style="color:' + (STATUS_COLORS[i.status] || '#555') + ';">' + (i.status || 'draft') + '</span>') + row('Loan Purpose', f(i.loan_purpose)) + row('Property Type', f(i.property_type)) + row('Address', f(i.property_address)) + row('City/State', f(i.property_city) + ', ' + f(i.property_state)) + row('Units', f(i.units)) + row('Sq Ft', f(i.square_feet)) + row('Occupancy', f(i.occupancy_pct, '', '%')) + '</div>' +
      '<div>' + row('Loan Amount', fn(i.requested_loan_amount)) + row('Purchase Price', fn(i.purchase_price)) + row('Est. Value', fn(i.estimated_value)) + row('Down Payment', fn(i.down_payment_equity)) + row('Closing Date', f(i.target_closing_date)) + row('Loan Term', f(i.loan_term_preference)) + row('I/O', i.interest_only_needed ? 'Yes' : 'No') + row('Recourse', f(i.recourse_preference)) + '</div></div>' +
      (i.deal_notes ? '<div style="margin-top:16px;background:#0d0d0d;border-radius:8px;padding:12px;font-size:11px;color:#888;">' + i.deal_notes + '</div>' : '');
  } else if (tab === 'financials') {
    c.innerHTML = row('Monthly Rents', fn(i.monthly_gross_rents)) + row('Other Income', fn(i.other_income)) + row('Monthly Expenses', fn(i.monthly_operating_expenses)) + row('Annual Taxes', fn(i.annual_taxes)) + row('Annual Insurance', fn(i.annual_insurance)) + row('HOA', fn(i.hoa_dues)) +
      '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:16px;">' +
      '<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#C9A84C;">' + fn(i.noi) + '</div><div style="font-size:9px;color:#555;margin-top:2px;">NOI</div></div>' +
      '<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:20px;font-weight:800;color:' + (i.dscr >= 1.25 ? '#27AE60' : '#E67E22') + ';">' + (i.dscr || '—') + 'x</div><div style="font-size:9px;color:#555;margin-top:2px;">DSCR</div></div>' +
      '<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:8px;padding:14px;text-align:center;"><div style="font-size:20px;font-weight:800;color:#C9A84C;">' + (i.cap_rate || '—') + '%</div><div style="font-size:9px;color:#555;margin-top:2px;">Cap Rate</div></div></div>';
  } else if (tab === 'borrower') {
    c.innerHTML = row('Name', f(i.borrower_name)) + row('Email', f(i.borrower_email)) + row('Phone', f(i.borrower_phone)) + row('Entity', f(i.entity_name)) + row('Entity Type', f(i.entity_type)) + row('Credit Score', f(i.credit_score_estimate)) + row('Liquidity', fn(i.liquidity)) + row('Net Worth', fn(i.net_worth)) + row('Years Experience', f(i.years_experience)) + row('Properties Owned', f(i.owned_properties_count)) + row('Similar Projects', f(i.similar_projects_count)) + row('Guarantors', f(i.guarantors)) +
      (i.bankruptcy_foreclosure_history ? '<div style="margin-top:12px;background:#1a0a0a;border:1px solid #3a1a1a;border-radius:8px;padding:10px;font-size:11px;color:#aaa;"><strong style="color:#E74C3C;">History:</strong> ' + i.bankruptcy_foreclosure_history + '</div>' : '') +
      (i.business_name ? '<div style="margin-top:16px;border-top:1px solid #1e1e1e;padding-top:12px;">' + row('Business', f(i.business_name)) + row('Industry', f(i.industry)) + row('Revenue', fn(i.annual_revenue)) + row('Net Income', fn(i.net_income)) + row('Employees', f(i.employees)) + '</div>' : '');
  } else if (tab === 'documents') {
    c.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">' + DOC_FIELDS.map(function(field) {
      var uploaded = i[field];
      return '<div style="padding:10px;background:' + (uploaded ? '#0d1a0d' : '#0d0d0d') + ';border:1px solid ' + (uploaded ? '#1a3a1a' : '#1a1a1a') + ';border-radius:6px;"><div style="font-size:11px;color:' + (uploaded ? '#27AE60' : '#555') + ';font-weight:600;">' + (uploaded ? '✅ ' : '○ ') + (DOC_LABELS[field] || field) + '</div></div>';
    }).join('') + '</div>';
  } else if (tab === 'notes') {
    c.innerHTML = '<div style="margin-bottom:16px;"><label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Internal Notes</label><textarea id="drawerNotes" rows="5" style="width:100%;padding:10px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:12px;box-sizing:border-box;font-family:inherit;resize:vertical;">' + (i.admin_notes || '') + '</textarea></div>' +
      '<div style="margin-bottom:16px;"><label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Assigned Lender</label><input id="drawerLender" value="' + (i.assigned_lender || '') + '" style="width:100%;padding:9px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:12px;box-sizing:border-box;font-family:inherit;"></div>' +
      '<div style="margin-bottom:16px;"><label style="font-size:10px;color:#555;text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:6px;">Status</label><select id="drawerStatus" style="width:100%;padding:9px 12px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;color:#fff;font-size:12px;box-sizing:border-box;font-family:inherit;"><option value="draft">Draft</option><option value="submitted">Submitted</option><option value="reviewing">Reviewing</option><option value="needs_docs">Needs Docs</option><option value="submitted_to_lender">To Lender</option><option value="approved">Approved</option><option value="declined">Declined</option></select></div>' +
      '<button onclick="saveDrawerNotes(\'' + i.id + '\')" style="padding:10px 20px;background:#C9A84C;border:none;border-radius:8px;color:#000;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;">Save Changes</button>';
    setTimeout(function() { var sel = document.getElementById('drawerStatus'); if (sel) sel.value = i.status || 'draft'; }, 10);
  }
}

async function saveDrawerNotes(id) {
  var notes = document.getElementById('drawerNotes')?.value || '';
  var lender = document.getElementById('drawerLender')?.value || '';
  var status = document.getElementById('drawerStatus')?.value || '';
  await fetch(SB_URL + '/rest/v1/commercial_loan_intakes?id=eq.' + id, {
    method: 'PATCH', headers: { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
    body: JSON.stringify({ admin_notes: notes, assigned_lender: lender, status: status, updated_at: new Date().toISOString() })
  });
  showToast('✅ Saved');
  closeDrawer();
  loadIntakes();
}

function exportCSV() {
  window.open(SB_URL + '/functions/v1/commercial-intake?export=csv', '_blank');
}

function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;bottom:24px;right:24px;z-index:9999;background:#c9a84c;color:#1a1a1a;padding:12px 20px;border-radius:10px;font-weight:700;font-size:13px;box-shadow:0 8px 24px rgba(0,0,0,0.4);';
  document.body.appendChild(t);
  setTimeout(function() { t.remove(); }, 3000);
}

document.addEventListener('DOMContentLoaded', function() { loadIntakes(); setInterval(loadIntakes, 120000); });
</script>
</body>
</html>
