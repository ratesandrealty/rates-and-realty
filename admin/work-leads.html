<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Work New Leads — Rates & Realty CRM</title>
<!-- Same authed-client bootstrap + admin guard as the other admin pages -->
<script src="/admin/js/auth-guard.js?v=2026061501"></script>
<script src="/api/env.js?v=2026033003"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/assets/js/sb-auth.js?v=2026061401"></script>
<style>
:root{--gold:#c9a84c;--gold2:#e4b84e;--bg:#0a0a0a;--surface:#111;--surface2:#181818;--border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.12);--text:#fff;--muted:rgba(255,255,255,0.4);--green:#50c878;--red:#f87171;--blue:#60a0ff;--amber:#fb923c}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

.topbar{display:flex;align-items:center;gap:12px;padding:0 20px;height:52px;background:var(--surface);border-bottom:1px solid var(--border)}
.topbar h1{font-size:16px;font-weight:800;color:var(--gold)}
.topbar a.back{color:var(--muted);text-decoration:none;font-size:12px}
.counter{margin-left:auto;font-size:12px;color:var(--muted)}
.counter b{color:var(--gold)}

.stage{max-width:560px;margin:0 auto;padding:34px 18px 60px}
.empty{text-align:center;padding:80px 20px;color:var(--muted)}
.empty .ic{font-size:54px;margin-bottom:14px}

.card{background:var(--surface);border:1px solid var(--border2);border-radius:18px;padding:26px 24px;box-shadow:0 12px 40px rgba(0,0,0,0.5)}
.lead-name{font-size:26px;font-weight:800;letter-spacing:-0.4px}
.lead-meta{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.5}
.lead-meta .dot{opacity:0.4;margin:0 6px}
.score-pill{display:inline-block;background:rgba(201,168,76,0.14);color:var(--gold);border-radius:20px;padding:2px 10px;font-size:12px;font-weight:700}
.phone-btn{display:flex;align-items:center;justify-content:center;gap:10px;margin:20px 0 6px;padding:16px;background:rgba(80,200,120,0.10);border:1px solid rgba(80,200,120,0.4);border-radius:14px;color:var(--green);font-size:24px;font-weight:800;text-decoration:none;letter-spacing:0.5px;transition:all .15s}
.phone-btn:hover{background:rgba(80,200,120,0.18)}
.ai-summary{margin-top:16px;padding:13px 15px;background:rgba(96,160,255,0.06);border:1px solid rgba(96,160,255,0.18);border-radius:10px;font-size:13px;color:rgba(255,255,255,0.75);line-height:1.55}
.ai-summary .lbl{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--blue);font-weight:700;margin-bottom:4px}
.full-link{display:inline-block;margin-top:14px;font-size:12px;color:var(--gold);text-decoration:none}
.full-link:hover{text-decoration:underline}

.note-wrap{margin-top:18px}
.note-wrap label{font-size:10px;text-transform:uppercase;letter-spacing:0.6px;color:var(--muted);display:block;margin-bottom:5px}
.note-wrap textarea{width:100%;min-height:56px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;font-size:13px;padding:10px 12px;outline:none;font-family:inherit;resize:vertical}
.note-wrap textarea:focus{border-color:rgba(201,168,76,0.4)}

.outcomes{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-top:16px}
.oc{padding:12px 8px;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;border:1px solid var(--border2);background:rgba(255,255,255,0.05);color:#fff;transition:all .12s;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:3px}
.oc:hover{border-color:var(--gold);transform:translateY(-1px)}
.oc:disabled{opacity:0.5;cursor:wait}
.oc .k{font-size:10px;color:var(--muted);font-weight:600}
.oc-contacted{background:rgba(80,200,120,0.12);border-color:rgba(80,200,120,0.4);color:var(--green)}
.oc-callback{background:rgba(201,168,76,0.12);border-color:rgba(201,168,76,0.4);color:var(--gold)}
.oc-voicemail{background:rgba(96,160,255,0.10);border-color:rgba(96,160,255,0.35);color:var(--blue)}
.oc-bad{background:rgba(248,113,113,0.10);border-color:rgba(248,113,113,0.35);color:var(--red)}

.cb-panel{margin-top:12px;padding:12px 14px;background:rgba(201,168,76,0.06);border:1px solid rgba(201,168,76,0.3);border-radius:11px;display:none;align-items:center;gap:10px;flex-wrap:wrap}
.cb-panel.open{display:flex}
.cb-panel input{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:13px;padding:8px 10px;outline:none;font-family:inherit}
.cb-panel button{background:var(--gold);color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit}

.btn-ghost{background:rgba(255,255,255,0.06);color:#fff;border:1px solid var(--border2);border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;text-decoration:none}
.btn-gold{background:var(--gold);color:#000;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;text-decoration:none}

#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:#1a1a1a;border:1px solid var(--border2);border-radius:10px;padding:10px 18px;font-size:12px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:9999;max-width:90vw}
#toast.show{opacity:1}
#toast.err{border-color:rgba(248,113,113,0.5);color:var(--red)}
</style>
<link rel="stylesheet" href="/public/css/responsive-global.css">
</head>
<body>

<div class="topbar">
  <a href="people.html" class="back">← Leads</a>
  <h1>📞 Work New Leads</h1>
  <div class="counter" id="counter"></div>
</div>

<div class="stage" id="stage">
  <div class="empty"><div class="ic">📞</div><div>Loading your call queue…</div></div>
</div>

<div id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════════════════════════════
   WORK NEW LEADS — distraction-free calling view. Two RPCs (admin-gated):
     • lead_work_queue({ p_limit })            → prioritized lead array
     • lead_log_outcome({ p_contact_id, p_outcome, p_note, p_followup_at })
   ═══════════════════════════════════════════════════════════════════════════ */
function _authClient(){ return window._supabaseClient; }
async function waitClient(ms){ ms=ms||7000; const s=Date.now(); while(!window._supabaseClient && Date.now()-s<ms){ await new Promise(r=>setTimeout(r,40)); } return window._supabaseClient; }
function showToast(msg, isError){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.toggle('err', !!isError);
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), isError?4200:2400);
}
function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function daysAgo(d){ if(!d) return ''; const n=Math.floor((Date.now()-new Date(d).getTime())/86400000); return n<=0?'today':(n+'d ago'); }

let _queue = [], _worked = 0, _busy = false, _refetched = false;

// The six outcomes shown as buttons (RPC also accepts 'wrong_number').
const OUTCOMES = [
  { key:'contacted',      label:'Contacted',      cls:'oc-contacted', hot:'c' },
  { key:'no_answer',      label:'No Answer',      cls:'',             hot:'n' },
  { key:'left_voicemail', label:'Left Voicemail', cls:'oc-voicemail', hot:'v' },
  { key:'callback',       label:'Callback',       cls:'oc-callback',  hot:'k' },
  { key:'not_interested', label:'Not Interested', cls:'',             hot:'x' },
  { key:'bad_number',     label:'Bad Number',     cls:'oc-bad',       hot:'d' }
];
const HOTKEYS = OUTCOMES.reduce((m,o)=>{ m[o.hot]=o.key; return m; }, {});

function updateCounter(){
  document.getElementById('counter').innerHTML = 'Worked: <b>'+_worked+'</b> &middot; In queue: <b>'+_queue.length+'</b>';
}

async function loadQueue(){
  const stage=document.getElementById('stage');
  stage.innerHTML = '<div class="empty"><div class="ic">📞</div><div>Loading your call queue…</div></div>';
  await waitClient();
  if(!_authClient()){ stage.innerHTML='<div class="empty"><div class="ic">🔒</div><div>Not signed in.</div></div>'; return; }
  try{
    const { data, error } = await _authClient().rpc('lead_work_queue', { p_limit:25 });
    if(error){ showToast('Could not load queue: '+error.message, true); stage.innerHTML='<div class="empty"><div class="ic">⚠️</div><div>Could not load the queue.</div></div>'; return; }
    _queue = data || [];
    renderCurrent();
  }catch(e){ showToast('Could not load queue: '+(e&&e.message||e), true); stage.innerHTML='<div class="empty"><div class="ic">⚠️</div><div>Could not load the queue.</div></div>'; }
}

async function renderCurrent(){
  updateCounter();
  const stage=document.getElementById('stage');
  if(!_queue.length){
    // Refetch once when the in-memory queue empties; if still empty → caught up.
    if(!_refetched){
      _refetched = true;
      const { data } = await _authClient().rpc('lead_work_queue', { p_limit:25 }).catch(()=>({data:[]}));
      _queue = data || [];
      if(_queue.length){ updateCounter(); return renderCurrent(); }
    }
    stage.innerHTML = '<div class="empty"><div class="ic">🎉</div><div style="font-size:18px;font-weight:700;color:#fff;margin-bottom:6px">All caught up</div><div>No new leads left to work right now.</div><div style="margin-top:18px"><a href="people.html" class="btn-ghost">← Back to leads</a></div></div>';
    return;
  }
  _refetched = false; // we have leads again; allow a future empty-refetch
  const L = _queue[0];
  const tel = 'tel:'+String(L.phone||'').replace(/[^0-9+]/g,'');
  const meta = [ L.source, (L.total_score!=null?('Score '+L.total_score):''), L.loan_type, [L.city,L.state].filter(Boolean).join(', ') ]
    .filter(Boolean).map(esc).join('<span class="dot">·</span>');
  stage.innerHTML =
    '<div class="card">'
    + '<div class="lead-name">'+esc(L.name||'(no name)')+(L.total_score!=null?' <span class="score-pill">'+esc(String(L.total_score))+'</span>':'')+'</div>'
    + '<div class="lead-meta">'+meta+'</div>'
    + '<div class="lead-meta" style="margin-top:2px">'+(L.pipeline_status?esc(L.pipeline_status)+'<span class="dot">·</span>':'')+'added '+esc(daysAgo(L.created_at))+(L.last_contact_date?'<span class="dot">·</span>last contact '+esc(daysAgo(L.last_contact_date)):'')+'</div>'
    + (L.phone ? '<a class="phone-btn" href="'+esc(tel)+'">📞 '+esc(L.phone)+'</a>' : '<div class="phone-btn" style="color:var(--muted);background:rgba(255,255,255,0.04);border-color:var(--border)">No phone on file</div>')
    + (L.ai_summary ? '<div class="ai-summary"><div class="lbl">AI summary</div>'+esc(L.ai_summary)+'</div>' : '')
    + '<a class="full-link" href="lead-detail.html?contact_id='+encodeURIComponent(L.contact_id)+'">Open full lead →</a>'
    + '<div class="note-wrap"><label>Note (optional — applies to the outcome you pick)</label><textarea id="noteInput" placeholder="What happened on the call…"></textarea></div>'
    + '<div class="outcomes">'+OUTCOMES.map(o=>'<button type="button" class="oc '+o.cls+'" onclick="logOutcome(\''+o.key+'\')">'+esc(o.label)+'<span class="k">('+o.hot+')</span></button>').join('')+'</div>'
    + '<div class="cb-panel" id="cbPanel"><span style="font-size:12px;color:var(--muted)">Callback at</span><input type="datetime-local" id="cbWhen"><button type="button" onclick="confirmCallback()">Schedule callback</button></div>'
    + '</div>';
}

function _note(){ const n=document.getElementById('noteInput'); return n && n.value.trim() ? n.value.trim() : null; }

async function logOutcome(outcome){
  if(_busy) return;
  if(outcome==='callback'){
    // Reveal the date/time picker; the actual log happens in confirmCallback().
    const p=document.getElementById('cbPanel'); const w=document.getElementById('cbWhen');
    if(w && !w.value){ const d=new Date(Date.now()+86400000); d.setMinutes(d.getMinutes()-d.getTimezoneOffset()); w.value=d.toISOString().slice(0,16); }
    if(p){ p.classList.add('open'); } if(w) w.focus();
    return;
  }
  await _submit(outcome, null);
}

async function confirmCallback(){
  const w=document.getElementById('cbWhen');
  const v = w && w.value ? w.value : '';
  if(!v){ showToast('Pick a callback date/time first.', true); if(w) w.focus(); return; }
  await _submit('callback', new Date(v).toISOString());
}

async function _submit(outcome, followupIso){
  if(_busy || !_queue.length) return;
  _busy = true;
  document.querySelectorAll('.oc').forEach(b=>b.disabled=true);
  const L = _queue[0];
  try{
    const args = { p_contact_id:L.contact_id, p_outcome:outcome, p_note:_note(), p_followup_at:(outcome==='callback'?followupIso:null) };
    const { data, error } = await _authClient().rpc('lead_log_outcome', args);
    if(error){ showToast('Could not log: '+error.message, true); _busy=false; document.querySelectorAll('.oc').forEach(b=>b.disabled=false); return; }
    if(data && data.ok===false){ showToast('Could not log this outcome.', true); _busy=false; document.querySelectorAll('.oc').forEach(b=>b.disabled=false); return; }
    _queue.shift();
    _worked++;
    _busy = false;
    await renderCurrent();
  }catch(e){ showToast('Could not log: '+(e&&e.message||e), true); _busy=false; document.querySelectorAll('.oc').forEach(b=>b.disabled=false); }
}

// Keyboard shortcuts for fast dialing (ignored while typing in a field).
document.addEventListener('keydown', function(e){
  const tag=(document.activeElement&&document.activeElement.tagName||'').toLowerCase();
  if(tag==='textarea'||tag==='input'||e.metaKey||e.ctrlKey||e.altKey) return;
  const k=e.key.toLowerCase();
  if(HOTKEYS[k] && _queue.length){ e.preventDefault(); logOutcome(HOTKEYS[k]); }
});

loadQueue();
</script>
</body>
</html>
