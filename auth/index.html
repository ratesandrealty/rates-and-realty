<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-03P16TMWM8"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-03P16TMWM8');
  </script>
  <title>Borrower Login | Rates & Realty</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/components/styles.css">
</head>
<body>
  <div id="site-header"></div>
  <main class="section">
    <div class="container auth-layout">
      <section>
        <p class="kicker">Secure Portal</p>
        <h1>Borrower sign in and account creation.</h1>
        <p class="section-copy">This area uses Supabase Auth. Borrowers can create an account, sign in, and continue their application from the dashboard.</p>
      </section>
      <section class="panel">
        <div class="tab-row">
          <button class="tab-button is-active" type="button" data-auth-tab="login">Login</button>
          <button class="tab-button" type="button" data-auth-tab="signup">Sign Up</button>
        </div>
        <form id="login-form" class="stack-form" novalidate>
          <label class="field"><span>Email</span><input name="email" type="email" required></label>
          <label class="field"><span>Password</span><input name="password" type="password" minlength="6" required></label>
          <p id="login-message" class="form-message" aria-live="polite"></p>
          <button class="btn btn-primary" type="submit">Sign In</button>
        </form>
        <form id="signup-form" class="stack-form is-hidden" novalidate>
          <div class="input-row">
            <label class="field"><span>First Name</span><input name="firstName" type="text" required></label>
            <label class="field"><span>Last Name</span><input name="lastName" type="text" required></label>
          </div>
          <label class="field"><span>Email</span><input name="email" type="email" required></label>
          <label class="field"><span>Password</span><input name="password" type="password" minlength="6" required></label>
          <label class="field"><span>Phone</span><input name="phone" type="tel"></label>
          <p id="signup-message" class="form-message" aria-live="polite"></p>
          <button class="btn btn-primary" type="submit">Create Account</button>
        </form>
      </section>
    </div>
  </main>
  <div id="site-footer"></div>
  <script type="module" src="/components/layout.js"></script>
  <script type="module" src="/components/auth-page.js"></script>
</body>
</html>
