<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showing Requests | Rates &amp; Realty CRM</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0a0a0a;color:#eee;font-family:'Segoe UI',Arial,sans-serif;min-height:100vh;display:flex}
a{text-decoration:none;color:inherit}
#sidebar{width:220px;flex-shrink:0;background:#0d0d0d;border-right:1px solid #1a1a1a;display:flex;flex-direction:column;height:100vh;position:sticky;top:0;overflow-y:auto}
.sb-logo{display:flex;align-items:center;gap:10px;padding:18px 16px;border-bottom:1px solid #1a1a1a;flex-shrink:0}
.sb-logo-mark{width:36px;height:36px;background:linear-gradient(135deg,#C9A84C,#8A6A1E);border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;color:#000;flex-shrink:0}
.sb-logo-text{font-size:.88rem;font-weight:700;color:#C9A84C;line-height:1.2}
.sb-logo-sub{font-size:.6rem;color:#444;text-transform:uppercase;letter-spacing:.1em}
.sb-section{padding:12px 10px 4px;font-size:.62rem;font-weight:700;color:#333;text-transform:uppercase;letter-spacing:.1em}
.sb-link{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:8px;font-size:.82rem;color:#666;cursor:pointer;transition:all .15s;margin:1px 4px}
.sb-link:hover{background:#161616;color:#aaa}
.sb-link.active{background:rgba(201,168,76,.1);color:#C9A84C}
.sb-link i{width:16px;text-align:center;font-size:.8rem}
.sb-bottom{margin-top:auto;padding:12px;border-top:1px solid #1a1a1a}
.sb-bottom a{display:flex;align-items:center;gap:8px;padding:8px 10px;font-size:.78rem;color:#555;border-radius:7px}
.sb-bottom a:hover{color:#aaa;background:#111}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}
.topbar{background:#0d0d0d;border-bottom:1px solid #1a1a1a;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-shrink:0}
.topbar h1{font-size:1rem;font-weight:700;color:#eee}
.topbar-sub{font-size:.73rem;color:#444;margin-left:12px}
.topbar-right{display:flex;align-items:center;gap:8px}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;padding:16px 24px 0}
.stat-card{background:#111;border:1px solid #1a1a1a;border-radius:10px;padding:12px 16px;display:flex;align-items:center;gap:12px}
.stat-icon{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.9rem;flex-shrink:0}
.stat-val{font-size:1.4rem;font-weight:800;color:#eee;line-height:1}
.stat-lbl{font-size:.67rem;color:#555;text-transform:uppercase;letter-spacing:.07em;margin-top:2px}
.toolbar{display:flex;align-items:center;gap:10px;padding:14px 24px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px;max-width:320px}
.search-wrap i{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:#444;font-size:.8rem}
.search-wrap input{width:100%;background:#111;border:1px solid #1e1e1e;border-radius:8px;padding:8px 12px 8px 34px;color:#eee;font-size:.82rem;outline:none}
.search-wrap input:focus{border-color:#C9A84C}
.toolbar select{background:#111;border:1px solid #1e1e1e;color:#888;border-radius:8px;padding:8px 12px;font-size:.8rem;outline:none;cursor:pointer}
.btn{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;font-size:.8rem;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-gold{background:#C9A84C;color:#000}.btn-gold:hover{background:#e8c96a}
.btn-outline{background:#111;border:1px solid #2a2a2a;color:#888}.btn-outline:hover{border-color:#C9A84C;color:#C9A84C}
.count-badge{background:rgba(201,168,76,.1);color:#C9A84C;border-radius:20px;padding:4px 12px;font-size:.75rem;font-weight:700;margin-left:auto}
.table-wrap{padding:0 24px 24px;flex:1}
.table-container{background:#111;border:1px solid #1a1a1a;border-radius:12px;overflow:hidden}
table{width:100%;border-collapse:collapse}
th{background:#0d0d0d;padding:10px 14px;text-align:left;font-size:.68rem;color:#444;font-weight:700;text-transform:uppercase;letter-spacing:.08em;border-bottom:1px solid #1a1a1a;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{color:#888}
td{padding:11px 14px;border-bottom:1px solid #111;font-size:.8rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#0f0f0f}
.td-name{font-weight:600;color:#ddd}
.td-sub{font-size:.7rem;color:#555;margin-top:2px}
.td-id{font-family:monospace;font-size:.72rem;color:#C9A84C;background:rgba(201,168,76,.08);padding:2px 7px;border-radius:6px}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:20px;font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
.badge-pending{background:rgba(201,168,76,.12);color:#C9A84C}
.badge-confirmed{background:rgba(34,197,94,.12);color:#22c55e}
.badge-completed{background:rgba(100,100,100,.1);color:#888}
.badge-cancelled{background:rgba(239,68,68,.1);color:#ef4444}
.status-select{background:#1a1a1a;border:1px solid #2a2a2a;color:#888;border-radius:6px;padding:4px 7px;font-size:.7rem;outline:none;cursor:pointer}
.expand-row td{background:#0d0d0d;padding:0}
.expand-inner{padding:14px 20px 14px 52px;border-top:1px solid #1a1a1a}
.home-cards{display:flex;gap:8px;flex-wrap:wrap}
.home-card{display:flex;align-items:center;gap:8px;background:#111;border:1px solid #1a1a1a;border-radius:8px;padding:8px 10px;max-width:280px}
.home-card img{width:50px;height:40px;object-fit:cover;border-radius:5px;flex-shrink:0}
.home-card-price{font-size:.82rem;font-weight:700;color:#C9A84C}
.home-card-addr{font-size:.72rem;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px}
.home-card-specs{font-size:.67rem;color:#555}
.empty{text-align:center;padding:60px 20px;color:#333}
.empty i{font-size:2.5rem;display:block;margin-bottom:14px;color:#1e1e1e}
@media(max-width:900px){#sidebar{width:60px}.sb-logo-text,.sb-logo-sub,.sb-link span,.sb-section{display:none}.sb-link{justify-content:center;padding:10px 0}.sb-link i{width:auto}.stats-row{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.stats-row{grid-template-columns:1fr 1fr}.table-wrap{padding:0 12px 16px}.topbar{padding:0 14px}}
</style>
</head>
<body>
<nav id="sidebar">
  <div class="sb-logo"><div class="sb-logo-mark">R&R</div><div><div class="sb-logo-text">Rates &amp; Realty</div><div class="sb-logo-sub">Admin CRM</div></div></div>
  <div class="sb-section">CRM</div>
  <a class="sb-link" href="/admin/people.html"><i class="fas fa-users"></i><span>People</span></a>
  <a class="sb-link" href="/admin/pipeline.html"><i class="fas fa-chart-bar"></i><span>Pipeline</span></a>
  <a class="sb-link" href="/admin/people.html"><i class="fas fa-address-book"></i><span>People</span></a>
  <a class="sb-link" href="/admin/reports.html"><i class="fas fa-chart-line"></i><span>Reports</span></a>
  <div class="sb-section">Real Estate</div>
  <a class="sb-link active" href="/admin/showings.html"><i class="fas fa-calendar-check"></i><span>Showings</span></a>
  <a class="sb-link" href="/public/search-homes.html" target="_blank"><i class="fas fa-search"></i><span>Search Homes</span></a>
  <div class="sb-bottom">
    <a href="/" target="_blank"><i class="fas fa-arrow-left"></i><span>Back to Site</span></a>
  </div>
</nav>
<div id="main">
  <div class="topbar">
    <div style="display:flex;align-items:center"><h1><i class="fas fa-calendar-check" style="color:#C9A84C;margin-right:8px"></i>Showing Requests</h1><span class="topbar-sub">All scheduled showing requests</span></div>
    <div class="topbar-right">
      <button class="btn btn-outline" onclick="loadShowings()"><i class="fas fa-sync-alt"></i> Refresh</button>
      <a href="/public/search-homes.html" target="_blank" class="btn btn-gold"><i class="fas fa-external-link-alt"></i> Search Page</a>
    </div>
  </div>
  <div class="stats-row">
    <div class="stat-card"><div class="stat-icon" style="background:rgba(201,168,76,.1)"><i class="fas fa-list" style="color:#C9A84C"></i></div><div><div class="stat-val" id="statTotal">—</div><div class="stat-lbl">Total</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(201,168,76,.15)"><i class="fas fa-bell" style="color:#C9A84C"></i></div><div><div class="stat-val" id="statPending">—</div><div class="stat-lbl">Pending</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(34,197,94,.1)"><i class="fas fa-check-circle" style="color:#22c55e"></i></div><div><div class="stat-val" id="statConfirmed">—</div><div class="stat-lbl">Confirmed</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(100,100,100,.1)"><i class="fas fa-flag-checkered" style="color:#888"></i></div><div><div class="stat-val" id="statCompleted">—</div><div class="stat-lbl">Completed</div></div></div>
    <div class="stat-card"><div class="stat-icon" style="background:rgba(239,68,68,.1)"><i class="fas fa-times-circle" style="color:#ef4444"></i></div><div><div class="stat-val" id="statCancelled">—</div><div class="stat-lbl">Cancelled</div></div></div>
  </div>
  <div class="toolbar">
    <div class="search-wrap"><i class="fas fa-search"></i><input type="text" id="searchInput" placeholder="Search name, email, property..." oninput="renderTable()"></div>
    <select id="statusFilter" onchange="renderTable()"><option value="">All Statuses</option><option value="pending">Pending</option><option value="confirmed">Confirmed</option><option value="completed">Completed</option><option value="cancelled">Cancelled</option></select>
    <select id="dateFilter" onchange="renderTable()"><option value="">All Dates</option><option value="today">Today</option><option value="week">This Week</option><option value="month">This Month</option></select>
    <span class="count-badge" id="countBadge">Loading...</span>
  </div>
  <div class="table-wrap"><div class="table-container">
    <table><thead><tr>
      <th onclick="sortBy('name')">Name</th><th>Contact</th><th>ID</th>
      <th onclick="sortBy('property_address')">Property</th><th onclick="sortBy('preferred_date')">Date</th>
      <th>Time</th><th onclick="sortBy('status')">Status</th><th>Homes</th><th>Actions</th>
    </tr></thead>
    <tbody id="showingsBody"><tr><td colspan="9" class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></td></tr></tbody>
    </table>
  </div></div>
</div>

<script>
var SB='https://ljywhvbmsibwnssxpesh.supabase.co';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqeXdodmJtc2lid25zc3hwZXNoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDM2MjgzNDIsImV4cCI6MjA1OTIwNDM0Mn0.JEMDMlSo1OSmOLJnnqP3wZq0GFjDfMqcHEHGY-rVfI4';
var allShowings=[],batches={},sortKey='created_at',sortDir=-1;

async function loadShowings(){
  document.getElementById('showingsBody').innerHTML='<tr><td colspan="9" class="empty"><i class="fas fa-spinner fa-spin"></i><p>Loading...</p></td></tr>';
  try{
    var res=await fetch('https://ljywhvbmsibwnssxpesh.supabase.co/functions/v1/portal-data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'get_all_showings'})});
    var result=await res.json();
    allShowings=result.showings||[];
  }catch(e){allShowings=[];}
  batches={};
  allShowings.forEach(function(s){var k=s.batch_id||s.id;if(!batches[k])batches[k]={meta:s,items:[]};batches[k].items.push(s);});
  updateStats();
  renderTable();
}

function updateStats(){
  var b=Object.values(batches);
  document.getElementById('statTotal').textContent=b.length;
  document.getElementById('statPending').textContent=b.filter(function(x){return x.meta.status==='pending'||x.meta.status==='new';}).length;
  document.getElementById('statConfirmed').textContent=b.filter(function(x){return x.meta.status==='confirmed';}).length;
  document.getElementById('statCompleted').textContent=b.filter(function(x){return x.meta.status==='completed';}).length;
  document.getElementById('statCancelled').textContent=b.filter(function(x){return x.meta.status==='cancelled';}).length;
}

function renderTable(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var sf=document.getElementById('statusFilter').value;
  var df=document.getElementById('dateFilter').value;
  var today=new Date();today.setHours(0,0,0,0);
  var bList=Object.values(batches).filter(function(b){
    var m=b.meta;
    var name=(m.name||'').toLowerCase();
    var email=(m.email||'').toLowerCase();
    var addr=(m.property_address||'').toLowerCase();
    var phone=(m.phone||'').toLowerCase();
    if(q&&name.indexOf(q)<0&&email.indexOf(q)<0&&addr.indexOf(q)<0&&phone.indexOf(q)<0)return false;
    if(sf&&m.status!==sf)return false;
    if(df&&m.preferred_date){
      var d=new Date(m.preferred_date+'T12:00:00');
      if(df==='today'&&d.toDateString()!==today.toDateString())return false;
      if(df==='week'){var we=new Date(today);we.setDate(today.getDate()+7);if(d<today||d>we)return false;}
      if(df==='month'&&(d.getMonth()!==today.getMonth()||d.getFullYear()!==today.getFullYear()))return false;
    }
    return true;
  });
  bList.sort(function(a,b){var av=a.meta[sortKey]||'';var bv=b.meta[sortKey]||'';return av<bv?sortDir:av>bv?-sortDir:0;});
  document.getElementById('countBadge').textContent=bList.length+' showing'+(bList.length!==1?'s':'');
  if(!bList.length){document.getElementById('showingsBody').innerHTML='<tr><td colspan="9" class="empty"><i class="fas fa-calendar-times"></i><p>No showings found.</p></td></tr>';return;}
  var sm={pending:'badge-pending',confirmed:'badge-confirmed',completed:'badge-completed',cancelled:'badge-cancelled',new:'badge-pending'};
  document.getElementById('showingsBody').innerHTML=bList.map(function(b){
    var m=b.meta;var name=m.name||'Unknown';var email=m.email||'—';var phone=m.phone||'';
    var uid=m.borrower_id||m.crm_id||'';var status=m.status||'pending';
    var ds=m.preferred_date?new Date(m.preferred_date+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'—';
    var bid=m.batch_id||m.id;
    return '<tr>'
      +'<td><div class="td-name">'+name+'</div><div class="td-sub">'+phone+'</div></td>'
      +'<td><div style="font-size:.78rem;color:#888">'+email+'</div></td>'
      +'<td>'+(uid?'<span class="td-id">'+uid+'</span>':'<span style="color:#333">—</span>')+'</td>'
      +'<td style="max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#aaa">'+(m.property_address||'—')+'<div class="td-sub">'+(m.property_city||'')+'</div></td>'
      +'<td style="white-space:nowrap">'+ds+'</td>'
      +'<td style="font-size:.78rem">'+(m.exact_time?'<span style="color:#C9A84C;font-weight:600">'+m.exact_time+'</span>'+(m.preferred_time?'<div style="font-size:.68rem;color:#444">'+m.preferred_time+'</div>':''):(m.preferred_time||'<span style="color:#888">—</span>'))+'</td>'
      +'<td><span class="badge '+(sm[status]||'badge-pending')+'">'+status+'</span></td>'
      +'<td><button onclick="toggleExpand(\''+bid+'\')" style="background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.2);color:#C9A84C;border-radius:6px;padding:4px 9px;font-size:.72rem;cursor:pointer">'+b.items.length+' <i class="fas fa-chevron-down" id="chev-'+bid+'" style="font-size:.6rem"></i></button></td>'
      +'<td><div style="display:flex;gap:4px"><button onclick="confirmBatch(\''+bid+'\')" title="Confirm" style="width:32px;height:32px;background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e;border-radius:7px;font-size:.85rem;cursor:pointer">✓</button><button onclick="updateBatchStatus(\''+bid+'\',\'pending\')" title="Pending" style="width:32px;height:32px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#C9A84C;border-radius:7px;font-size:.85rem;cursor:pointer">⏳</button><button onclick="updateBatchStatus(\''+bid+'\',\'cancelled\')" title="Deny" style="width:32px;height:32px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:7px;font-size:.85rem;cursor:pointer">✕</button></div></td>'
      +'</tr>'
      +'<tr id="expand-'+bid+'" class="expand-row" style="display:none"><td colspan="9">'
      +'<div style="padding:16px 24px 20px;border-top:1px solid #1a1a1a;background:#0a0a0a">'
      +'<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px">'
      +'<div style="font-size:.7rem;color:#555">'+b.items.length+' propert'+(b.items.length!==1?'ies':'y')+' &bull; Drag to reorder tour stops</div>'
      +'<div style="display:flex;gap:7px;flex-wrap:wrap;align-items:center">'
      +'<div style="display:flex;align-items:center;gap:7px;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:8px;padding:5px 10px"><label style="font-size:.68rem;color:#555;white-space:nowrap">First Stop:</label><input type="time" id="exactTime_'+bid+'" value="'+(m.exact_time?convertTo24hr(m.exact_time):'')+'" onchange="saveExactTime(\''+bid+'\',this.value)" style="background:transparent;border:none;color:#C9A84C;font-size:.8rem;font-weight:700;outline:none;cursor:pointer;width:90px"></div>'
      +(buildMapsUrl(b.items)?'<a href="'+buildMapsUrl(b.items)+'" target="_blank" style="display:flex;align-items:center;gap:5px;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.25);color:#C9A84C;text-decoration:none;border-radius:7px;padding:6px 12px;font-size:.75rem;font-weight:700">🗺 Route</a>':'')
      +'<button id="emailBtn_'+bid+'" onclick="sendConfirmationEmail(\''+bid+'\')" style="display:flex;align-items:center;gap:5px;background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:#60a5fa;border-radius:7px;padding:6px 12px;font-size:.75rem;font-weight:700;cursor:pointer">✉ Email</button>'
      +'</div></div>'
      +(m.notes?'<div style="font-size:.75rem;color:#555;background:#111;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-style:italic">"'+m.notes+'"</div>':'')
      +'<div id="cardsGrid_'+bid+'" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px" ondragover="event.preventDefault()" ondrop="dropCard(event,\''+bid+'\')">'
      +b.items.map(function(item,i){
        return '<div draggable="true" id="card_'+item.id+'" data-id="'+item.id+'" data-batch="'+bid+'" ondragstart="dragMoved=false;dragCard(event)" ondragend="this.style.opacity=\'1\'" onmousedown="dragMoved=false" ondrag="dragMoved=true" style="background:#111;border:1px solid #1e1e1e;border-radius:10px;overflow:hidden;cursor:grab;transition:all .2s" onmouseover="this.style.borderColor=\'rgba(201,168,76,.4)\'" onmouseout="this.style.borderColor=\'#1e1e1e\'">'
          +'<div style="position:relative">'
          +(item.property_photo?'<img src="'+item.property_photo+'" style="width:100%;height:140px;object-fit:cover;display:block" onerror="this.style.display=\'none\'">':'<div style="width:100%;height:90px;background:#1a1a1a;display:flex;align-items:center;justify-content:center;font-size:2rem">🏠</div>')
          +'<div data-badge style="position:absolute;top:8px;left:8px;background:#C9A84C;color:#000;font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:10px;z-index:2">#'+(i+1)+'</div>'
          +'<div style="position:absolute;top:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.3);font-size:.7rem;letter-spacing:3px" title="Drag to reorder">⠿⠿</div>'
          +'<button onclick="event.stopPropagation();trashHome(\''+item.id+'\',\''+bid+'\')" style="position:absolute;top:7px;right:7px;background:#000c;border:1px solid #444;color:#888;border-radius:6px;width:26px;height:26px;font-size:.72rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2" title="Remove">🗑</button>'
          +'</div>'
          +'<div style="padding:11px 12px;cursor:pointer" onclick="if(!dragMoved){openHomeModal(\''+item.id+'\',\''+bid+'\')}">'
          +'<div style="font-size:.85rem;font-weight:700;color:#eee;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+(item.property_address||'—')+'</div>'
          +'<div style="font-size:.73rem;color:#555;margin-bottom:6px">'+(item.property_city||'')+', CA</div>'
          +'<div style="display:flex;align-items:center;justify-content:space-between">'
          +(item.property_price?'<span style="font-size:.9rem;font-weight:800;color:#C9A84C">$'+Number(item.property_price).toLocaleString()+'</span>':'<span></span>')
          +'<span style="font-size:.7rem;color:#444">'+(item.property_beds||'?')+'bd · '+(item.property_baths||'?')+'ba</span>'
          +'</div>'
          +(item.listing_agent_name?'<div style="font-size:.65rem;color:#333;margin-top:5px;padding-top:5px;border-top:1px solid #1a1a1a">'+item.listing_agent_name+'</div>':'')
          +'</div></div>';
      }).join('')+'</div></div></td></tr>';
  }).join('');
}

function toggleExpand(bid){var row=document.getElementById('expand-'+bid);var chev=document.getElementById('chev-'+bid);if(!row)return;var open=row.style.display!=='none';row.style.display=open?'none':'table-row';if(chev)chev.className=open?'fas fa-chevron-down':'fas fa-chevron-up';}

async function confirmBatch(bid){
  await updateBatchStatus(bid,'confirmed');
  showToast('✓ Confirmed! Use ✉ Email Client to send tour details.');
}

async function updateBatchStatus(bid,s){
  if(!s||!bid)return;
  await fetch('https://ljywhvbmsibwnssxpesh.supabase.co/functions/v1/portal-data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'update_showing_status',batch_id:bid,status:s})});
  if(batches[bid])batches[bid].meta.status=s;
  updateStats();renderTable();
}

async function sendConfirmationEmail(bid){
  var batch=batches[bid];if(!batch||!batch.meta.email){showToast('No email for this borrower','error');return;}
  var btn=document.getElementById('emailBtn_'+bid);if(btn){btn.disabled=true;btn.innerHTML='⏳ Sending...';}
  try{
    var res=await fetch('https://ljywhvbmsibwnssxpesh.supabase.co/functions/v1/showing-actions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'send_confirmation_email',batch_id:bid})});
    var result=await res.json();console.log('Email result:',result);
    if(result.emailed){
      var smsMsg=result.sms_sent?' + SMS sent!':' (SMS: '+(result.sms_error||'not configured')+')';
      showToast('✓ Email sent to '+(result.to||email)+smsMsg+' — '+(result.homes_included||batch.items.length)+' homes + Maps route!');
      if(btn){btn.innerHTML='✓ Sent';btn.style.background='rgba(34,197,94,.15)';btn.style.borderColor='rgba(34,197,94,.3)';btn.style.color='#22c55e';}
    }else{
      var errMsg=result.email_error||result.error||'Unknown';
      if(!result.ml_key_present){showToast('MailerLite key missing. Add MAILERLITE_API_KEY in Supabase > Edge Functions > Secrets','error');}
      else{showToast('Email failed: '+errMsg,'error');}
      if(btn){btn.disabled=false;btn.innerHTML='✉ Email';}
    }
  }catch(e){showToast('Error: '+e.message,'error');if(btn){btn.disabled=false;btn.innerHTML='✉ Email';}}
}

async function trashHome(showingId,batchId){
  await fetch('https://ljywhvbmsibwnssxpesh.supabase.co/functions/v1/portal-data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'remove_showing',showing_id:showingId})});
  if(batches[batchId]){batches[batchId].items=batches[batchId].items.filter(function(i){return i.id!==showingId;});if(!batches[batchId].items.length)delete batches[batchId];}
  updateStats();renderTable();showToast('Home removed.');
}

var dragSrcId=null;var dragMoved=false;
function dragCard(e){dragSrcId=e.currentTarget.dataset.id;e.currentTarget.style.opacity='0.4';e.dataTransfer.effectAllowed='move';e.dataTransfer.setData('text/plain',dragSrcId);}
function dropCard(e,batchId){
  e.preventDefault();var target=e.target.closest('[draggable]');
  if(!target||target.dataset.id===dragSrcId){document.querySelectorAll('[draggable]').forEach(function(el){el.style.opacity='1';});return;}
  var grid=document.getElementById('cardsGrid_'+batchId);if(!grid)return;
  var cards=Array.from(grid.querySelectorAll('[draggable]'));
  var srcIdx=cards.findIndex(function(c){return c.dataset.id===dragSrcId;});
  var tgtIdx=cards.findIndex(function(c){return c===target;});
  if(srcIdx<0||tgtIdx<0)return;
  var srcEl=cards[srcIdx];
  if(srcIdx<tgtIdx)grid.insertBefore(srcEl,target.nextSibling);else grid.insertBefore(srcEl,target);
  srcEl.style.opacity='1';
  var newCards=Array.from(grid.querySelectorAll('[draggable]'));
  newCards.forEach(function(card,i){var badge=card.querySelector('[data-badge]');if(badge)badge.textContent='#'+(i+1);});
  if(batches[batchId]){var itemsMap={};batches[batchId].items.forEach(function(it){itemsMap[it.id]=it;});batches[batchId].items=newCards.map(function(c){return itemsMap[c.dataset.id];}).filter(Boolean);}
  showToast('Order saved — #1 is first stop');
}

function buildMapsUrl(homes){
  var addrs=homes.filter(function(h){return h.property_address;}).map(function(h){return encodeURIComponent((h.property_address+' '+(h.property_city||'')+' CA').trim());});
  if(!addrs.length)return'';
  if(addrs.length===1)return'https://www.google.com/maps/search/?api=1&query='+addrs[0];
  var url='https://www.google.com/maps/dir/?api=1&origin='+addrs[0]+'&destination='+addrs[addrs.length-1];
  if(addrs.length>2)url+='&waypoints='+addrs.slice(1,-1).join('|');
  return url+'&travelmode=driving';
}

function openHomeModal(showingId,batchId){
  var batch=batches[batchId];if(!batch)return;

    +'<div style="padding:18px 22px">'
    +'<div style="margin-bottom:14px"><h2 style="margin:0 0 4px;font-size:1.15rem;font-weight:800;color:#fff">'+(item.property_address||'—')+'</h2><div style="font-size:.82rem;color:#666">'+(item.property_city||'')+', CA</div>'+(item.property_price?'<div style="font-size:1.5rem;font-weight:800;color:#C9A84C;margin-top:8px">$'+Number(item.property_price).toLocaleString()+'</div>':'')+'</div>'
    +'<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px">'
    +(item.property_beds?'<div style="background:#1a1a1a;border-radius:8px;padding:10px 8px;text-align:center"><div style="font-size:1.1rem;font-weight:800;color:#eee">'+item.property_beds+'</div><div style="font-size:.62rem;color:#555;margin-top:2px;text-transform:uppercase">Beds</div></div>':'')
    +(item.property_baths?'<div style="background:#1a1a1a;border-radius:8px;padding:10px 8px;text-align:center"><div style="font-size:1.1rem;font-weight:800;color:#eee">'+item.property_baths+'</div><div style="font-size:.62rem;color:#555;margin-top:2px;text-transform:uppercase">Baths</div></div>':'')
    +(item.property_sqft?'<div style="background:#1a1a1a;border-radius:8px;padding:10px 8px;text-align:center"><div style="font-size:1rem;font-weight:800;color:#eee">'+Number(item.property_sqft).toLocaleString()+'</div><div style="font-size:.62rem;color:#555;margin-top:2px;text-transform:uppercase">Sq Ft</div></div>':'')
    +'</div>'
    +(item.listing_agent_name?'<div style="background:#1a1a1a;border-radius:8px;padding:12px 14px;margin-bottom:12px"><div style="font-size:.65rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Listing Agent</div><div style="font-size:.88rem;font-weight:600;color:#ddd">'+item.listing_agent_name+'</div><div style="display:flex;gap:12px;margin-top:5px;flex-wrap:wrap">'+(item.listing_agent_phone?'<a href="tel:'+item.listing_agent_phone+'" style="font-size:.78rem;color:#C9A84C;text-decoration:none">📞 '+item.listing_agent_phone+'</a>':'')+(item.listing_agent_email?'<a href="mailto:'+item.listing_agent_email+'" style="font-size:.78rem;color:#C9A84C;text-decoration:none">✉ '+item.listing_agent_email+'</a>':'')+'</div></div>':'')
    +'<div style="background:#1a1a1a;border-radius:8px;padding:12px 14px;margin-bottom:16px"><div style="font-size:.65rem;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px">Borrower</div><div style="font-size:.85rem;font-weight:600;color:#ddd">'+(m.name||'—')+'</div><div style="font-size:.76rem;color:#666;margin-top:2px">'+(m.email||'')+(m.phone?' · '+m.phone:'')+'</div>'+(m.borrower_id?'<div style="font-size:.7rem;color:#C9A84C;font-family:monospace;margin-top:3px">'+m.borrower_id+'</div>':'')+'</div>'
    +'<div style="display:flex;gap:8px;flex-wrap:wrap"><a href="'+mapsLink+'" target="_blank" style="flex:1;min-width:100px;display:flex;align-items:center;justify-content:center;gap:6px;background:rgba(201,168,76,.12);border:1px solid rgba(201,168,76,.3);color:#C9A84C;text-decoration:none;border-radius:8px;padding:11px 14px;font-size:.8rem;font-weight:700">📍 Maps</a><a href="'+directionsLink+'" target="_blank" style="flex:1;min-width:100px;display:flex;align-items:center;justify-content:center;gap:6px;background:#1a1a1a;border:1px solid #2a2a2a;color:#888;text-decoration:none;border-radius:8px;padding:11px 14px;font-size:.8rem;font-weight:700">🗺 Directions</a><button onclick="document.getElementById(\'homeModal\').remove();trashHome(\''+item.id+'\',\''+batchId+'\')" style="display:flex;align-items:center;justify-content:center;gap:5px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:11px 14px;font-size:.8rem;font-weight:700;cursor:pointer">🗑 Trash</button></div>'

function showToast(msg){
  var old=document.getElementById('showToast');if(old)old.remove();
  var t=document.createElement('div');t.id='showToast';
  t.style.cssText='position:fixed;bottom:24px;right:24px;z-index:9999;background:#0a1a0a;border:1px solid rgba(34,197,94,.4);color:#22c55e;border-radius:10px;padding:12px 18px;font-size:.82rem;font-weight:600;box-shadow:0 8px 24px rgba(0,0,0,.5);max-width:380px';
  t.textContent=msg;document.body.appendChild(t);setTimeout(function(){t.remove();},4000);
}

function convertTo24hr(t){if(!t)return'';if(t.indexOf(':')<0)return t;if(t.indexOf('M')<0)return t;var p=t.split(' ');var hm=p[0].split(':');var h=parseInt(hm[0]);var m=hm[1]||'00';if(h===12)h=0;if(p[1]==='PM')h+=12;return String(h).padStart(2,'0')+':'+m;}
function convertTo12hr(t){if(!t)return'';var p=t.split(':');var h=parseInt(p[0]);var ampm=h>=12?'PM':'AM';var h12=h%12||12;return h12+':'+p[1]+' '+ampm;}
async function saveExactTime(bid,time24){
  var time12=convertTo12hr(time24);
  await fetch('https://ljywhvbmsibwnssxpesh.supabase.co/functions/v1/showing-actions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'set_exact_time',batch_id:bid,exact_time:time12})});
  if(batches[bid])batches[bid].meta.exact_time=time12;
  showToast('First stop: '+time12);
}

function sortBy(key){sortDir=(sortKey===key)?-sortDir:-1;sortKey=key;renderTable();}

loadShowings();
setInterval(loadShowings,60000);
