<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EMC Lender Import — Rates & Realty CRM</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #c9a84c; --dark: #0a0a0a; --card: #161616;
      --card2: #1e1e1e; --border: rgba(255,255,255,0.08);
      --text: rgba(255,255,255,0.85); --muted: rgba(255,255,255,0.4);
    }
    html, body { height: 100%; background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; }

    .topnav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 24px; background: #111;
      border-bottom: 1px solid var(--border);
    }
    .nav-brand { display: flex; align-items: center; gap: 10px; text-decoration: none; }
    .brand-logo { width: 32px; height: 32px; border-radius: 8px;
      background: linear-gradient(135deg, var(--gold), #a07830);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif; font-size: 12px; font-weight: 700; color: #1a1a1a; }
    .brand-name { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: #fff; font-weight: 600; }
    .btn-back {
      padding: 7px 14px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 8px;
      color: var(--muted); font-size: 12px; text-decoration: none;
    }

    .container { max-width: 720px; margin: 40px auto; padding: 0 20px; }
    .import-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 32px; margin-bottom: 24px;
    }
    h1 { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 700; margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }
    .count-badge {
      display: inline-block; background: rgba(201,168,76,0.12); color: var(--gold);
      padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 600;
      margin-left: 8px;
    }

    .option-row {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 24px; font-size: 14px;
    }
    .option-row input[type="checkbox"] {
      width: 18px; height: 18px; accent-color: var(--gold); cursor: pointer;
    }
    .option-row label { cursor: pointer; color: var(--text); }
    .option-hint { color: var(--muted); font-size: 12px; margin-left: 28px; margin-top: -18px; margin-bottom: 20px; }

    .btn-import {
      padding: 12px 28px; background: linear-gradient(135deg, var(--gold), #a07830);
      border: none; border-radius: 10px; color: #1a1a1a;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-import:hover { opacity: 0.9; }
    .btn-import:disabled { opacity: 0.4; cursor: not-allowed; }

    .progress-section { margin-top: 28px; display: none; }
    .progress-bar-bg {
      width: 100%; height: 10px; background: rgba(255,255,255,0.06);
      border-radius: 6px; overflow: hidden; margin-bottom: 8px;
    }
    .progress-bar-fill {
      height: 100%; width: 0%; border-radius: 6px;
      background: linear-gradient(90deg, var(--gold), #d4b85c);
      transition: width 0.4s ease;
    }
    .progress-text { font-size: 12px; color: var(--muted); margin-bottom: 16px; }

    .log-area {
      background: #0d0d0d; border: 1px solid var(--border);
      border-radius: 10px; padding: 14px; max-height: 320px;
      overflow-y: auto; font-family: 'Courier New', monospace; font-size: 13px;
      line-height: 1.7;
    }
    .log-area::-webkit-scrollbar { width: 6px; }
    .log-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    .log-line { margin-bottom: 2px; }
    .log-ok { color: #4ade80; }
    .log-err { color: #f87171; }
    .log-info { color: var(--gold); }

    .summary-card {
      display: none; margin-top: 24px; background: var(--card2);
      border: 1px solid rgba(201,168,76,0.2); border-radius: 12px; padding: 24px;
    }
    .summary-title { font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 700; margin-bottom: 16px; }
    .summary-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .summary-stat { text-align: center; }
    .summary-stat .num { font-size: 32px; font-weight: 700; color: var(--gold); }
    .summary-stat .label { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>

        <div class="log-area" id="logArea"></div>

      </div>
    </div>

    document.getElementById('lenderCount').textContent = EMC_DATA.length + ' lenders ready';

    function log(msg, cls = '') {
      const el = document.getElementById('logArea');
      const line = document.createElement('div');
      line.className = 'log-line ' + cls;
      line.textContent = msg;
      el.appendChild(line);
      el.scrollTop = el.scrollHeight;
    }

    async function runImport() {
      const btn = document.getElementById('btnImport');
      const section = document.getElementById('progressSection');
      const bar = document.getElementById('progressBar');
      const pText = document.getElementById('progressText');
      const syncClickup = document.getElementById('syncClickup').checked;

      btn.disabled = true;
      btn.textContent = 'Importing...';
      section.style.display = 'block';

      const batchSize = 15;
      const totalBatches = Math.ceil(EMC_DATA.length / batchSize);
      let totalUpdated = 0, totalInserted = 0, totalClickup = 0, totalErrors = 0;

      log(`Starting import of ${EMC_DATA.length} lenders in ${totalBatches} batches...`, 'log-info');
      if (syncClickup) log('ClickUp sync enabled', 'log-info');

      for (let i = 0; i < totalBatches; i++) {
        const batch = EMC_DATA.slice(i * batchSize, (i + 1) * batchSize);
        const batchNum = i + 1;
        pText.textContent = `Batch ${batchNum}/${totalBatches} (${batch.length} lenders)...`;
        bar.style.width = ((batchNum - 0.5) / totalBatches * 100) + '%';

        try {
          const res = await fetch(`${cfg.SUPABASE_URL}/functions/v1/emc-lender-import`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${cfg.SUPABASE_ANON_KEY}` },
            body: JSON.stringify({ action: 'import_emc', emc_data: batch, sync_clickup: syncClickup, batch_size: 15 })
          });
          const data = await res.json();

          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);

          const u = data.updated || 0;
          const ins = data.inserted || 0;
          const ck = data.clickup_synced || 0;
          totalUpdated += u;
          totalInserted += ins;
          totalClickup += ck;

          let msg = `Batch ${batchNum}/${totalBatches}: ${u} updated, ${ins} inserted`;
          if (syncClickup) msg += `, ${ck} ClickUp synced`;
          log('\u2705 ' + msg, 'log-ok');
        } catch (err) {
          totalErrors++;
          log(`\u274C Batch ${batchNum}/${totalBatches}: ${err.message}`, 'log-err');
        }

        bar.style.width = (batchNum / totalBatches * 100) + '%';
      }

      pText.textContent = 'Import complete!';
      btn.textContent = totalErrors ? '\u26A0\uFE0F Import finished with errors' : '\u2705 Import Complete';

      if (totalErrors) {
        log(`Finished with ${totalErrors} batch error(s)`, 'log-err');
      } else {
        log('All batches completed successfully!', 'log-ok');
      }

      const summary = document.getElementById('summaryCard');
      document.getElementById('sumUpdated').textContent = totalUpdated;
      document.getElementById('sumInserted').textContent = totalInserted;
      document.getElementById('sumClickup').textContent = totalClickup;
      summary.style.display = 'block';
    }
  </script>
